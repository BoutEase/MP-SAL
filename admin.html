  // ---- Excel bulk upload ----

  onExcelUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';  // allow re-uploading same file
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = this._parseEmployeeExcel(new Uint8Array(ev.target.result));
        if (!parsed.length) {
          const hdrs = (this._lastDetectedHeaders || []).filter(h => h).join(', ');
          toast('No rows found. Detected headers: ' + (hdrs || '(none)'), 'error');
          console.log('Detected headers:', this._lastDetectedHeaders);
          console.log('Column map:', this._lastColMap);
          return;
        }
        this._showUploadPreview(parsed);
      } catch(err) {
        toast('Parse error: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  },

  _parseEmployeeExcel(fileData) {
    const wb = XLSX.read(fileData, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (rows.length < 2) return [];

    // Auto-detect header row (first row containing a name-like header, within first 5 rows)
    let headerRowIdx = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const cells = rows[i].map(h => String(h).toLowerCase().trim());
      if (cells.some(h => h === 'name' || h === 'employee name' || h === 'emp name'
                       || h === 'full name' || h === 'staff name' || h === 'employee'
                       || h.includes('name'))) {
        headerRowIdx = i;
        break;
      }
    }

    // Strip asterisks/special chars from headers for clean matching
    const headers = rows[headerRowIdx].map(h => String(h).toLowerCase().replace(/[*]/g, '').trim());

    // Match by exact first, then substring
    const col = (alts) => {
      let idx = alts.reduce((f, a) => f >= 0 ? f : headers.findIndex(h => h === a), -1);
      if (idx >= 0) return idx;
      return headers.findIndex(h => alts.some(a => h.includes(a) || (a.length > 3 && a.includes(h))));
    };

    const colMap = {
      name:         col(['employee name', 'emp name', 'full name', 'staff name', 'name']),
      team:         col(['department name', 'department', 'team', 'dept']),
      designation:  col(['designation', 'role', 'position', 'desig']),
      petpooja_id:  col(['petpooja id', 'pp id', 'petpooja_id', 'employees code', 'emp code', 'code']),
      petpooja_name:col(['petpooja name', 'pp name', 'petpooja_name']),
      weekly_salary:col(['weekly salary', 'salary', 'weekly_salary', 'wages', 'weekly wages', 'weekly pay']),
      login_code:   col(['login code', 'login_code', 'login']),
      company_room: col(['company room', 'company_room', 'room']),
      status:       col(['status', 'active']),
      joining_date: col(['joining date', 'joining_date', 'join date', 'date of joining', 'doj', 'joining']),
    };

    // Fallback: if name column still not found, use first non-empty column
    if (colMap.name < 0) colMap.name = headers.findIndex(h => h !== '');

    // Expose detected headers for debugging
    this._lastDetectedHeaders = headers;
    this._lastColMap = colMap;

    // Handle error cells (#N/A etc.) — treat as empty string
    const get = (row, c) => {
      if (c < 0) return '';
      const v = row[c];
      if (v === null || v === undefined) return '';
      if (typeof v === 'object') return '';  // SheetJS error cell
      return String(v).replace(/^#.*/, '').trim();  // strip #N/A, #REF! etc.
    };

    const dataRows = rows.slice(headerRowIdx + 1);
    return dataRows
      .filter(r => get(r, colMap.name))
      .map(r => {
        const petpoojaId = get(r, colMap.petpooja_id);
        const empId = petpoojaId && parseInt(petpoojaId)
          ? 'MP' + String(parseInt(petpoojaId)).padStart(3, '0')
          : null;
        return {
          emp_id:        empId,
          name:          get(r, colMap.name),
          team:          get(r, colMap.team),
          designation:   get(r, colMap.designation),
          petpooja_id:   petpoojaId,
          petpooja_name: get(r, colMap.petpooja_name) || get(r, colMap.name),
          weekly_salary: Number(get(r, colMap.weekly_salary)) || 0,
          login_code:    get(r, colMap.login_code),
          company_room:  get(r, colMap.company_room),
          status:        get(r, colMap.status) || 'Active',
          joining_date:  get(r, colMap.joining_date),
        };
      });
  },

  _showUploadPreview(incoming) {
    const norm = s => (s || '').toLowerCase().trim();
    const existingByName = {};
    const existingById   = {};
    State.employees.forEach(e => {
      existingByName[norm(e.name)] = e;
      existingById[e.emp_id] = e;
    });

    const toAdd = [], toUpdate = [];

    incoming.forEach(rec => {
      // Match by new petpooja-derived emp_id first, then by name
      const existing = (rec.emp_id ? existingById[rec.emp_id] : null)
                    || existingByName[norm(rec.name)];
      if (existing) {
        // Build a diff of changed fields
        const changes = [];
        const fields = [
          ['team', 'Team'],
          ['designation', 'Designation'],
          ['petpooja_id', 'Petpooja ID'],
          ['petpooja_name', 'Petpooja Name'],
          ['weekly_salary', 'Weekly ₹'],
          ['login_code', 'Login Code'],
          ['company_room', 'Company Room'],
          ['status', 'Status'],
        ];
        fields.forEach(([k, label]) => {
          const before = String(existing[k] || '');
          const after  = String(rec[k] || '');
          if (after && before !== after) changes.push({ label, before, after });
        });
        toUpdate.push({ rec: Object.assign({ emp_id: existing.emp_id }, rec), existing, changes });
      } else {
        toAdd.push({ rec });
      }
    });

    this._pendingUpload = [...toAdd.map(x => x.rec), ...toUpdate.map(x => x.rec)];

    const wrap = document.getElementById('emp-upload-preview');
    if (!wrap) return;

    const addRows = toAdd.map(({ rec }) => `
      <tr style="background:var(--success-light)">
        <td style="padding:8px 10px"><span class="badge badge-success">NEW</span></td>
        <td style="padding:8px 10px;font-weight:500">${rec.name}</td>
        <td style="padding:8px 10px">${rec.team || '—'}</td>
        <td style="padding:8px 10px">${rec.designation || '—'}</td>
        <td style="padding:8px 10px;text-align:right">${rec.weekly_salary ? fmt(rec.weekly_salary) : '—'}</td>
        <td style="padding:8px 10px;text-align:center">${rec.company_room === 'Yes'
          ? `<span class="badge badge-warning">Room −₹200</span>` : '—'}</td>
        <td style="padding:8px 10px;color:var(--muted);font-size:12px">—</td>
      </tr>`).join('');

    const updateRows = toUpdate.map(({ rec, existing, changes }) => {
      if (!changes.length) return `
        <tr style="opacity:.6">
          <td style="padding:8px 10px"><span class="badge" style="background:var(--border);color:var(--muted)">NO CHANGE</span></td>
          <td style="padding:8px 10px;font-weight:500">${rec.name}</td>
          <td colspan="5" style="padding:8px 10px;color:var(--muted);font-size:12px">All fields identical</td>
        </tr>`;
      return `
        <tr style="background:var(--primary-light)">
          <td style="padding:8px 10px"><span class="badge badge-primary">UPDATE</span></td>
          <td style="padding:8px 10px;font-weight:500">${rec.name}</td>
          <td style="padding:8px 10px">${rec.team || '—'}</td>
          <td style="padding:8px 10px">${rec.designation || '—'}</td>
          <td style="padding:8px 10px;text-align:right">${rec.weekly_salary ? fmt(rec.weekly_salary) : '—'}</td>
          <td style="padding:8px 10px;text-align:center">${rec.company_room === 'Yes'
            ? `<span class="badge badge-warning">Room −₹200</span>` : '—'}</td>
          <td style="padding:8px 10px;font-size:12px;color:var(--primary)">
            ${changes.map(c => `<div><strong>${c.label}:</strong> <span style="color:var(--muted)">${c.before||'(empty)'}</span> → <strong>${c.after}</strong></div>`).join('')}
          </td>
        </tr>`;
    }).join('');

    const total = toAdd.length + toUpdate.filter(x => x.changes.length).length;

    wrap.style.display = 'block';
    wrap.innerHTML = `
    <div class="card" style="margin-bottom:16px;border-color:var(--primary)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <strong style="font-size:15px">Review Employee Upload</strong>
        <span style="font-size:13px;color:var(--muted)">${toAdd.length} new &nbsp;·&nbsp; ${toUpdate.filter(x=>x.changes.length).length} updates &nbsp;·&nbsp; ${toUpdate.filter(x=>!x.changes.length).length} unchanged</span>
        <span style="flex:1"></span>
        <button class="btn btn-secondary btn-sm" onclick="Views.Employees.cancelUpload()">✕ Cancel</button>
      </div>
      <div style="overflow-x:auto;max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="position:sticky;top:0;background:var(--surface2)">
            <tr>
              <th style="padding:8px 10px;text-align:left">Action</th>
              <th style="padding:8px 10px;text-align:left">Name</th>
              <th style="padding:8px 10px;text-align:left">Team</th>
              <th style="padding:8px 10px;text-align:left">Designation</th>
              <th style="padding:8px 10px;text-align:right">Weekly ₹</th>
              <th style="padding:8px 10px;text-align:center">Room</th>
              <th style="padding:8px 10px;text-align:left">Changes</th>
            </tr>
          </thead>
          <tbody>${addRows}${updateRows}</tbody>
        </table>
      </div>
      ${total === 0 ? `<p style="color:var(--muted);font-size:13px;margin-top:12px">Nothing to apply — all records match existing data.</p>` : `
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" onclick="Views.Employees.confirmUpload()">✓ Confirm &amp; Save ${total} record(s)</button>
        <button class="btn btn-secondary btn-sm" onclick="Views.Employees.cancelUpload()">Cancel</button>
      </div>`}
    </div>`;

    wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  },

  cancelUpload() {
    this._pendingUpload = null;
    const wrap = document.getElementById('emp-upload-preview');
    if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; }
  },

  async confirmUpload() {
    if (!this._pendingUpload?.length) return;
    const records = this._pendingUpload.filter((_, i) => true); // all records
    try {
      const wrap = document.getElementById('emp-upload-preview');
      if (wrap) wrap.innerHTML = `<div style="padding:16px;color:var(--muted)">Saving…</div>`;
      await API.call('saveEmployees', { records });
      const r = await API.call('getEmployees', {});
      State.employees = r.data || [];
      this.cancelUpload();
      this.render();
      toast(`Saved ${records.length} employee record(s)`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

    try {
      const r = await API.call('getAdvances', { start_date: from, end_date: to });

      if (!list.length) { res.innerHTML = '<p style="color:var(--muted)">No advances in this range.</p>'; return; }

      // Enrich with team

        const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
        return Object.assign({}, a, { team: emp.team || 'Other' });

      // Group by date
      const dates = [...new Set(enriched.map(a => a.date))].sort();
      const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);

        <button class="btn btn-primary btn-sm" onclick="Views.Advances.save('${advId||''}')">Save</button>
        <button class="btn btn-secondary btn-sm" onclick="Views.Advances.closeForm()">Cancel</button>
      </div>
    </div>`;
  },

  closeForm() { document.getElementById('adv-form-wrap').innerHTML = ''; },

  async approve(advId) {
    try {
      await API.call('approveAdvance', { advance_id: advId });
      await this.fetch();
      toast('Advance approved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async approveAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Approve all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      const r = await API.call('approveAdvances', { advance_ids: ids });
      await this.fetch();
      if (r.not_found && r.not_found.length) {
        toast(`Approved ${r.approved}/${ids.length}. Not found: ${r.not_found.join(', ')}`, 'error');
      } else {
        toast(`${r.approved} advance(s) approved`, 'success');
      }
    } catch(e) { toast(e.message, 'error'); }
  },

  async rejectAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Reject all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      for (const id of ids) await API.call('deleteAdvance', { advance_id: id });
      await this.fetch();
      toast(`${ids.length} advance(s) rejected`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async save(advId) {
    const empId = document.getElementById('af-emp')?.value;
    const amt   = parseFloat(document.getElementById('af-amt')?.value);
    if (!empId || !amt) { toast('Employee and amount required', 'error'); return; }
    const emp = State.employees.find(e => e.emp_id === empId);
    const btn = document.querySelector(`[onclick="Views.Advances.save('${advId||''}')"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await API.call('saveAdvance', {
        advance_id: advId || null,
        emp_id: empId, emp_name: emp?.name || empId,
        date:   document.getElementById('af-date')?.value,
        amount: amt,
        created_by: 'Admin'
      });
      this.closeForm(); await this.fetch();
      toast('Advance saved', 'success');
    } catch(e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  },

  async remove(advId, action) {
    if (!confirm(`${action} this advance?`)) return;
    try {
      await API.call('deleteAdvance', { advance_id: advId });
      await this.fetch();
      toast(action + 'ed', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

  async load() {

        html += `<div style="background:var(--warning-bg,#fffbeb);border:1px solid var(--warning);border-radius:10px;padding:16px;margin-bottom:20px">

              <tr id="pending-bon-${p.bonus_id}" style="border-top:1px solid var(--border)">

                <td style="padding:8px;color:var(--muted)">${p.month}</td>
                <td style="padding:8px;text-align:right;font-weight:700;color:var(--success)">${fmt(p.payout)}</td>

        html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--surface2)">
            <tr><th style="padding:10px 8px;text-align:left">Employee</th>
            <th style="padding:10px 8px;text-align:right">Balance</th>
            <th style="padding:10px 8px">Progress</th>
            <th style="padding:10px 8px;text-align:right">Last Payout</th>
            <th style="padding:10px 8px">Last Updated</th></tr>
          </thead>
          <tbody>${list.sort((a,b)=>b.balance-a.balance).map(b => {
            const pct = Math.min(100, Math.round(b.balance/target*100));
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 8px;font-weight:500">${b.emp_name}</td>
              <td style="padding:10px 8px;text-align:right;font-weight:700">${fmt(b.balance)}</td>
              <td style="padding:10px 8px;min-width:120px">
                <div style="background:var(--border);border-radius:99px;height:8px">
                  <div style="background:${pct>=100?'var(--success)':'var(--primary)'};width:${pct}%;height:8px;border-radius:99px"></div>
                </div>
                <span style="font-size:11px;color:var(--muted)">${pct}% of ${fmt(target)}</span>
              </td>
              <td style="padding:10px 8px;text-align:right">${b.last_payout>0?fmt(b.last_payout):'—'}</td>
              <td style="padding:10px 8px;color:var(--muted)">${b.last_updated_month||'—'}</td>

          }).join('')}
          </tbody></table></div>`;
      }

      document.getElementById('bonus-list').innerHTML = html;
    } catch(e) { toast(e.message, 'error'); }
  },

  async onUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (!rows.length) { toast('No data found in file', 'error'); return; }

        // Detect columns: emp_name and balance (total deposited bonus)
        const firstRow = rows[0];
        const keys = Object.keys(firstRow);
        const norm = s => String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        const nameKey = keys.find(k => norm(k).includes('name') || norm(k).includes('emp'));
        const balKey  = keys.find(k => norm(k).includes('bal') || norm(k).includes('bonus') || norm(k).includes('deposit') || norm(k).includes('total'));
        if (!nameKey || !balKey) {
          toast(`Could not detect columns. Found: ${keys.join(', ')}`, 'error'); return;
        }

        const records = rows
          .filter(r => r[nameKey] && !String(r[nameKey]).startsWith('#'))
          .map(r => ({ emp_name: String(r[nameKey]).trim(), balance: Number(String(r[balKey]).replace(/[^0-9.]/g, '')) || 0 }))
          .filter(r => r.emp_name);

        if (!records.length) { toast('No valid rows found', 'error'); return; }
        if (!confirm(`Upload bonus balances for ${records.length} employee(s)? This will seed their starting bonus pool balance.`)) return;

        const res = await API.call('saveBonusBalances', { records });
        toast(`Saved ${res.saved} balances${res.skipped ? `, ${res.skipped} not matched` : ''}`, 'success');
        this.load();
      } catch(err) { toast(err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  },

  async confirmPaid(bonusId, empId, empName) {
    if (!confirm(`Confirm that ₹ bonus payout has been handed to ${empName}?\n\nThis will:\n• Mark this payout as paid\n• Set ${empName}'s bonus scheme to No`)) return;
    try {
      await API.call('confirmBonusPaid', { bonus_id: bonusId, emp_id: empId });
      // Remove from pending list
      const row = document.getElementById(`pending-bon-${bonusId}`);
      if (row) row.remove();
      // Update State.employees so employee edit form reflects change
      const emp = State.employees.find(e => e.emp_id === empId);
      if (emp) emp.bonus_scheme = 'No';
      toast(`${empName} bonus confirmed paid — bonus scheme set to No`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

Views.Payments = {
  _run: [],
  _month: '',
  _newDoc() { const { jsPDF } = window.jspdf; return new jsPDF({ unit:'mm', format:'a4' }); },
  _Rs(n) { return 'Rs. ' + Number(n||0).toLocaleString('en-IN'); },

  async load() {
    const c = document.getElementById('view-payments');
    c.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <h2 style="font-size:18px;font-weight:700">Payments</h2>
        <select id="pay-month-sel" style="width:auto;padding:6px 10px" onchange="Views.Payments.onMonthChange(this.value)">
          <option value="">— select month —</option>
        </select>
        <span style="flex:1"></span>
      </div>
      <div id="pay-run-wrap"></div>`;
    try {
      const r = await API.call('getFinalizedMonths', {});
      const months = r.data || [];
      const sel = document.getElementById('pay-month-sel');
      months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
      if (months.length) { sel.value = months[0]; this.onMonthChange(months[0]); }
      else document.getElementById('pay-run-wrap').innerHTML = '<p style="color:var(--muted)">No finalised months yet.</p>';
    } catch(e) { toast(e.message, 'error'); }
  },

  async onMonthChange(month) {
    this._month = month;
    State.currentMonth = month;
    if (!month) return;
    const wrap = document.getElementById('pay-run-wrap');
    wrap.innerHTML = '<div class="spinner"></div>';
    try {
      const [runRes, payRes, payrollRes] = await Promise.all([
        API.call('getPaymentRun', { month }),
        API.call('getPayments', { month }),
        API.call('getPayroll', { month })
      ]);
      this._run     = runRes.data     || [];
      this._payroll = payrollRes.data || [];
      const sample  = this._payroll.find(p => p.adv_end_date);
      let advances  = [];
      if (sample && sample.adv_start_date && sample.adv_end_date) {
        const advRes = await API.call('getAdvances', {
          status: 'Approved',
          start_date: sample.adv_start_date,
          end_date:   sample.adv_end_date
        });
        advances = advRes.data || [];
      }
      this._advances  = advances;
      this._payments  = payRes.data || [];

      // Check which negative-balance employees have already been handled
      const negEmps = this._run.filter(r => r.net_pay < 0);
      if (negEmps.length) {
        // Method 1: localStorage (works immediately, device-specific)
        const lsDone = negEmps.filter(r =>
          localStorage.getItem(`mpsal_neg_${month}_${r.emp_id}`)
        ).map(r => r.emp_id);
        // Method 2: advance sheet — check for created_by marker (trimmed)
        const checks = await Promise.all(
          negEmps.map(r => API.call('getAdvances', { emp_id: r.emp_id, status: 'Approved' }))
        );
        this._negConvertedDetails = new Map();
        const advDone = negEmps.filter((r, i) => {
          const adv = (checks[i].data || []).find(a => (String(a.created_by || '')).trim() === 'Previous Month Bal');
          if (adv) { this._negConvertedDetails.set(r.emp_id, { amount: adv.amount, date: adv.date }); }
          return !!adv;
        }).map(r => r.emp_id);
        this._negConverted = new Set([...lsDone, ...advDone]);
      } else {
        this._negConverted = new Set();
      }

      this.render(this._run, this._payments);
    } catch(e) { toast(e.message, 'error'); }
  },

  render(run, payments) {
    const wrap = document.getElementById('pay-run-wrap');
    const today = new Date().toISOString().split('T')[0];
    const isMob = window.innerWidth <= 768;

    // Split run into Direct and Via Distributor based on employee profile
    const empMap2 = {};
    State.employees.forEach(e => empMap2[e.emp_id] = e);
    const directRun = run.filter(r => (empMap2[r.emp_id]?.payment_batch || 'Direct') !== 'Via Distributor');
    const distRun   = run.filter(r => (empMap2[r.emp_id]?.payment_batch) === 'Via Distributor');

    // Batch payments already recorded (stored as __DIST_BATCH__ pseudo-records)
    const batchPayments = payments.filter(p => p.emp_id === '__DIST_BATCH__');
    const batchPaidSoFar = batchPayments.reduce((s, p) => s + Number(p.amount), 0);

    // Distributor batch total — exclude negative net_pay employees
    const distTotal = distRun.filter(r => r.net_pay > 0).reduce((s, r) => s + r.net_pay, 0);
    const distOutstanding = Math.max(0, distTotal - batchPaidSoFar);

    // Totals for summary card
    const totalNet  = run.reduce((s, r) => s + Math.max(0, r.net_pay), 0);
    const totalPaid = run.reduce((s, r) => s + r.already_paid, 0) + batchPaidSoFar;
    const totalRem  = directRun.reduce((s, r) => s + Math.max(0, r.remaining), 0) + distOutstanding;

    // Payroll breakdown totals
    const pr             = this._payroll || [];
    const totalGross     = pr.reduce((s, p) => s + (p.gross_pay          || 0), 0);
    const totalOT        = pr.reduce((s, p) => s + (p.ot_earnings        || 0), 0);
    const totalShortfall = pr.reduce((s, p) => s + (p.shortfall_deduction|| 0), 0);
    const totalBonusCut  = pr.reduce((s, p) => s + (p.bonus_cut          || 0), 0);
    const totalAdvDed    = pr.reduce((s, p) => s + (p.total_advances     || 0), 0);

    // Advances grouped by date
    const advByDate = {};
    (this._advances || []).forEach(a => {
      const d = a.date || '—';
      advByDate[d] = (advByDate[d] || 0) + Number(a.amount);

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:${advDates.length ? '16px' : '0'}">

            <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmt(totalGross - totalShortfall)} salary + <span style="color:var(--success)">${fmt(totalOT)} OT</span></div>
          </div>
          <div style="flex:1;min-width:110px;background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Advances Deducted</div>
            <div style="font-size:17px;font-weight:700;color:var(--warning)">${fmt(totalAdvDed)}</div>

        </div>
        ${advDates.length ? `

  async convertNegative(i) {
    const btn = document.getElementById('pay-neg-conv-btn-' + i);
    if (btn?.disabled) return;
    if (btn) btn.disabled = true;
    const r    = this._run[i];
    const date = document.getElementById('pay-neg-date-' + i)?.value;
    if (!date) { toast('Select a date', 'error'); if (btn) btn.disabled = false; return; }
    const amount = Math.abs(r.net_pay);
    try {
      await API.call('saveAdvance', {
        advance_id: null, emp_id: r.emp_id, emp_name: r.emp_name,
        date, amount, status: 'Approved', created_by: 'Previous Month Bal'
      });
      localStorage.setItem(`mpsal_neg_${this._month}_${r.emp_id}`, '1');
      toast(`₹${amount.toLocaleString('en-IN')} carried forward for ${r.emp_name}`, 'success');
      this.onMonthChange(this._month);
    } catch(e) { toast(e.message, 'error'); if (btn) btn.disabled = false; }
  },

  dismissNegative(i) {
    const r = this._run[i];
    localStorage.setItem(`mpsal_neg_${this._month}_${r.emp_id}`, '1');
    toast(`${r.emp_name} marked as handled`, 'success');
    this.onMonthChange(this._month);
  },

  toggleAll(checked) {
    document.querySelectorAll('.pay-chk:not([disabled])').forEach(cb => cb.checked = checked);
  },

  async recordSelected() {
    const date = document.getElementById('pay-date')?.value;
    if (!date) { toast('Select a payment date', 'error'); return; }
    const checked = [...document.querySelectorAll('.pay-chk:checked')];
    if (!checked.length) { toast('Select at least one employee', 'error'); return; }

    const records = [];
    for (const cb of checked) {
      const empId = cb.dataset.empid;
      const emp   = this._run.find(r => r.emp_id === empId);
      if (!emp) continue;
      const amt  = parseFloat(document.getElementById(`pay-amt-${empId}`)?.value);
      const mode = document.getElementById(`pay-mode-${empId}`)?.value;
      if (!amt || amt <= 0) { toast(`Enter a valid amount for ${emp.emp_name}`, 'error'); return; }
      records.push({ emp_id: emp.emp_id, emp_name: emp.emp_name,
        month: this._month, date_paid: date, amount: amt, mode: mode || 'UPI' });
    }

    const btn = document.querySelector('[onclick="Views.Payments.recordSelected()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await API.call('saveBulkPayments', { records });
      toast(`${records.length} payment(s) recorded`, 'success');
      this.onMonthChange(this._month);
    } catch(e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '✓ Record Selected'; }
    }
  },

  async recordBatchPayment() {
    const date = document.getElementById('dist-pay-date')?.value;
    const amt  = parseFloat(document.getElementById('dist-pay-amt')?.value);
    if (!date) { toast('Select a date', 'error'); return; }
    if (!amt || amt <= 0) { toast('Enter a valid amount', 'error'); return; }

    const empMap2 = {};
    State.employees.forEach(e => empMap2[e.emp_id] = e);
    const distRun     = this._run.filter(r => empMap2[r.emp_id]?.payment_batch === 'Via Distributor');
    const distTotal   = distRun.filter(r => r.net_pay > 0).reduce((s, r) => s + r.net_pay, 0);
    const batchPaids  = (this._payments || []).filter(p => p.emp_id === '__DIST_BATCH__');
    const alreadyPaid = batchPaids.reduce((s, p) => s + Number(p.amount), 0);
    const newTotal    = alreadyPaid + amt;

    const btn = document.querySelector('[onclick="Views.Payments.recordBatchPayment()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      // Save the batch payment as one record
      await API.call('saveBulkPayments', { records: [{
        emp_id: '__DIST_BATCH__', emp_name: 'Distributor Batch',
        month: this._month, date_paid: date, amount: amt, mode: 'Distributor Batch'
      }]});

      // If fully paid, auto-mark all distributor employees as individually paid
      if (newTotal >= distTotal && distTotal > 0) {
        const indiv = distRun
          .filter(r => r.net_pay > 0 && r.already_paid < r.net_pay)
          .map(r => ({ emp_id: r.emp_id, emp_name: r.emp_name,
            month: this._month, date_paid: date, amount: r.net_pay - r.already_paid, mode: 'Distributor Batch' }));
        if (indiv.length) await API.call('saveBulkPayments', { records: indiv });
        toast(`Batch fully paid — ${indiv.length} employee(s) marked as paid`, 'success');
      } else {
        toast(`₹${amt.toLocaleString('en-IN')} recorded · Outstanding: ${fmt(distTotal - newTotal)}`, 'success');
      }
      this.onMonthChange(this._month);
    } catch(e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '✓ Record'; }
    }
  },

  downloadDistributorPDF() {
    const empMap2 = {};
    State.employees.forEach(e => empMap2[e.emp_id] = e);
    const distRun = this._run.filter(r => empMap2[r.emp_id]?.payment_batch === 'Via Distributor' && r.net_pay > 0);
    if (!distRun.length) { toast('No distributor employees with positive balance', 'error'); return; }
    const total = distRun.reduce((s,r) => s + r.net_pay, 0);
    const Rs = this._Rs.bind(this);

    const doc = this._newDoc();
    const M = 20, PW = 210;
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(15,23,42);
    doc.text('MP SAL - Distributor Payment List', M, 20);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(100,116,139);
    doc.text(`${this._month}  |  Generated ${new Date().toLocaleDateString('en-IN')}`, M, 28);

    doc.autoTable({
      startY: 35, margin: {left:M, right:M},
      head: [['Employee','Amount']],
      body: distRun.map(r => [r.emp_name, Rs(r.net_pay)]),
      foot: [['Total', Rs(total)]],
      theme: 'striped',
      headStyles: {fillColor:[241,245,249], textColor:[100,116,139], fontStyle:'bold'},
      footStyles: {fillColor:[241,245,249], fontStyle:'bold', textColor:[15,23,42]},
      columnStyles: {1:{halign:'right'}}
    });

    const fy = doc.lastAutoTable.finalY + 20;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100,116,139);
    doc.text('Prepared by: ___________________', M, fy);
    doc.text('Distributor sign: ___________________', PW-M, fy, {align:'right'});
    doc.save(`Distributor_List_${this._month}.pdf`);
  },

  downloadOverallPDF() {
    const empMap2 = {};
    State.employees.forEach(e => empMap2[e.emp_id] = e);
    const eligible = this._run.filter(r => r.net_pay > 0);
    if (!eligible.length) { toast('No employees with positive balance', 'error'); return; }
    const total = eligible.reduce((s,r) => s + r.net_pay, 0);
    const Rs = this._Rs.bind(this);

    const doc = this._newDoc();
    const M = 20;
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(15,23,42);
    doc.text('MP SAL - Salary Statement', M, 20);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(100,116,139);
    doc.text(`${this._month}  |  Generated ${new Date().toLocaleDateString('en-IN')}  |  ${eligible.length} employees`, M, 28);

    doc.autoTable({
      startY: 35, margin: {left:M, right:M},
      head: [['Employee','Batch','Net Pay']],
      body: eligible.map(r => [r.emp_name, empMap2[r.emp_id]?.payment_batch||'Direct', Rs(r.net_pay)]),
      foot: [['Total','', Rs(total)]],
      theme: 'striped',
      headStyles: {fillColor:[241,245,249], textColor:[100,116,139], fontStyle:'bold'},
      footStyles: {fillColor:[241,245,249], fontStyle:'bold', textColor:[15,23,42]},
      columnStyles: {2:{halign:'right'}}
    });
    doc.save(`Salary_Statement_${this._month}.pdf`);
  },

  async remove(paymentId) {
    if (!confirm('Delete this payment?')) return;
    try {
      await API.call('deletePayment', { payment_id: paymentId });
      this.onMonthChange(this._month);
      toast('Deleted', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

};

      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Calculation Rules</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Shortfall threshold (hours)</label><input type="number" step="0.25" id="s-thresh" value="${State.settings.SHORTFALL_THRESHOLD_HOURS||8.5}" /></div>
          <div class="field"><label>OT minimum hours</label><input type="number" id="s-otmin" value="${State.settings.OT_MIN_HOURS||10}" /></div>
          <div class="field"><label>OT rounding (minutes)</label><input type="number" id="s-otround" value="${State.settings.OT_ROUND_MINUTES||15}" /></div>
          <div class="field"><label>Add lunch hour to Sunday/Holiday OT?</label>
            <select id="s-lunch">
              <option value="true" ${State.settings.ADD_LUNCH_TO_OT==='true'?'selected':''}>Yes</option>
              <option value="false" ${State.settings.ADD_LUNCH_TO_OT!=='true'?'selected':''}>No</option>
            </select></div>
          <div class="field"><label>Lunch duration (hours)</label><input type="number" step="0.5" id="s-lunchhrs" value="${State.settings.LUNCH_DURATION_HOURS||1}" /></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Bonus Pool</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Pool target (₹)</label><input type="number" id="s-bontarget" value="${State.settings.BONUS_POOL_TARGET||24000}" /></div>
          <div class="field"><label>Employee contribution / month (₹)</label><input type="number" id="s-empcon" value="${State.settings.EMPLOYEE_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Company contribution / month (₹)</label><input type="number" id="s-comcon" value="${State.settings.COMPANY_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Min days for bonus eligibility</label><input type="number" id="s-bondays" value="${State.settings.BONUS_ELIGIBILITY_MIN_DAYS||6}" /></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Teams</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Teams appear in employee records and advance reports.</p>
        <div id="teams-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addTeamRow()">+ Add Team</button>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Holidays ${new Date().getFullYear()}</h3>
        <div id="holiday-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addHolidayRow()">+ Add Holiday</button>
      </div>
      <button class="btn btn-primary" onclick="Views.Settings.save()">Save All Settings</button>
    </div>`;
    await this.loadHolidays();
  },

  async loadHolidays() {
    try {
      const r = await API.call('getHolidays', { year: currentYear() });
      State.holidays = r.data || [];
      this.renderHolidays();
    } catch(e) {}
    this.renderTeams();
  },

  renderTeams() {
    const c = document.getElementById('teams-list');
    if (!c) return;
    const teams = getTeams();
    c.innerHTML = teams.map((t, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="team-row-${i}">
        <input type="text" id="team-name-${i}" value="${t}" placeholder="Team name" style="flex:1;max-width:240px" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('team-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addTeamRow() {
    const c = document.getElementById('teams-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'team-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="text" id="team-name-${i}" placeholder="Team name" style="flex:1;max-width:240px" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  renderHolidays() {
    const c = document.getElementById('holiday-list');
    const rows = State.holidays.length ? State.holidays : Array(8).fill({ date: '', name: '' });
    c.innerHTML = rows.map((h, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="hol-row-${i}">
        <input type="date" id="hol-date-${i}" value="${h.date||''}" style="flex:0 0 160px" />
        <input type="text" id="hol-name-${i}" value="${h.name||''}" placeholder="Holiday name" style="flex:1" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('hol-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addHolidayRow() {
    const c = document.getElementById('holiday-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'hol-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="date" id="hol-date-${i}" style="flex:0 0 160px" />
      <input type="text" id="hol-name-${i}" placeholder="Holiday name" style="flex:1" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  async save() {
    const settings = {
      COMPANY_NAME:                document.getElementById('s-company')?.value,
      ADMIN_PIN:                   document.getElementById('s-adminpin')?.value,
      MANAGER_PIN:                 document.getElementById('s-manpin')?.value,
      SHORTFALL_THRESHOLD_HOURS:   document.getElementById('s-thresh')?.value,
      OT_MIN_HOURS:                document.getElementById('s-otmin')?.value,
      OT_ROUND_MINUTES:            document.getElementById('s-otround')?.value,
      ADD_LUNCH_TO_OT:             document.getElementById('s-lunch')?.value,
      LUNCH_DURATION_HOURS:        document.getElementById('s-lunchhrs')?.value,
      BONUS_POOL_TARGET:           document.getElementById('s-bontarget')?.value,
      EMPLOYEE_CONTRIBUTION:       document.getElementById('s-empcon')?.value,
      COMPANY_CONTRIBUTION:        document.getElementById('s-comcon')?.value,
      BONUS_ELIGIBILITY_MIN_DAYS:  document.getElementById('s-bondays')?.value,
    };

    // Collect teams
    const teamNames = [];
    document.querySelectorAll('[id^="team-row-"]').forEach(row => {
      const i = row.id.replace('team-row-', '');
      const name = document.getElementById('team-name-' + i)?.value?.trim();
      if (name) teamNames.push(name);
    });
    if (teamNames.length) settings.TEAMS = teamNames.join(',');

    // Collect holidays
    const holidays = [];
    document.querySelectorAll('[id^="hol-row-"]').forEach(row => {
      const i    = row.id.replace('hol-row-', '');
      const date = document.getElementById('hol-date-' + i)?.value;
      const name = document.getElementById('hol-name-' + i)?.value;
      if (date && name) holidays.push({ date, name });
    });

    try {
      await Promise.all([
        API.call('saveSettings', settings),
        holidays.length ? API.call('saveHolidays', holidays) : Promise.resolve()
      ]);
      const r = await API.call('getSettings', {});
      State.settings = r.data || {};
      toast('Settings saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

// ============================================================

// ---- Boot ----
App.init();

</script>
</body>
</html>
