<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MP SAL Admin">
  <meta name="theme-color" content="#00D4D4">
  <link rel="manifest" href="manifest-admin.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>MP-SAL Admin</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    /* ── BoutEase Design Tokens ── */
    :root {
      /* Surfaces */
      --bg:        #F5FEFE;
      --surface:   #FFFFFF;
      --surface2:  #EAF9F9;
      --surface3:  #E0F7F7;
      --border:    rgba(0,180,180,0.18);
      --border-2:  rgba(0,180,180,0.32);

      /* Ink */
      --text:   #0F2F2F;
      --muted:  #527070;
      --muted2: #8AA5A5;

      /* Brand */
      --primary:       #00D4D4;
      --primary-dark:  #009E9E;
      --primary-light: #E0FAFA;
      --accent:        #F28C28;
      --accent-light:  #FFF4E6;

      /* Status */
      --success:       #28A745;
      --success-light: #DFF5E4;
      --danger:        #DC3545;
      --danger-light:  #F9DDE0;
      --warning:       #F28C28;
      --warning-light: #FFE9D2;

      /* Type */
      --font-sans:  'Sora', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-serif: 'Lora', Georgia, serif;
      --font-mono:  ui-monospace, 'SF Mono', 'Roboto Mono', monospace;

      /* Shape */
      --radius:    12px;
      --radius-sm: 8px;
      --shadow:    0 1px 0 rgba(0,180,180,.06), 0 2px 6px rgba(0,180,180,.06);
      --shadow-md: 0 4px 18px rgba(0,180,180,.12), 0 1px 3px rgba(15,47,47,.05);
      --shadow-teal:   0 4px 18px rgba(0,212,212,.28);
      --shadow-orange: 0 4px 18px rgba(242,140,40,.22);
    }
    [data-theme="dark"] {
      --bg: #0A1F1F; --surface: #0F2929; --surface2: #143434; --surface3: #1A4040;
      --border: rgba(0,212,212,0.15); --border-2: rgba(0,212,212,0.28);
      --text: #EAF9F9; --muted: #88B5B5; --muted2: #5A8585;
      --primary: #00D4D4; --primary-dark: #00AEAE; --primary-light: #0F3B3B;
      --accent: #F28C28; --accent-light: #2E1F0F;
      --success: #4CAF72; --success-light: #143524;
      --danger: #E06070; --danger-light: #3A1820;
      --warning: #F28C28; --warning-light: #2E1F0F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }
    .screen { min-height: 100vh; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-2);
      background: var(--surface); color: var(--text);
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .btn-primary {
      background: var(--primary); color: var(--text);
      border-color: var(--primary); box-shadow: var(--shadow-teal); font-weight: 700;
    }
    .btn-primary:hover { background: #00EEEE; border-color: #00EEEE; color: var(--text); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface); color: var(--text); border-color: var(--border-2);
    }
    .btn-secondary:hover { background: var(--surface2); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { opacity: .9; }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    /* ── Inputs ── */
    input, select, textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text);
      font-family: var(--font-sans); font-size: 13px;
      outline: none; transition: border .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0,212,212,.12);
    }
    input::placeholder { color: var(--muted2); }
    label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      display: block; margin-bottom: 5px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .field { margin-bottom: 14px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 700; letter-spacing: .02em;
    }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-warning { background: var(--warning-light); color: var(--warning); }
    .badge-danger  { background: var(--danger-light);  color: var(--danger); }
    .badge-primary { background: var(--primary-light); color: var(--primary-dark); }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; font-size: 10.5px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
      padding: 11px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap; position: sticky; top: 0; z-index: 1;
    }
    tbody td {
      padding: 11px 14px; border-bottom: 1px solid var(--border);
      vertical-align: middle; color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #F0FDFD; }

    /* ── Setup Screen ── */
    #screen-setup { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
    .setup-box { width: 100%; max-width: 440px; }
    .setup-box h1 { font-family: var(--font-serif); font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.02em; }
    .setup-box p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* ── Login Screen ── */
    #screen-login { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); min-height: 100vh; }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-mark {
      width: 56px; height: 56px; background: var(--primary); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-style: italic; font-size: 26px;
      color: var(--text); margin-bottom: 14px;
      box-shadow: var(--shadow-teal);
    }
    .login-logo h1 { font-family: var(--font-serif); font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
    .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .role-tabs { display: flex; gap: 3px; padding: 3px; background: var(--surface2); border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
    .role-tab { flex: 1; padding: 8px 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; color: var(--muted); background: transparent; border: none; }
    .role-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .pin-input { font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: 700; height: 54px; }
    .login-footer { margin-top: 18px; text-align: center; }
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 14px; cursor: pointer; font-size: 12px; color: var(--muted);
      font-family: var(--font-sans); font-weight: 500;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border-2); }

    /* ── Sidebar ── */
    .mp-sidebar {
      width: 224px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 18px 12px;
      height: 100vh; overflow-y: auto; position: sticky; top: 0;
    }
    .mp-sidebar::-webkit-scrollbar { display: none; }
    .mp-sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 8px 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .mp-brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--primary); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-style: italic; font-size: 18px; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,212,212,.3); flex-shrink: 0;
    }
    .mp-brand-name { font-family: var(--font-serif); font-weight: 700; font-size: 15px; letter-spacing: -.02em; }
    .mp-brand-sub  { font-size: 10.5px; color: var(--muted); margin-top: 1px; font-weight: 500; }
    .mp-nav-section {
      font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted2); padding: 12px 10px 4px;
    }
    .mp-nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; user-select: none; transition: all .15s;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .mp-nav-item:hover { background: var(--surface2); color: var(--primary-dark); }
    .mp-nav-item.active {
      background: var(--primary-light); color: var(--text); font-weight: 700;
      box-shadow: inset 0 0 0 1px var(--border-2);
    }
    .mp-nav-item svg { opacity: .6; flex-shrink: 0; }
    .mp-nav-item.active svg { opacity: 1; color: var(--primary-dark); }
    .mp-sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 6px; }

    /* ── Topbar ── */
    .mp-topbar {
      height: 56px; padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 20; flex-shrink: 0;
    }
    [data-theme="dark"] .mp-topbar { background: rgba(15,41,41,.92); }
    .mp-topbar-title { font-family: var(--font-serif); font-size: 15px; font-weight: 700; letter-spacing: -.01em; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md); }
    #toast.show { opacity: 1; }

    /* ── Spinner ── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Admin layout ── */
    #screen-admin { display: flex; height: 100vh; overflow: hidden; }
    .mp-admin-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .mp-admin-main { flex: 1; overflow: auto; padding: 24px 28px; }

    /* ── Mobile bottom nav ── */
    .mp-mobile-nav { display: none; }
    .pay-status-badge { display: none; }
    .pay-emp-name { font-weight: 600; font-size: 13px; margin-left: 6px; }
    @media (max-width: 768px) {
      .mp-sidebar { display: none; }
      .mp-admin-main { padding: 12px 10px 90px; }
      .mp-mobile-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface); border-top: 1px solid var(--border);
        padding-top: 0;
        padding-bottom: env(safe-area-inset-bottom, 6px);
        padding-left: calc(env(safe-area-inset-left, 0px) + 14px);
        padding-right: calc(env(safe-area-inset-right, 0px) + 14px);
        min-height: 64px;
        box-shadow: 0 -2px 16px rgba(0,0,0,.08);
      }
      .mp-mobile-nav-item {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 4px; padding: 10px 4px 6px; border: none; background: none; cursor: pointer;
        font-size: 10px; font-weight: 600; color: #9ca3af; font-family: var(--font-sans);
        letter-spacing: .01em; position: relative; transition: color .15s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .mp-mobile-nav-item.active { color: var(--primary-dark); }
      .mp-mobile-nav-item.active::before {
        content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: 28px; height: 3px; background: var(--primary); border-radius: 0 0 4px 4px;
      }
      .mp-mobile-nav-item svg { flex-shrink: 0; transition: opacity .15s ease; opacity: .45; }
      .mp-mobile-nav-item.active svg { opacity: 1; }
      .mp-topbar { padding: 0 10px; }

      /* Tables — horizontal scroll */
      .mp-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Cards stack full width */
      .card { border-radius: 10px; }

      /* Buttons — bigger tap targets */
      .btn { min-height: 38px; }
      .btn-sm { min-height: 32px; font-size: 12px; }

      /* Form fields — full width on mobile */
      .field input, .field select, .field textarea { font-size: 16px; } /* prevents iOS zoom */

      /* Modal — full screen on mobile */
      #emp-modal-wrap > div { width: 100% !important; max-width: 100% !important; max-height: 100vh !important; border-radius: 0 !important; }

      /* Detail panel — stack attendance + calc vertically */
      .detail-grid { grid-template-columns: 1fr !important; }

      /* Payslip grid — stack earnings/deductions */
      .payslip-grid { grid-template-columns: 1fr !important; }

      /* Negative balance banner table — card layout */
      .neg-banner-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .neg-banner-table thead { display: none; }
      .neg-banner-table tr { display: block; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(220,53,69,.25); padding: 8px 10px; }
      .neg-banner-table td { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border: none; }
      .neg-banner-table td::before { content: attr(data-label); font-weight: 600; color: var(--danger); font-size: 11px; margin-right: 8px; }

      /* Payment run table — mobile replaced by JS-rendered cards */
      .pay-run-table { width: 100%; border-collapse: collapse; }
      .pay-run-table thead { display: none; }
      .pay-run-table tr { display: block; margin: 0 0 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
      .pay-run-table tr[style*="opacity:.55"] { opacity: .6; }
      .pay-run-table tr[style*="danger-light"] { border-color: rgba(220,53,69,.35) !important; }
      .pay-run-table td { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(0,0,0,.04); font-size: 13px; }
      .pay-run-table td:last-child { border-bottom: none; padding-bottom: 13px; }
      .pay-run-table td::before { content: attr(data-label); font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
      .pay-run-table td:first-child { flex-direction: column; align-items: flex-start; padding: 0; }
      /* JS-rendered mobile cards */
      .pay-mob-list { padding: 10px; display: flex; flex-direction: column; gap: 12px; }
      .pay-mob-card { border-radius: 14px; border: 1px solid var(--border); background: var(--surface); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
      .pay-mob-card.neg { border-color: rgba(220,53,69,.35); }
      .pay-mob-card.done { opacity: .6; pointer-events: none; }
      .pay-mob-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
      .pay-mob-card.neg .pay-mob-hdr { background: var(--danger-light); border-bottom-color: rgba(220,53,69,.25); }
      .pay-mob-name { display: block; font-weight: 700; font-size: 15px; flex: 1; min-width: 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pay-mob-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(0,0,0,.04); font-size: 13px; }
      .pay-mob-row:last-child { border-bottom: none; padding-bottom: 13px; }
      .pay-mob-row > span:first-child { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
      .pay-mob-input { width: 120px; padding: 7px 10px; font-size: 14px !important; border-radius: 8px; text-align: right; border: 1.5px solid var(--border-2); background: var(--surface); color: var(--text); }
      .pay-mob-select { padding: 7px 10px; font-size: 14px !important; border-radius: 8px; border: 1.5px solid var(--border-2); background: var(--surface); color: var(--text); }
      .pay-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: .03em; text-transform: uppercase; white-space: nowrap; }
      .pay-badge.paid { background: #d1fae5; color: #065f46; }
      .pay-badge.neg  { background: #fee2e2; color: #991b1b; }
      .pay-badge.pend { background: #fef3c7; color: #92400e; }
      .pay-badge.cfwd { background: #ccfbf1; color: #0f766e; }
      .pay-mob-card.cfwd { border-color: rgba(20,184,166,.35); opacity: .8; }
      .pay-mob-card.cfwd .pay-mob-hdr { background: rgba(20,184,166,.08); border-bottom-color: rgba(20,184,166,.2); }
      /* Status badge + emp name span — desktop only */
      .pay-status-badge, .pay-emp-name { display: none; }
    }
  </style>
</head>
<body>


<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen hidden">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">M</div>
      <h1>MP&#x2009;SAL</h1>
      <p>Mahitha Prasad Payroll</p>
    </div>
    <div class="card">
      <div style="text-align:center;margin-bottom:16px">
        <span style="font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase">Admin</span>
      </div>
      <div class="field">
        <label id="pin-label">Admin PIN</label>
        <input type="password" class="pin-input" id="pin-input" maxlength="6" placeholder="••••••"
          onkeydown="if(event.key==='Enter') Auth.login()" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="Auth.login()">Login</button>
    </div>
    <div class="login-footer">
      <button class="theme-toggle" onclick="App.toggleTheme()">Toggle theme</button>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN (shell only — content injected by JS) -->
<div id="screen-admin" class="screen hidden"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>

// ============================================================
// MP-SAL Payroll — Frontend App
// ============================================================

// ---- State ----
const State = {
  role: null, pin: null, gasUrl: null,
  employees: [], holidays: [], advances: [], payroll: [],
  payments: [], bonusPool: [], settings: {},
  currentMonth: (function() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  })(),
  advStartDate: '',
  advEndDate: new Date().toISOString().split('T')[0],
  parsedAttendance: null,
  unmatchedAttendance: [],
  attendanceMap: {}   // emp_id → parsed day array
};

function getTeams() {
  return (State.settings.TEAMS || 'Emb,Stitching').split(',').map(t => t.trim()).filter(Boolean);
}

// ---- API ----
const API = {
  async call(action, data) {
    const body = { action, data, pin: State.pin, role: State.role };
    const res = await fetch(State.gasUrl, { method: 'POST', body: JSON.stringify(body) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'API error');
    return json;
  }
};

// ---- Toast ----
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ---- App init ----

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

// ============================================================
// PETPOOJA PARSER
// ============================================================
const Parser = {
  parse(fileData) {
    const wb = XLSX.read(fileData, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const employees = [];

    for (let i = 0; i < rows.length; i++) {
      const cell = String(rows[i][0] || '').trim();
      if (!cell.includes('Employee Name:')) continue;

      const nameM  = cell.match(/Employee Name:\s*(.+?)\s+Department:/);
      const deptM  = cell.match(/Department:\s*(.+?)\s+Designation:/);
      const idM    = cell.match(/Employee ID:\s*(\d+)/);
      const fromM  = cell.match(/From:\s*(\d{4}-\d{2}-\d{2})/);
      const toM    = cell.match(/To:\s*(\d{4}-\d{2}-\d{2})/);

      // Use "To" date month if available (more reliable for multi-month pay periods),
      // otherwise fall back to "From" date month
      const payMonth = toM ? toM[1].substring(0, 7) : (fromM ? fromM[1].substring(0, 7) : '');

      const emp = {
        name: nameM ? nameM[1].trim() : '',
        department: deptM ? deptM[1].trim() : '',
        petpooja_id: idM ? String(parseInt(idM[1])) : '',
        month: payMonth,
        days: []
      };

      // Scan next 18 rows for Day / Status / Total Hrs / In Time / Out Time
      let dayRow = null, statusRow = null, hrsRow = null, inRow = null, outRow = null;
      for (let j = i + 1; j < Math.min(i + 22, rows.length); j++) {
        const lbl = String(rows[j][0] || '').trim().toLowerCase();
        if (lbl === 'day')                                   dayRow    = rows[j];
        if (lbl === 'status')                                statusRow = rows[j];
        if (lbl === 'total hrs' || lbl === 'total hours')   hrsRow    = rows[j];
        if (lbl === 'in time'   || lbl === 'punch in'  || lbl === 'first in')  inRow  = rows[j];
        if (lbl === 'out time'  || lbl === 'punch out' || lbl === 'last out')  outRow = rows[j];
        if (hrsRow && inRow && outRow) break;
      }

      if (dayRow && statusRow && hrsRow) {
        for (let d = 1; d < dayRow.length; d++) {
          const header  = String(dayRow[d] || '').trim();
          const dm      = header.match(/(\d+)\s*\((\w+)\)/);
          if (!dm) continue;

          const dayNum  = parseInt(dm[1]);
          const dayName = dm[2];
          const status  = String(statusRow[d] || '').trim();
          const hrsStr  = String(hrsRow[d] || '').trim();
          const inStr   = inRow  ? String(inRow[d]  || '').trim() : '';
          const outStr  = outRow ? String(outRow[d] || '').trim() : '';

          let totalHours = 0;
          if (hrsStr && hrsStr !== '-') {
            const hm = hrsStr.match(/(\d+)h(?:\s*(\d+)m)?/);
            if (hm) totalHours = parseInt(hm[1]) + (parseInt(hm[2] || 0)) / 60;
          }

          const month = emp.month;
          emp.days.push({
            day: dayNum, dayName, status, totalHours,
            punchIn: inStr, punchOut: outStr,
            date: month + '-' + String(dayNum).padStart(2, '0')
          });
        }
        // Skip terminated employees — Petpooja appends "(Terminated)" to name
        if (emp.name.toLowerCase().includes('terminated')) continue;
        employees.push(emp);
      }
    }
    return employees;
  }
};

// ============================================================
// ATTENDANCE ANOMALY DETECTOR
// ============================================================
const AnomalyDetector = {
  // Parse "HH:MM AM/PM" or "HH:MM" into decimal hours
  parseTime(str) {
    if (!str) return null;
    const m = str.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if (!m) return null;
    let h = parseInt(m[1]), min = parseInt(m[2]);
    const ampm = (m[3] || '').toUpperCase();
    if (ampm === 'PM' && h < 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h + min / 60;
  },

  // Calculate hours from punch in/out, respecting 5 AM next-day boundary
  calcHoursFromPunch(inStr, outStr) {
    const inH  = this.parseTime(inStr);
    const outH = this.parseTime(outStr);
    if (inH === null || outH === null) return null;
    let diff = outH - inH;
    // If out < in or out is before 5 AM, treat as next-day punch out
    if (diff <= 0 || outH < 5) diff += 24;
    return diff;
  },

  detect(parsedEmployees) {
    const anomalies = []; // { empName, date, day, punchIn, punchOut, calcHours, type }
    const isEmpty = s => !s || s.trim() === '' || s.trim() === '-' || s.trim() === '--';
    for (const emp of parsedEmployees) {
      for (const day of emp.days) {
        if (day.status !== 'Absent') continue;
        const hasIn  = !isEmpty(day.punchIn);
        const hasOut = !isEmpty(day.punchOut);
        if (!hasIn && !hasOut) continue;

        if (hasIn && hasOut) {
          const calcHours = this.calcHoursFromPunch(day.punchIn, day.punchOut);
          anomalies.push({ empName: emp.name, petpooja_id: emp.petpooja_id, date: day.date, day: day.day, dayName: day.dayName,
            punchIn: day.punchIn, punchOut: day.punchOut, calcHours, type: 'both' });
        } else {
          anomalies.push({ empName: emp.name, petpooja_id: emp.petpooja_id, date: day.date, day: day.day, dayName: day.dayName,
            punchIn: day.punchIn || '', punchOut: day.punchOut || '', calcHours: null, type: 'partial' });
        }
      }
    }
    return anomalies;
  }
};

// ============================================================
// SALARY CALCULATOR
// ============================================================
const Calc = {
  run(empAttendance, dbEmployee, advancesForMonth, holidays, settings) {
    const weekly  = Number(dbEmployee.weekly_salary) - (dbEmployee.company_room === 'Yes' ? 200 : 0);
    const daily   = weekly / 6;
    const hourly  = daily / 9;

    const shortfallThresh = parseFloat(settings.SHORTFALL_THRESHOLD_HOURS || 8.5);
    const addLunch        = settings.ADD_LUNCH_TO_OT === 'true';
    const lunchHrs        = parseFloat(settings.LUNCH_DURATION_HOURS || 1);
    const otMinHours      = parseFloat(settings.OT_MIN_HOURS || 10);
    const otRound         = parseInt(settings.OT_ROUND_MINUTES || 15);
    const bonusMinDays    = parseInt(settings.BONUS_ELIGIBILITY_MIN_DAYS || 6);
    const empContrib      = parseInt(settings.EMPLOYEE_CONTRIBUTION || 500);

    const holidayDates = new Set(holidays.map(h => h.date));

    // Pre-index days by date for holiday neighbor checks
    const presentStatuses = new Set(['FD', 'HD']);
    const daysByDate = {};
    for (const d of empAttendance.days) daysByDate[d.date] = d;
    const sortedDates = Object.keys(daysByDate).sort();

    let fullDays = 0, halfDays = 0, absentDays = 0, weekOffDays = 0, holidayAbsent = 0;
    let otWeekdayMin = 0, otSundayMin = 0, otHolidayMin = 0, shortfallMin = 0;
    let borderlineDays = 0;

    for (const day of empAttendance.days) {
      const isSunday  = day.dayName === 'Sunday';
      const isHoliday = holidayDates.has(day.date);

      if (isSunday) {
        weekOffDays++;
        if (day.totalHours > 0) {
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otSundayMin += Math.floor(rawMin / otRound) * otRound;
        }
      } else if (isHoliday) {
        if (day.status === 'FD') {
          fullDays++;
          // Present on holiday: counts as FD + all hours as holiday OT
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otHolidayMin += Math.floor(rawMin / otRound) * otRound;
        } else if (day.status === 'HD') {
          halfDays++;
          if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
            shortfallMin += Math.round((9 - day.totalHours) * 60);
          } else if (day.totalHours >= shortfallThresh && day.totalHours < 9) {
            borderlineDays++;
          }
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otHolidayMin += Math.floor(rawMin / otRound) * otRound;
        } else {
          // Absent on holiday = paid only if present at least 1 day before AND after
          const idx = sortedDates.indexOf(day.date);
          const presentBefore = sortedDates.slice(0, idx).some(d => presentStatuses.has(daysByDate[d].status));
          const presentAfter  = sortedDates.slice(idx + 1).some(d => presentStatuses.has(daysByDate[d].status));
          if (presentBefore && presentAfter) {
            holidayAbsent++;
          } else {
            absentDays++;
          }
        }
      } else if (day.status === 'FD') {
        fullDays++;
        if (day.totalHours >= otMinHours) {
          const rawOt = day.totalHours - 9;
          const rounded = Math.floor(rawOt * 60 / otRound) * otRound;
          otWeekdayMin += rounded;
        } else if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
          shortfallMin += Math.round((9 - day.totalHours) * 60);
        } else if (day.totalHours >= shortfallThresh && day.totalHours < 9) {
          borderlineDays++;
        }
      } else if (day.status === 'HD') {
        halfDays++;
        if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
          shortfallMin += Math.round((9 - day.totalHours) * 60);
        } else if (day.totalHours >= shortfallThresh && day.totalHours < 9) {
          borderlineDays++;
        }
      } else if (day.status === 'Absent') {
        absentDays++;
      }
    }

    const TD        = fullDays + halfDays + holidayAbsent;
    const gross     = TD * daily;
    const allOtMin  = otWeekdayMin + otSundayMin + otHolidayMin;
    const otEarn    = (allOtMin / 60) * hourly;
    const shortfall = (shortfallMin / 60) * hourly;

    const workDays      = fullDays + halfDays;
    let bonusEligible = workDays >= bonusMinDays;
    let bonusCut      = bonusEligible ? empContrib : 0;
    // Respect bonus_scheme field: if not 'Yes', never eligible/cut
    if (dbEmployee.bonus_scheme !== 'Yes') { bonusEligible = false; bonusCut = 0; }

    const totalAdv = advancesForMonth.reduce((s, a) => s + Number(a.amount), 0);
    const net      = gross + otEarn - shortfall - bonusCut - totalAdv;

    return {
      emp_id: dbEmployee.emp_id, month: empAttendance.month,
      full_days: fullDays, half_days: halfDays, absent_days: absentDays,
      week_off_days: weekOffDays, holiday_absent_days: holidayAbsent,
      ot_weekday_min: otWeekdayMin, ot_sunday_min: otSundayMin, ot_holiday_min: otHolidayMin,
      shortfall_min: shortfallMin,
      weekly_salary: weekly, daily_rate: Math.round(daily * 100) / 100,
      hourly_rate: Math.round(hourly * 100) / 100,
      TD, gross_pay: Math.round(gross), ot_earnings: Math.round(otEarn),
      shortfall_deduction: Math.round(shortfall),
      bonus_eligible: bonusEligible, bonus_cut: bonusCut,
      total_advances: totalAdv, net_pay: Math.round(net),
      borderline_days: borderlineDays,
      status: 'draft'
    };
  },

  matchEmployee(parsed, dbEmployees) {
    const active = dbEmployees.filter(e => e.status === 'Active');
    const norm = s => (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
    // 1. Petpooja ID
    const byId = active.find(e => String(e.petpooja_id) === String(parsed.petpooja_id) && parsed.petpooja_id);
    if (byId) return byId;
    // 2. Petpooja name (exact)
    const byPName = active.find(e => norm(e.petpooja_name) === norm(parsed.name));
    if (byPName) return byPName;
    // 3. Employee name (exact)
    const byName = active.find(e => norm(e.name) === norm(parsed.name));
    if (byName) return byName;
    // 4. Partial name — only if names are non-empty to avoid false matches
    const pn = norm(parsed.name);
    return active.find(e => {
      const en = norm(e.name), epn = norm(e.petpooja_name);
      return (en && (pn.includes(en) || en.includes(pn))) ||
             (epn && (pn.includes(epn) || epn.includes(pn)));
    }) || null;
  },
};

    try {
      const r = await API.call('getPayroll', {});
      const finalized = (r.data || []).filter(p => p.status === 'finalized' && p.adv_end_date);
      if (!finalized.length) return;
      const lastEnd = finalized.map(p => p.adv_end_date).sort().pop();
      const d = new Date(lastEnd); d.setDate(d.getDate() + 1);
      State.advStartDate = d.toISOString().split('T')[0];
      const el = document.getElementById('adv-start');
      if (el) el.value = State.advStartDate;
    } catch(e) {}
  },

  onMonthChange(m) {
    State.currentMonth = m;
    const banner = document.getElementById('payroll-finalized-banner');
    if (banner) banner.style.display = 'none';
  },

  async onUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = Parser.parse(new Uint8Array(ev.target.result));
        if (!parsed.length) { toast('No employee data found in file', 'error'); return; }

        // Auto-set month from Excel (uses To date if available, else From date)
        const detectedMonth = parsed[0].month;
        if (detectedMonth) {
          State.currentMonth = detectedMonth;
          const picker = document.getElementById('payroll-month');
          if (picker) picker.value = detectedMonth;
        }

        State.advStartDate = document.getElementById('adv-start')?.value || '';
        State.advEndDate   = document.getElementById('adv-end')?.value   || '';

        const advFilter = { status: 'Approved' };
        if (State.advStartDate && State.advEndDate) {
          advFilter.start_date = State.advStartDate;
          advFilter.end_date   = State.advEndDate;
        }
        const pendingFilter = Object.assign({}, advFilter, { status: 'Pending' });
        const [holRes, advRes, pendingRes] = await Promise.all([
          API.call('getHolidays', { year: State.currentMonth.substring(0,4) }),
          API.call('getAdvances', advFilter),
          API.call('getAdvances', pendingFilter)
        ]);
        State.holidays = holRes.data || [];
        State.advances = advRes.data || [];
        State.pendingAdvances = pendingRes.data || [];

        // Match and calculate
        const matched = [], unmatched = [];
        for (const emp of parsed) {
          const dbEmp = Calc.matchEmployee(emp, State.employees);
          if (dbEmp) {
            const empId = String(dbEmp.emp_id).trim();
            const advances = State.advances.filter(a => String(a.emp_id).trim() === empId);
            const pending  = State.pendingAdvances.filter(a => String(a.emp_id).trim() === empId);
            const rec = Calc.run(emp, dbEmp, advances, State.holidays, State.settings);
            rec._pendingAdvances = pending;  // carry through for warning display
            rec.month = State.currentMonth; // always use selected month, not Excel's From date
            matched.push(rec);
            State.attendanceMap[dbEmp.emp_id] = emp.days;
          } else {
            unmatched.push(emp);
          }
        }
        State.payroll = matched;
        State.unmatchedAttendance = unmatched;

        // Detect attendance anomalies
        const anomalies = AnomalyDetector.detect(parsed);
        this.renderAnomalies(anomalies, parsed);

        this.renderUnmatched(unmatched);
        this.renderTable(matched);
        if (matched.length) {
          toast(`Calculated payroll for ${matched.length} employee(s) — ${unmatched.length} unmatched${anomalies.length ? ` — ${anomalies.length} anomaly(s) detected` : ''}`, 'success');
          // Persist attendance_json even for finalized months so Detail view works after reload
          this._patchAttendanceJson();
        } else {
          toast(`0 employees matched. Use the mapping panel below to assign them manually.`, 'error');
        }
      } catch(err) {
        console.error('Upload error:', err);
        toast('Error: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  },

  async _patchAttendanceJson() {
    const records = State.payroll
      .filter(p => State.attendanceMap[p.emp_id]?.length)
      .map(p => ({ emp_id: p.emp_id, month: p.month, attendance_json: JSON.stringify(State.attendanceMap[p.emp_id]) }));
    if (!records.length) return;
    try { await API.call('patchAttendanceJson', { records }); } catch(e) { /* silent */ }
  },

  renderAnomalies(anomalies, parsed) {
    const c = document.getElementById('payroll-anomalies');
    if (!c) return;
    if (!anomalies.length) { c.innerHTML = ''; return; }
    const rows = anomalies.map((a, i) => {
      const calcLabel = a.calcHours !== null ? `${Math.floor(a.calcHours)}h ${Math.round((a.calcHours % 1) * 60)}m` : '—';
      if (a.type === 'both') {
        return `<tr id="anom-row-${i}" style="border-top:1px solid rgba(220,53,69,.2)">
          <td style="padding:7px 10px;font-weight:600">${a.empName}</td>
          <td style="padding:7px 10px">${a.date} (${a.dayName})</td>
          <td style="padding:7px 10px">${a.punchIn} → ${a.punchOut}</td>
          <td style="padding:7px 10px;color:var(--success);font-weight:600">${calcLabel}</td>
          <td style="padding:7px 10px">
            <button class="btn btn-sm" style="background:var(--success);color:#fff;border:none;margin-right:4px"
              onclick="Views.Payroll.acceptAnomaly(${i})">✓ Accept ${calcLabel}</button>
            <button class="btn btn-sm btn-secondary" onclick="Views.Payroll.dismissAnomaly(${i})">Dismiss</button>
          </td>
        </tr>`;
      } else {
        return `<tr id="anom-row-${i}" style="border-top:1px solid rgba(220,53,69,.2)">
          <td style="padding:7px 10px;font-weight:600">${a.empName}</td>
          <td style="padding:7px 10px">${a.date} (${a.dayName})</td>
          <td style="padding:7px 10px">${a.punchIn ? '🟢 In: ' + a.punchIn : ''}${a.punchOut ? ' 🔴 Out: ' + a.punchOut : ''} <span style="color:var(--danger)">(incomplete)</span></td>
          <td style="padding:7px 10px">
            <input type="number" id="anom-hrs-${i}" placeholder="hours" min="0" max="24" step="0.5"
              style="width:80px;padding:4px 6px;font-size:12px;margin-right:4px" />
          </td>
          <td style="padding:7px 10px">
            <button class="btn btn-sm" style="background:var(--warning);color:#fff;border:none;margin-right:4px"
              onclick="Views.Payroll.acceptAnomalyManual(${i})">✓ Apply Hours</button>
            <button class="btn btn-sm btn-secondary" onclick="Views.Payroll.dismissAnomaly(${i})">Dismiss</button>
          </td>
        </tr>`;
      }
    }).join('');

    c.innerHTML = `
      <div style="background:var(--danger-light,#fef2f2);border:1px solid var(--danger);border-radius:8px;padding:14px 16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:18px">⚠️</span>
          <strong style="color:var(--danger);font-size:14px">Attendance Anomalies — ${anomalies.length} day${anomalies.length > 1 ? 's' : ''} flagged</strong>
          <span style="flex:1"></span>
          <button onclick="document.getElementById('payroll-anomalies').innerHTML=''" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;line-height:1;padding:0">✕</button>
        </div>
        <p style="font-size:13px;color:var(--danger);margin:0 0 12px">Employees marked Absent but have punch records. Possible correction entry error in Petpooja.</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:rgba(220,53,69,.1)">
            <th style="padding:7px 10px;text-align:left;color:var(--danger)">Employee</th>
            <th style="padding:7px 10px;text-align:left;color:var(--danger)">Date</th>
            <th style="padding:7px 10px;text-align:left;color:var(--danger)">Punch Times</th>
            <th style="padding:7px 10px;text-align:left;color:var(--danger)">Calc Hours</th>
            <th style="padding:7px 10px"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    // Store anomalies for use in accept handlers
    this._anomalies = anomalies;
    this._parsedForAnomalies = parsed;
  },

  acceptAnomaly(idx, anomaly) {
    const a = this._anomalies[idx];
    if (!a || a.calcHours === null) return;
    // Find the employee in parsed data and fix the day
    const emp = this._parsedForAnomalies.find(e => e.petpooja_id === a.petpooja_id || e.name === a.empName);
    if (!emp) { toast('Employee not found in parsed data', 'error'); return; }
    const day = emp.days.find(d => d.date === a.date);
    if (!day) { toast('Day not found', 'error'); return; }
    // Apply corrected hours — status becomes FD or HD based on hours
    day.totalHours = a.calcHours;
    day.status = a.calcHours >= 4 ? (a.calcHours >= 9 ? 'FD' : 'HD') : 'Absent';
    // Recalculate payroll for this employee
    const dbEmp = State.employees.find(e => {
      const pid = String(e.petpooja_id || '').trim();
      return pid && pid === String(a.petpooja_id).trim();
    }) || State.employees.find(e => e.name === a.empName);
    if (dbEmp) {
      const advances = State.advances.filter(adv => String(adv.emp_id).trim() === String(dbEmp.emp_id).trim());
      const newRec = Calc.run(emp, dbEmp, advances, State.holidays, State.settings);
      const pi = State.payroll.findIndex(p => p.emp_id === dbEmp.emp_id);
      if (pi >= 0) {
        newRec.payroll_id = State.payroll[pi].payroll_id;
        newRec.status = State.payroll[pi].status;
        newRec.adv_start_date = State.payroll[pi].adv_start_date;
        newRec.adv_end_date = State.payroll[pi].adv_end_date;
        State.payroll[pi] = newRec;
        State.attendanceMap[dbEmp.emp_id] = emp.days;
      }
      this.renderTable(State.payroll);
    }
    this.dismissAnomaly(idx);
    toast(`${a.empName} ${a.date} corrected to ${day.status} (${a.calcHours.toFixed(1)}h)`, 'success');
  },

  acceptAnomalyManual(idx, anomaly) {
    const a = this._anomalies[idx];
    if (!a) return;
    const hrs = parseFloat(document.getElementById(`anom-hrs-${idx}`)?.value);
    if (!hrs || hrs <= 0) { toast('Enter valid hours', 'error'); return; }
    const emp = this._parsedForAnomalies.find(e => e.petpooja_id === a.petpooja_id || e.name === a.empName);
    if (!emp) { toast('Employee not found', 'error'); return; }
    const day = emp.days.find(d => d.date === a.date);
    if (!day) { toast('Day not found', 'error'); return; }
    day.totalHours = hrs;
    day.status = hrs >= 4 ? (hrs >= 9 ? 'FD' : 'HD') : 'Absent';
    const dbEmp = State.employees.find(e => {
      const pid = String(e.petpooja_id || '').trim();
      return pid && pid === String(a.petpooja_id).trim();
    }) || State.employees.find(e => e.name === a.empName);
    if (dbEmp) {
      const advances = State.advances.filter(adv => String(adv.emp_id).trim() === String(dbEmp.emp_id).trim());
      const newRec = Calc.run(emp, dbEmp, advances, State.holidays, State.settings);
      const pi = State.payroll.findIndex(p => p.emp_id === dbEmp.emp_id);
      if (pi >= 0) {
        newRec.payroll_id = State.payroll[pi].payroll_id;
        newRec.status = State.payroll[pi].status;
        newRec.adv_start_date = State.payroll[pi].adv_start_date;
        newRec.adv_end_date = State.payroll[pi].adv_end_date;
        State.payroll[pi] = newRec;
        State.attendanceMap[dbEmp.emp_id] = emp.days;
      }
      this.renderTable(State.payroll);
    }
    this.dismissAnomaly(idx);
    toast(`${a.empName} ${a.date} corrected to ${day.status} (${hrs}h)`, 'success');
  },

  dismissAnomaly(idx) {
    const row = document.getElementById(`anom-row-${idx}`);
    if (row) row.remove();
    // If no rows left, remove the whole banner
    const tbody = document.querySelector('#payroll-anomalies tbody');
    if (tbody && !tbody.querySelector('tr')) document.getElementById('payroll-anomalies').innerHTML = '';
  },

  renderUnmatched(list) {
    const c = document.getElementById('payroll-unmatched');
    if (!list.length) { c.innerHTML = ''; return; }
    c.innerHTML = `<div class="card" style="margin-bottom:12px;border-color:var(--warning)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <strong style="font-size:14px">⚠ ${list.length} Petpooja employee(s) not matched — will be skipped</strong>
        <span style="flex:1"></span>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('payroll-unmatched').innerHTML=''">Dismiss</button>
      </div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <thead><tr><th style="text-align:left;padding:4px 8px">Petpooja Name (ID)</th><th style="padding:4px 8px">Map to Employee</th><th></th></tr></thead>
        <tbody>${list.map((u, i) => `
          <tr>
            <td style="padding:4px 8px">${u.name} <span style="color:var(--muted)">(ID:${u.petpooja_id})</span></td>
            <td style="padding:4px 8px">
              <select id="map-${i}" style="padding:4px">
                <option value="">— select —</option>
                ${State.employees.filter(e => e.status==='Active').map(e =>
                  `<option value="${e.emp_id}">${e.name}</option>`).join('')}
              </select>
            </td>
            <td style="padding:4px 8px">
              <button class="btn btn-primary btn-sm" onclick="Views.Payroll.resolveUnmatched(${i})">Apply</button>
            </td>
          </tr>`).join('')}
      </tbody></table></div>`;
  },

  async resolveUnmatched(i) {
    const empId = document.getElementById('map-' + i).value;
    if (!empId) { toast('Select an employee', 'error'); return; }
    const dbEmp = State.employees.find(e => e.emp_id === empId);
    const att   = State.unmatchedAttendance[i];
    const advances = State.advances.filter(a => a.emp_id === empId);
    const rec   = Calc.run(att, dbEmp, advances, State.holidays, State.settings);
    rec.month   = State.currentMonth;
    State.payroll.push(rec);
    State.attendanceMap[empId] = att.days;
    State.unmatchedAttendance.splice(i, 1);
    this.renderUnmatched(State.unmatchedAttendance);
    this.renderTable(State.payroll);

    // Save petpooja_id to the employee record so future uploads auto-match
    if (att.petpooja_id && !dbEmp.petpooja_id) {
      try {
        await API.call('saveEmployee', Object.assign({}, dbEmp, { petpooja_id: att.petpooja_id }));
        dbEmp.petpooja_id = att.petpooja_id;
        toast('Mapped ' + dbEmp.name + ' — Petpooja ID saved for future uploads', 'success');
      } catch(e) {
        toast('Mapped ' + dbEmp.name, 'success');
      }
    } else {
      toast('Mapped ' + dbEmp.name, 'success');
    }
  },

          ${p.total_advances === 0 && p.status !== 'finalized' ? `<br><a href="javascript:void(0)" style="font-size:10px;color:var(--primary)" onclick="Views.Payroll.debugAdvances('${p.emp_id}')">check advances</a>` : ''}

      <tr id="prow-detail-${idx}" class="hidden">

        <td colspan="12" style="padding:16px 12px">
          ${this.renderEditPanel(p, idx)}

            <span style="font-weight:700;color:var(--danger)">⚠ Carry ${fmt(Math.abs(p.net_pay))} forward as advance</span>
            <div style="display:flex;align-items:center;gap:6px">
              <label style="font-size:11px;white-space:nowrap;margin:0">Deduct on date</label>
              <input type="date" id="carry-date-${idx}" value="${new Date().toISOString().split('T')[0]}"
                style="padding:4px 8px;font-size:13px;width:auto" />
            </div>
            <button id="carry-btn-${idx}" class="btn btn-primary btn-sm" onclick="Views.Payroll.confirmCarryForward(${idx})">Confirm &amp; Save</button>

    wrap.innerHTML = `
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead style="background:var(--surface2)">
        <tr>
          <th style="padding:10px 8px;text-align:left">Employee</th>
          <th style="padding:10px 8px">FD</th><th style="padding:10px 8px">HD</th>
          <th style="padding:10px 8px">TD</th>
          <th style="padding:10px 8px;text-align:right">Gross</th>
          <th style="padding:10px 8px;text-align:right">OT</th>
          <th style="padding:10px 8px;text-align:right">Shortfall</th>
          <th style="padding:10px 8px;text-align:right">Advance</th>
          <th style="padding:10px 8px;text-align:right">Bonus↓</th>
          <th style="padding:10px 8px;text-align:right">Net Pay</th>
          <th style="padding:10px 8px">Status</th>
          <th style="padding:10px 8px"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="margin-top:12px;font-size:13px;color:var(--muted)">
      ${payroll.length} employees &nbsp;|&nbsp;
      Total net: <strong>${fmt(payroll.reduce((s,p)=>s+p.net_pay,0))}</strong>
    </div>`;
  },

  renderEditPanel(p, idx) {
    return `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
      <div class="field"><label>Full Days</label><input type="number" id="edit-fd-${idx}" value="${p.full_days}" min="0" /></div>
      <div class="field"><label>Half Days</label><input type="number" id="edit-hd-${idx}" value="${p.half_days}" min="0" /></div>

  _dayCalc(day, hourly, settings, holidayDates) {
    const shortfallThresh = parseFloat(settings.SHORTFALL_THRESHOLD_HOURS || 8.5);
    const otMinHours      = parseFloat(settings.OT_MIN_HOURS || 10);
    const otRound         = parseInt(settings.OT_ROUND_MINUTES || 15);
    const addLunch        = settings.ADD_LUNCH_TO_OT === 'true';
    const lunchHrs        = parseFloat(settings.LUNCH_DURATION_HOURS || 1);
    const isSunday        = day.dayName === 'Sunday';
    const isHoliday       = holidayDates.has(day.date);
    let otMin = 0, shortfallMin = 0, tag = '', tagStyle = '';

    if (isSunday) {
      if (day.totalHours > 0) {
        const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
        otMin = Math.floor(rawMin / otRound) * otRound;
        tag = 'Sun OT'; tagStyle = 'background:#dbeafe;color:#1d4ed8';
      } else { tag = 'Off'; tagStyle = 'color:var(--muted)'; }
    } else if (isHoliday) {
      if (day.status === 'Absent') {
        tag = 'Paid Holiday'; tagStyle = 'background:#dcfce7;color:#15803d';
      } else {
        const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
        otMin = Math.floor(rawMin / otRound) * otRound;
        tag = 'Hol OT'; tagStyle = 'background:#fef3c7;color:#92400e';
      }
    } else if (day.status === 'FD') {
      if (day.totalHours >= otMinHours) {
        otMin = Math.floor((day.totalHours - 9) * 60 / otRound) * otRound;
        tag = 'OT'; tagStyle = 'background:#dcfce7;color:#15803d';
      } else if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
        shortfallMin = Math.round((9 - day.totalHours) * 60);
        tag = 'Short'; tagStyle = 'background:#fee2e2;color:#dc2626';
      }
    } else if (day.status === 'HD') {
      shortfallMin = Math.round((9 - day.totalHours) * 60);
      tag = '½ Day'; tagStyle = 'background:#fef3c7;color:#92400e';
    }
    return { otMin, shortfallMin, otEarn: (otMin/60)*hourly, sfDeduct: (shortfallMin/60)*hourly, tag, tagStyle, isSunday, isHoliday };
  },

  // Live-preview a single row's OT/shortfall/amount as user edits it
  previewDayCalc(idx, di) {
    const emp    = State.employees.find(e => e.emp_id === State.payroll[idx]?.emp_id);
    const daily  = ((emp?.weekly_salary || 0) - (emp?.company_room === 'Yes' ? 200 : 0)) / 6;
    const hourly = daily / 9;
    const holidayDates = new Set((State.holidays||[]).map(h => h.date));

    const days = State.attendanceMap[State.payroll[idx]?.emp_id];
    if (!days) return;
    const day = days[di];

    const status = document.getElementById(`ds-${idx}-${di}`)?.value || day.status;
    const h = parseInt(document.getElementById(`dh-${idx}-${di}`)?.value || 0);
    const m = parseInt(document.getElementById(`dm-${idx}-${di}`)?.value || 0);
    const fakeDay = { ...day, status, totalHours: h + m/60 };

    const c = this._dayCalc(fakeDay, hourly, State.settings, holidayDates);
    const otEl  = document.getElementById(`dot-${idx}-${di}`);
    const sfEl  = document.getElementById(`dsf-${idx}-${di}`);
    const amEl  = document.getElementById(`dam-${idx}-${di}`);
    if (otEl) otEl.textContent = c.otMin > 0 ? '+'+c.otMin+'m' : '—';
    if (sfEl) sfEl.textContent = c.shortfallMin > 0 ? '-'+c.shortfallMin+'m' : '—';
    if (amEl) amEl.innerHTML  = c.otEarn > 0 ? `<span style="color:var(--success)">+${fmt(c.otEarn)}</span>`
                               : c.sfDeduct > 0 ? `<span style="color:var(--danger)">-${fmt(c.sfDeduct)}</span>` : '<span style="color:var(--muted)">—</span>';
  },

  saveAttendanceEdits(idx) {
    const p    = State.payroll[idx];
    const emp  = State.employees.find(e => e.emp_id === p.emp_id);
    const days = State.attendanceMap[p.emp_id];
    if (!days) { toast('No attendance data to save', 'error'); return; }

    // Read edited values back into attendanceMap
    days.forEach((day, di) => {
      const statusEl = document.getElementById(`ds-${idx}-${di}`);
      const hEl = document.getElementById(`dh-${idx}-${di}`);
      const mEl = document.getElementById(`dm-${idx}-${di}`);
      if (statusEl) day.status = statusEl.value;
      if (hEl && mEl) day.totalHours = parseInt(hEl.value||0) + parseInt(mEl.value||0)/60;
    });

    // Recalculate
    const advances = State.advances.filter(a => a.emp_id === p.emp_id);
    const fakeAtt  = { days, month: p.month };
    const newRec   = Calc.run(fakeAtt, emp, advances, State.holidays, State.settings);
    newRec.payroll_id    = p.payroll_id;
    newRec.status        = p.status;
    newRec.finalized_date = p.finalized_date;
    newRec.notes         = p.notes;
    State.payroll[idx]   = newRec;

    this.renderTable(State.payroll);
    // Re-open detail panel after re-render
    setTimeout(() => {
      document.getElementById('prow-detail-' + idx)?.classList.remove('hidden');
    }, 50);
    toast('Attendance saved & recalculated', 'success');
  },

  async reopenRecord(idx) {
    const p   = State.payroll[idx];
    const emp = State.employees.find(e => e.emp_id === p.emp_id);
    const name = emp?.name || p.emp_id;
    if (!confirm(`Reopen ${name}'s record for ${p.month}?\n\nThis sets their payroll back to draft so you can make corrections, then re-finalise.\n\nNote: this only affects this one employee — other records remain finalised.`)) return;
    try {
      await API.call('reopenPayrollRecord', { emp_id: p.emp_id, month: p.month });
      State.payroll[idx].status = 'draft';
      State.payroll[idx].finalized_date = '';
      // Close detail panel, re-render table so Edit button becomes available
      document.querySelectorAll('[id^="prow-detail-"]').forEach(r => r.classList.add('hidden'));
      this.renderTable(State.payroll);
      toast(`${name} reopened — make corrections, then Finalise Month`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  applyEdit(idx) {
    const p = State.payroll[idx];
    const g = id => parseFloat(document.getElementById(id)?.value || 0);
    p.full_days           = g(`edit-fd-${idx}`);
    p.half_days           = g(`edit-hd-${idx}`);
    p.holiday_absent_days = g(`edit-hol-${idx}`);
    p.ot_weekday_min      = g(`edit-otw-${idx}`);
    p.ot_sunday_min       = g(`edit-ots-${idx}`);
    p.shortfall_min       = g(`edit-sf-${idx}`);
    p.total_advances      = g(`edit-adv-${idx}`);
    p.bonus_cut           = g(`edit-bon-${idx}`);
    p.notes               = document.getElementById(`edit-note-${idx}`)?.value || '';

    const emp = State.employees.find(e => e.emp_id === p.emp_id);
    if (emp) {
      const daily  = (emp.weekly_salary - (emp.company_room === 'Yes' ? 200 : 0)) / 6;
      const hourly = daily / 9;
      p.TD              = p.full_days + p.half_days + p.holiday_absent_days;
      p.gross_pay       = Math.round(p.TD * daily);
      p.ot_earnings     = Math.round((p.ot_weekday_min + p.ot_sunday_min + p.ot_holiday_min) / 60 * hourly);
      p.shortfall_deduction = Math.round(p.shortfall_min / 60 * hourly);
      p.net_pay         = p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - p.total_advances;
    }
    this.renderTable(State.payroll);
    toast('Row updated', 'success');
  },

  async refreshAdvances() {
    if (!State.payroll.length) return;
    if (!State.advStartDate || !State.advEndDate) { toast('Set the advance period first', 'error'); return; }
    try {
      const advRes = await API.call('getAdvances', {
        status: 'Approved',
        start_date: State.advStartDate,
        end_date:   State.advEndDate
      });
      State.advances = advRes.data || [];
      let changed = 0;
      State.payroll.forEach(p => {
        if (p.status === 'finalized') return;
        const empAdv = State.advances.filter(a => String(a.emp_id).trim() === String(p.emp_id).trim());
        const advTotal = empAdv.reduce((s, a) => s + Number(a.amount), 0);
        if (advTotal !== p.total_advances) changed++;
        p.total_advances = advTotal;
        p.net_pay = Math.round(p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - advTotal);
      });
      this.renderTable(State.payroll);
      toast(changed ? `Updated ${changed} record(s) with latest advances` : 'Advances already up to date', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  recalculate() {
    if (!State.payroll.length) { toast('No payroll loaded', 'error'); return; }
    let count = 0;
    State.payroll.forEach((p, i) => {
      if (p.status === 'finalized') return;
      const emp = State.employees.find(e => e.emp_id === p.emp_id);
      if (!emp) return;
      const days = State.attendanceMap[p.emp_id];
      if (days && days.length) {
        // Full recalculation using attendance data
        const advances = State.advances.filter(a => a.emp_id === p.emp_id);
        const newRec = Calc.run({ days, month: p.month }, emp, advances, State.holidays, State.settings);
        newRec.payroll_id     = p.payroll_id;
        newRec.status         = p.status;
        newRec.finalized_date = p.finalized_date;
        newRec.notes          = p.notes;
        newRec.adv_start_date = p.adv_start_date;
        newRec.adv_end_date   = p.adv_end_date;
        State.payroll[i] = newRec;
      } else {
        // No attendance data — update salary-derived and bonus fields from current employee record
        const effectiveWeekly = emp.weekly_salary - (emp.company_room === 'Yes' ? 200 : 0);
        const daily  = effectiveWeekly / 6;
        const hourly = daily / 9;
        const bonusMinDays = parseInt(State.settings.BONUS_ELIGIBILITY_MIN_DAYS || 6);
        const empContrib   = parseInt(State.settings.EMPLOYEE_CONTRIBUTION || 500);
        const workDays     = (p.full_days || 0) + (p.half_days || 0);
        const bonusElig    = emp.bonus_scheme === 'Yes' && workDays >= bonusMinDays;
        p.weekly_salary         = effectiveWeekly;
        p.daily_rate            = Math.round(daily * 100) / 100;
        p.hourly_rate           = Math.round(hourly * 100) / 100;
        p.gross_pay             = Math.round(p.TD * daily);
        p.ot_earnings           = Math.round((p.ot_weekday_min + p.ot_sunday_min + p.ot_holiday_min) / 60 * hourly);
        p.shortfall_deduction   = Math.round(p.shortfall_min / 60 * hourly);
        p.bonus_eligible        = bonusElig;
        p.bonus_cut             = bonusElig ? empContrib : 0;
        p.net_pay               = Math.round(p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - p.total_advances);
      }
      count++;
    });
    this.renderTable(State.payroll);
    toast(`Recalculated ${count} employee(s) with current salaries`, 'success');
  },

  async saveDraft() {
    if (!State.payroll.length) { toast('Nothing to save', 'error'); return; }
    try {
      // Pull latest approved advances before saving so totals are current
      if (State.advStartDate && State.advEndDate) {
        const advRes = await API.call('getAdvances', { status: 'Approved', start_date: State.advStartDate, end_date: State.advEndDate });
        State.advances = advRes.data || [];
        State.payroll.forEach(p => {
          if (p.status === 'finalized') return;
          const empAdv = State.advances.filter(a => String(a.emp_id).trim() === String(p.emp_id).trim());
          const advTotal = empAdv.reduce((s, a) => s + Number(a.amount), 0);
          p.total_advances = advTotal;
          p.net_pay = Math.round(p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - advTotal);
        });
        this.renderTable(State.payroll);
      }
      const records = State.payroll.map(p => Object.assign({}, p, {
        adv_start_date: State.advStartDate,
        adv_end_date:   State.advEndDate,
        attendance_json: JSON.stringify(State.attendanceMap[p.emp_id] || [])
      }));
      await API.call('savePayroll', records);
      toast('Draft saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async loadDraft() {
    try {
      const [holRes, payRes] = await Promise.all([
        API.call('getHolidays', { year: currentYear() }),
        API.call('getPayroll', { month: State.currentMonth })
      ]);
      State.holidays = holRes.data || [];
      State.payroll  = payRes.data || [];

      // Restore advance date range from saved records
      const sample = State.payroll.find(p => p.adv_end_date);
      if (sample) {
        State.advStartDate = sample.adv_start_date || '';
        State.advEndDate   = sample.adv_end_date   || '';
        const s = document.getElementById('adv-start');
        const e = document.getElementById('adv-end');
        if (s) s.value = State.advStartDate;
        if (e) e.value = State.advEndDate;
      }

      // Fetch approved advances for that date range
      const advFilter = { status: 'Approved' };
      if (State.advStartDate && State.advEndDate) {
        advFilter.start_date = State.advStartDate;
        advFilter.end_date   = State.advEndDate;
      }
      const advRes = await API.call('getAdvances', advFilter);
      State.advances = advRes.data || [];

      // Recalculate advance totals in draft records from live approved advances
      // (advances may have been approved after the initial calculation ran)
      State.payroll.forEach(p => {
        if (p.status === 'finalized') return;
        const empAdv = State.advances.filter(a => String(a.emp_id).trim() === String(p.emp_id).trim());
        const advTotal = empAdv.reduce((s, a) => s + Number(a.amount), 0);
        p.total_advances = advTotal;
        p.net_pay = Math.round(p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - advTotal);
      });

      // Restore day-by-day attendance from saved JSON
      State.payroll.forEach(p => {
        if (p.attendance_json) {
          try { State.attendanceMap[p.emp_id] = JSON.parse(p.attendance_json); } catch(e) {}
        }
      });

      this.renderTable(State.payroll);
      const allFinalized = State.payroll.length && State.payroll.every(p => p.status === 'finalized');
      const btn = document.querySelector('[onclick="Views.Payroll.loadDraft()"]');
      if (btn) btn.textContent = allFinalized ? 'Load Finalised Data' : 'Load Saved Draft';
      const isFinalized = State.payroll.some(p => p.status === 'finalized');
      const banner = document.getElementById('payroll-finalized-banner');
      if (banner) banner.style.display = isFinalized ? 'flex' : 'none';
      toast(`Loaded ${State.payroll.length} records`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  dismissFinalizedBanner() {
    const banner = document.getElementById('payroll-finalized-banner');
    if (banner) banner.style.display = 'none';
  },

  async finalize() {
    const month = State.currentMonth;
    if (!State.advEndDate) { toast('Set the advance deduction end date before finalising', 'error'); return; }
    if (!confirm(`Finalise payroll for ${month}?\nAdvance period: ${State.advStartDate||'start'} → ${State.advEndDate}\nThis cannot be undone.`)) return;
    try {
      // Pull latest approved advances so we never finalise with stale totals
      const advRes = await API.call('getAdvances', { status: 'Approved', start_date: State.advStartDate, end_date: State.advEndDate });
      State.advances = advRes.data || [];
      State.payroll.forEach(p => {
        if (p.status === 'finalized') return;
        const empAdv = State.advances.filter(a => String(a.emp_id).trim() === String(p.emp_id).trim());
        const advTotal = empAdv.reduce((s, a) => s + Number(a.amount), 0);
        p.total_advances = advTotal;
        p.net_pay = Math.round(p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - advTotal);
      });
      const records = State.payroll.map(p => Object.assign({}, p, {
        adv_start_date: State.advStartDate,
        adv_end_date:   State.advEndDate,
        attendance_json: JSON.stringify(State.attendanceMap[p.emp_id] || [])
      }));
      await API.call('savePayroll', records);
      const r = await API.call('finalizePayroll', { month, adv_end_date: State.advEndDate });
      toast(`Finalised ${r.finalized} records`, 'success');
      // Next payroll's start date = this end date + 1 day
      const d = new Date(State.advEndDate); d.setDate(d.getDate() + 1);
      State.advStartDate = d.toISOString().split('T')[0];
      await this.loadDraft();
    } catch(e) { toast(e.message, 'error'); }
  },

  _Rs(n) { return 'Rs. ' + Number(n || 0).toLocaleString('en-IN'); },

  async downloadPayslip(idx) {
    const p   = State.payroll[idx];
    const emp = State.employees.find(e => e.emp_id === p.emp_id) || { name: p.emp_id, team: '' };
    const advances = State.advances.filter(a => a.emp_id === p.emp_id);
    const Rs = this._Rs.bind(this);
    const fmtH = this._fmtH.bind(this);

    const doc  = this._newDoc();
    const PW = 210, M = 14, CW = PW - 2*M;

    const advTotal   = advances.reduce((s,a) => s + Number(a.amount), 0);
    const grossTotal = (p.gross_pay||0) + (p.ot_earnings||0);
    const bonusCut   = p.bonus_cut || 0;
    const deductions = (p.shortfall_deduction||0) + advTotal + bonusCut;
    const net        = grossTotal - deductions;
    const company    = (State.settings||{}).COMPANY_NAME || 'Mahitha Prasad';

    let y = M;

    // Header
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(15,23,42);
    doc.text(emp.name, M, y+6);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100,116,139);
    doc.text(`Pay Slip  |  ${p.month}${emp.team?' | '+emp.team:''}`, M, y+13);
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(15,23,42);
    doc.text(company, PW-M, y+6, {align:'right'});
    if (p.adv_start_date && p.adv_end_date) {
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(100,116,139);
      doc.text(`Period: ${fmtDate(p.adv_start_date)} to ${fmtDate(p.adv_end_date)}`, PW-M, y+13, {align:'right'});
    }
    y += 20;
    doc.setDrawColor(200,210,220); doc.setLineWidth(0.4); doc.line(M, y, PW-M, y); y += 6;

    // Attendance + OT side by side
    doc.autoTable({
      startY: y, margin: {left:M, right:M},
      head: [['Attendance','','Overtime','']],
      body: [
        ['Full Days',   String(p.full_days??'--'),   'Weekday OT', fmtH(p.ot_weekday_min)],
        ['Half Days',   String(p.half_days??'--'),   'Sunday OT',  fmtH(p.ot_sunday_min)],
        ['Absent Days', String(p.absent_days??'--'), 'Holiday OT', fmtH(p.ot_holiday_min)],
        ['Week Off',    String(p.week_off_days??'--'), '', ''],
      ],
      theme: 'plain',
      styles: {fontSize:9, cellPadding:{top:2,bottom:2,left:3,right:3}},
      headStyles: {fontStyle:'bold', textColor:[100,116,139], fontSize:8, fillColor:false},
      columnStyles: {
        0:{textColor:[100,116,139], cellWidth:48},
        1:{fontStyle:'bold', textColor:[15,23,42], halign:'right', cellWidth:38},
        2:{textColor:[100,116,139], cellWidth:48},
        3:{fontStyle:'bold', textColor:[15,23,42], halign:'right', cellWidth:48},
      }
    });
    y = doc.lastAutoTable.finalY + 4;
    doc.setDrawColor(200,210,220); doc.line(M, y, PW-M, y); y += 6;

    // Earnings + Deductions side by side
    const dedRows = [['Shortfall', Rs(p.shortfall_deduction||0)], ['Advances', Rs(advTotal)]];
    if (bonusCut > 0) dedRows.push(['Bonus Contribution', Rs(bonusCut)]);
    const earnRows = [['Gross Pay', Rs(p.gross_pay||0)], ['OT Earnings', Rs(p.ot_earnings||0)]];
    const maxR = Math.max(earnRows.length, dedRows.length);
    const edBody = [];
    for (let i = 0; i < maxR; i++) edBody.push([earnRows[i]?.[0]??'', earnRows[i]?.[1]??'', dedRows[i]?.[0]??'', dedRows[i]?.[1]??'']);
    edBody.push(['Total Earnings', Rs(grossTotal), 'Total Deductions', Rs(deductions)]);

    doc.autoTable({
      startY: y, margin: {left:M, right:M},
      head: [['Earnings','','Deductions','']],
      body: edBody,
      theme: 'plain',
      styles: {fontSize:9, cellPadding:{top:2,bottom:2,left:3,right:3}},
      headStyles: {fontStyle:'bold', textColor:[100,116,139], fontSize:8, fillColor:false},
      columnStyles: {
        0:{textColor:[100,116,139], cellWidth:48},
        1:{fontStyle:'bold', textColor:[15,23,42], halign:'right', cellWidth:38},
        2:{textColor:[100,116,139], cellWidth:48},
        3:{fontStyle:'bold', textColor:[15,23,42], halign:'right', cellWidth:48},
      },
      didParseCell: (d) => {
        if (d.row.index === edBody.length-1) { d.cell.styles.fontStyle='bold'; d.cell.styles.textColor=[15,23,42]; }
      }
    });
    y = doc.lastAutoTable.finalY + 6;

    // Net Pay box
    doc.setFillColor(37,99,235);
    doc.roundedRect(M, y, CW, 14, 2, 2, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255,255,255);
    doc.text('Net In-Hand', M+5, y+9);
    doc.setFontSize(14);
    doc.text(Rs(net), PW-M-5, y+9, {align:'right'});
    y += 20;

    // Advance details
    if (advances.length) {
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(15,23,42);
