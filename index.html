  activeTab: 'pending',
  all: [],

  async load() {
    const c = document.getElementById('view-advances');
    c.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <h2 style="font-size:18px;font-weight:700">Advances</h2>
        <span style="flex:1"></span>
        <button class="btn btn-primary btn-sm" onclick="Views.Advances.openForm()">+ Add Advance</button>
      </div>
      <div id="adv-form-wrap"></div>
      <div style="display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)">
        <button id="tab-btn-pending"  onclick="Views.Advances.showTab('pending')"
          style="padding:8px 18px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;border-bottom:2px solid var(--primary);margin-bottom:-2px;color:var(--primary)">
          Pending <span id="tab-count-pending" style="background:var(--warning);color:#fff;border-radius:99px;padding:1px 7px;font-size:11px;margin-left:4px"></span>
        </button>
        <button id="tab-btn-approved" onclick="Views.Advances.showTab('approved')"
          style="padding:8px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--muted)">
          Approved <span id="tab-count-approved" style="background:var(--success);color:#fff;border-radius:99px;padding:1px 7px;font-size:11px;margin-left:4px"></span>
        </button>
        <button id="tab-btn-history" onclick="Views.Advances.showTab('history')"
          style="padding:8px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--muted)">
          History
        </button>
      </div>
      <div id="adv-list"></div>
      <div id="adv-history" style="display:none"></div>`;
    await this.fetch();
  },

  async fetch() {
    try {
      const r = await API.call('getAdvances', {});
      this.all = r.data || [];
      this.renderList();
    } catch(e) { toast(e.message, 'error'); }
  },

  showTab(tab) {
    this.activeTab = tab;
    const listEl    = document.getElementById('adv-list');
    const historyEl = document.getElementById('adv-history');
    if (listEl)    listEl.style.display    = tab === 'history' ? 'none' : '';
    if (historyEl) historyEl.style.display = tab === 'history' ? '' : 'none';
    if (tab === 'history') { this.renderHistoryForm(); return; }
    ['pending','approved','history'].forEach(t => {
      const btn = document.getElementById('tab-btn-' + t);
      if (!btn) return;
      if (t === tab) {
        btn.style.borderBottom = '2px solid var(--primary)';
        btn.style.marginBottom = '-2px';
        btn.style.color = 'var(--primary)';
      } else {
        btn.style.borderBottom = 'none';
        btn.style.marginBottom = '0';
        btn.style.color = 'var(--muted)';
      }
    });
    this.renderList();
  },

  renderHistoryForm() {
    ['pending','approved','history'].forEach(t => {
      const btn = document.getElementById('tab-btn-' + t);
      if (!btn) return;
      if (t === 'history') {
        btn.style.borderBottom = '2px solid var(--primary)';
        btn.style.marginBottom = '-2px';
        btn.style.color = 'var(--primary)';
      } else {
        btn.style.borderBottom = 'none';
        btn.style.marginBottom = '0';
        btn.style.color = 'var(--muted)';
      }
    });
    const today = new Date().toISOString().split('T')[0];
    const firstOfMonth = today.substring(0, 8) + '01';
    const c = document.getElementById('adv-history');
    if (!c) return;
    c.innerHTML = `
      <div class="card" style="margin-bottom:16px;padding:14px 16px">
        <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
          <div class="field" style="margin:0">
            <label>From</label>
            <input type="date" id="hist-from" value="${firstOfMonth}" />
          </div>
          <div class="field" style="margin:0">
            <label>To</label>
            <input type="date" id="hist-to" value="${today}" />
          </div>
          <button class="btn btn-primary btn-sm" onclick="Views.Advances.loadHistory()">Load</button>
        </div>
      </div>
      <div id="hist-results"></div>`;
  },

  async loadHistory() {
    const from = document.getElementById('hist-from')?.value;
    const to   = document.getElementById('hist-to')?.value;
    if (!from || !to) { toast('Select a date range', 'error'); return; }
    const res = document.getElementById('hist-results');
    if (res) res.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getAdvances', { start_date: from, end_date: to });
      const list = (r.data || []).sort((a, b) => a.date > b.date ? 1 : -1);
      if (!list.length) { res.innerHTML = '<p style="color:var(--muted)">No advances in this range.</p>'; return; }

      // Enrich with team
      const enriched = list.map(a => {
        const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
        return Object.assign({}, a, { team: emp.team || 'Other' });
      });

      // Group by date
      const dates = [...new Set(enriched.map(a => a.date))].sort();
      const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);
      const statusStyle = s => s === 'Approved' ? 'color:#15803d;font-weight:600' : 'color:#92400e;font-weight:600';

      let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'
        + '<thead style="background:var(--surface2)"><tr>'
        + '<th style="padding:10px 8px;text-align:left">Date</th>'
        + '<th style="padding:10px 8px;text-align:left">Employee</th>'
        + '<th style="padding:10px 8px;text-align:left">Team</th>'
        + '<th style="padding:10px 8px;text-align:right">Amount</th>'
        + '<th style="padding:10px 8px;text-align:center">Status</th>'
        + '<th style="padding:10px 8px">Submitted by</th>'
        + '</tr></thead><tbody>';

      dates.forEach(date => {
        const group = enriched.filter(a => a.date === date);
        const dateTotal = group.reduce((s, a) => s + a.amount, 0);
        html += `<tr><td colspan="6" style="padding:7px 8px;background:var(--surface2);font-weight:700;font-size:12px;color:var(--muted)">${date} &nbsp;·&nbsp; ${group.length} advance${group.length>1?'s':''} &nbsp;·&nbsp; ${fmt(dateTotal)}</td></tr>`;
        group.forEach(a => {
          html += `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:9px 8px;color:var(--muted);font-size:12px">${a.date}</td>
            <td style="padding:9px 8px;font-weight:500">${a.emp_name}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.team}</td>
            <td style="padding:9px 8px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
            <td style="padding:9px 8px;text-align:center;font-size:12px;${statusStyle(a.status)}">${a.status}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.created_by||'—'}</td>
          </tr>`;
        });
      });

      html += `<tr style="background:var(--surface2)">
        <td colspan="3" style="padding:10px 8px;font-weight:700">Grand Total</td>
        <td style="padding:10px 8px;text-align:right;font-weight:700">${fmt(grandTotal)}</td>
        <td colspan="2"></td>
      </tr>`;
      html += '</tbody></table></div>';
      html += `<p style="font-size:13px;color:var(--muted);margin-top:8px">${enriched.length} advance(s) &nbsp;·&nbsp; ${from} to ${to}</p>`;
      res.innerHTML = html;
    } catch(e) { toast(e.message, 'error'); }
  },

  renderList() {
    const pending  = this.all.filter(a => a.status === 'Pending');
    const approved = this.all.filter(a => a.status === 'Approved');
    const pc = document.getElementById('tab-count-pending');
    const ac = document.getElementById('tab-count-approved');
    if (pc) pc.textContent = pending.length || '';
    if (ac) ac.textContent = approved.length || '';

    const list = (this.activeTab === 'pending' ? pending : approved)
      .sort((a, b) => b.date > a.date ? 1 : -1);
    const c = document.getElementById('adv-list');
    if (!list.length) {
      c.innerHTML = `<p style="color:var(--muted)">No ${this.activeTab} advances.</p>`;
      return;
    }

    const grandTotal = list.reduce((s,a) => s + a.amount, 0);

    if (this.activeTab === 'pending') {
      // Group by date — each date = one submission batch
      const dates = [...new Set(list.map(a => a.date))].sort((a,b) => b > a ? 1 : -1);
      let html = '<div style="display:flex;flex-direction:column;gap:16px">';
      dates.forEach(date => {
        const group = list.filter(a => a.date === date).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
        const dateTotal = group.reduce((s,a) => s + a.amount, 0);
        const submitter = group[0]?.created_by || '—';
        html += `<div class="card" style="padding:0;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);flex-wrap:wrap">
            <div>
              <span style="font-weight:700;font-size:14px">${date}</span>
              <span style="color:var(--muted);font-size:12px;margin-left:8px">by ${submitter}</span>
            </div>
            <span style="flex:1"></span>
            <span style="font-weight:700;font-size:14px">${fmt(dateTotal)}</span>
            <button class="btn btn-primary btn-sm" onclick="Views.Advances.approveAll('${date}')">Approve All</button>
            <button class="btn btn-danger btn-sm"  onclick="Views.Advances.rejectAll('${date}')">Reject All</button>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <tbody>${group.map(a => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 14px;font-weight:500">${a.emp_name}</td>
                <td style="padding:9px 14px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
                <td style="padding:9px 14px;text-align:right">
                  <div style="display:flex;gap:4px;justify-content:flex-end">
                    <button class="btn btn-secondary btn-sm" onclick="Views.Advances.openForm('${a.advance_id}')">Edit</button>
                    <button class="btn btn-danger btn-sm"    onclick="Views.Advances.remove('${a.advance_id}','Reject')">Reject</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      });
      html += '</div>';
      html += `<p style="font-size:13px;color:var(--muted);margin-top:8px">Total pending: <strong>${fmt(grandTotal)}</strong></p>`;
      c.innerHTML = html;
    } else {
      // Approved tab — flat table, grouped by date for readability
      const dates = [...new Set(list.map(a => a.date))].sort((a,b) => b > a ? 1 : -1);
      let rows = '';
      dates.forEach(date => {
        const group = list.filter(a => a.date === date).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
        const dateTotal = group.reduce((s,a) => s + a.amount, 0);
        rows += `<tr><td colspan="4" style="padding:8px 8px;background:var(--surface2);font-weight:700;font-size:12px;color:var(--muted)">${date} — ${fmt(dateTotal)}</td></tr>`;
        rows += group.map(a => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:9px 8px;font-weight:500">${a.emp_name}</td>
            <td style="padding:9px 8px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.created_by||'—'}</td>
            <td style="padding:9px 8px;text-align:right">
              <button class="btn btn-danger btn-sm" onclick="Views.Advances.remove('${a.advance_id}','Delete')">Delete</button>
            </td>
          </tr>`).join('');
      });
      c.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead style="background:var(--surface2)">
          <tr>
            <th style="padding:10px 8px;text-align:left">Employee</th>
            <th style="padding:10px 8px;text-align:right">Amount</th>
            <th style="padding:10px 8px">Submitted by</th>
            <th style="padding:10px 8px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p style="font-size:13px;color:var(--muted);margin-top:8px">Total approved: <strong>${fmt(grandTotal)}</strong></p>`;
    }
  },

  openForm(advId) {
    const adv = advId ? this.all.find(a => a.advance_id === advId) : null;
    const today = new Date().toISOString().split('T')[0];
    const c = document.getElementById('adv-form-wrap');
    c.innerHTML = `<div class="card" style="margin-bottom:16px">
      <h3 style="font-size:15px;margin-bottom:14px">${advId ? 'Edit Advance' : 'Add Advance'}</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
        <div class="field"><label>Employee *</label>
          <select id="af-emp" ${advId ? 'disabled' : ''}>
            <option value="">— select —</option>
            ${State.employees.filter(e=>e.status==='Active').map(e =>
              `<option value="${e.emp_id}" ${adv?.emp_id===e.emp_id?'selected':''}>${e.name}</option>`).join('')}
          </select></div>
        <div class="field"><label>Date *</label>
          <input type="date" id="af-date" value="${adv?.date||today}" /></div>
        <div class="field"><label>Amount (₹) *</label>
          <input type="number" id="af-amt" value="${adv?.amount||''}" placeholder="0" /></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="Views.Advances.save('${advId||''}')">Save</button>
        <button class="btn btn-secondary btn-sm" onclick="Views.Advances.closeForm()">Cancel</button>
      </div>
    </div>`;
  },

  closeForm() { document.getElementById('adv-form-wrap').innerHTML = ''; },

  async approve(advId) {
    try {
      await API.call('approveAdvance', { advance_id: advId });
      await this.fetch();
      toast('Advance approved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async approveAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Approve all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      const r = await API.call('approveAdvances', { advance_ids: ids });
      await this.fetch();
      if (r.not_found && r.not_found.length) {
        toast(`Approved ${r.approved}/${ids.length}. Not found: ${r.not_found.join(', ')}`, 'error');
      } else {
        toast(`${r.approved} advance(s) approved`, 'success');
      }
    } catch(e) { toast(e.message, 'error'); }
  },

  async rejectAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Reject all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      for (const id of ids) await API.call('deleteAdvance', { advance_id: id });
      await this.fetch();
      toast(`${ids.length} advance(s) rejected`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async save(advId) {
    const empId = document.getElementById('af-emp')?.value;
    const amt   = parseFloat(document.getElementById('af-amt')?.value);
    if (!empId || !amt) { toast('Employee and amount required', 'error'); return; }
    const emp = State.employees.find(e => e.emp_id === empId);
    try {
      await API.call('saveAdvance', {
        advance_id: advId || null,
        emp_id: empId, emp_name: emp?.name || empId,
        date:   document.getElementById('af-date')?.value,
        amount: amt,
        created_by: 'Admin'
      });
      this.closeForm(); await this.fetch();
      toast('Advance saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async remove(advId, action) {
    if (!confirm(`${action} this advance?`)) return;
    try {
      await API.call('deleteAdvance', { advance_id: advId });
      await this.fetch();
      toast(action + 'ed', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

Views.Bonus = {
  async load() {
    const c = document.getElementById('view-bonus');
    c.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <h2 style="font-size:18px;font-weight:700">Bonus Pool</h2>
        <span style="flex:1"></span>
        <label class="btn btn-secondary btn-sm" style="cursor:pointer">
          ↑ Upload Balances
          <input type="file" accept=".xlsx,.xls" style="display:none" onchange="Views.Bonus.onUpload(event)" />
        </label>
      </div>
      <div id="bonus-list"><div class="spinner"></div></div>`;
    try {
      const r = await API.call('getBonusPool', {});
      const list = r.data || [];
      const target = parseInt(State.settings.BONUS_POOL_TARGET || 24000);
      if (!list.length) { document.getElementById('bonus-list').innerHTML = '<p style="color:var(--muted)">No bonus pool data yet.</p>'; return; }
      document.getElementById('bonus-list').innerHTML = `
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--surface2)">
            <tr><th style="padding:10px 8px;text-align:left">Employee</th>
            <th style="padding:10px 8px;text-align:right">Balance</th>
            <th style="padding:10px 8px">Progress</th>
            <th style="padding:10px 8px;text-align:right">Last Payout</th>
            <th style="padding:10px 8px">Last Updated</th></tr>
          </thead>
          <tbody>${list.sort((a,b)=>b.balance-a.balance).map(b => {
            const pct = Math.min(100, Math.round(b.balance/target*100));
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 8px;font-weight:500">${b.emp_name}</td>
              <td style="padding:10px 8px;text-align:right;font-weight:700">${fmt(b.balance)}</td>
              <td style="padding:10px 8px;min-width:120px">
                <div style="background:var(--border);border-radius:99px;height:8px">
                  <div style="background:${pct>=100?'var(--success)':'var(--primary)'};width:${pct}%;height:8px;border-radius:99px"></div>
                </div>
                <span style="font-size:11px;color:var(--muted)">${pct}% of ${fmt(target)}</span>
              </td>
              <td style="padding:10px 8px;text-align:right">${b.last_payout>0?fmt(b.last_payout):'—'}</td>
              <td style="padding:10px 8px;color:var(--muted)">${b.last_updated_month||'—'}</td>
            </tr>`;
          }).join('')}
          </tbody></table></div>`;
    } catch(e) { toast(e.message, 'error'); }
  },

  async onUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (!rows.length) { toast('No data found in file', 'error'); return; }

        // Detect columns: emp_name and balance (total deposited bonus)
        const firstRow = rows[0];
        const keys = Object.keys(firstRow);
        const norm = s => String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        const nameKey = keys.find(k => norm(k).includes('name') || norm(k).includes('emp'));
        const balKey  = keys.find(k => norm(k).includes('bal') || norm(k).includes('bonus') || norm(k).includes('deposit') || norm(k).includes('total'));
        if (!nameKey || !balKey) {
          toast(`Could not detect columns. Found: ${keys.join(', ')}`, 'error'); return;
        }

        const records = rows
          .filter(r => r[nameKey] && !String(r[nameKey]).startsWith('#'))
          .map(r => ({ emp_name: String(r[nameKey]).trim(), balance: Number(String(r[balKey]).replace(/[^0-9.]/g, '')) || 0 }))
          .filter(r => r.emp_name);

        if (!records.length) { toast('No valid rows found', 'error'); return; }
        if (!confirm(`Upload bonus balances for ${records.length} employee(s)? This will seed their starting bonus pool balance.`)) return;

        const res = await API.call('saveBonusBalances', { records });
        toast(`Saved ${res.saved} balances${res.skipped ? `, ${res.skipped} not matched` : ''}`, 'success');
        this.load();
      } catch(err) { toast(err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  }
};

Views.Payments = {
  _run: [],
  _month: '',

  async load() {
    const c = document.getElementById('view-payments');
    c.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <h2 style="font-size:18px;font-weight:700">Payments</h2>

        </select>
        <span style="flex:1"></span>
      </div>
      <div id="pay-run-wrap"></div>`;
    try {
      const r = await API.call('getFinalizedMonths', {});
      const months = r.data || [];
      const sel = document.getElementById('pay-month-sel');
      months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
      });
      if (months.length) { sel.value = months[0]; this.onMonthChange(months[0]); }
      else document.getElementById('pay-run-wrap').innerHTML = '<p style="color:var(--muted)">No finalised months yet.</p>';
    } catch(e) { toast(e.message, 'error'); }
  },

  async onMonthChange(month) {
    this._month = month;
    State.currentMonth = month;
    if (!month) return;
    const wrap = document.getElementById('pay-run-wrap');
    wrap.innerHTML = '<div class="spinner"></div>';
    try {
      const [runRes, payRes] = await Promise.all([
        API.call('getPaymentRun', { month }),
        API.call('getPayments', { month })
      ]);
      this._run = runRes.data || [];
      this.render(this._run, payRes.data || []);
    } catch(e) { toast(e.message, 'error'); }
  },

  render(run, payments) {
    const wrap = document.getElementById('pay-run-wrap');
    const totalNet  = run.reduce((s, r) => s + r.net_pay, 0);
    const totalPaid = run.reduce((s, r) => s + r.already_paid, 0);
    const totalRem  = run.reduce((s, r) => s + Math.max(0, r.remaining), 0);
    const today = new Date().toISOString().split('T')[0];

    wrap.innerHTML = `
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <div class="card" style="flex:1;min-width:130px;text-align:center;padding:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total Payroll</div>
          <div style="font-size:20px;font-weight:700">${fmt(totalNet)}</div>
        </div>
        <div class="card" style="flex:1;min-width:130px;text-align:center;padding:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Paid So Far</div>
          <div style="font-size:20px;font-weight:700;color:var(--success)">${fmt(totalPaid)}</div>
        </div>
        <div class="card" style="flex:1;min-width:130px;text-align:center;padding:12px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Outstanding</div>
          <div style="font-size:20px;font-weight:700;color:${totalRem > 0 ? 'var(--danger)' : 'var(--success)'}">${fmt(totalRem)}</div>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
        <div style="padding:12px 14px;background:var(--surface2);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <strong style="font-size:14px">Payment Run — ${this._month}</strong>
          <label style="font-size:13px;color:var(--muted)">Date:
            <input type="date" id="pay-date" value="${today}" style="margin-left:6px;padding:4px 8px;font-size:13px" />
          </label>
          <span style="flex:1"></span>
          <label style="font-size:13px;cursor:pointer">
            <input type="checkbox" id="pay-select-all" onchange="Views.Payments.toggleAll(this.checked)" />

          <button class="btn btn-primary btn-sm" onclick="Views.Payments.recordSelected()">✓ Record Selected</button>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead style="background:var(--surface)">
              <tr>
                <th style="padding:10px 8px;width:36px"></th>
                <th style="padding:10px 8px;text-align:left">Employee</th>
                <th style="padding:10px 8px;text-align:right">Net Pay</th>
                <th style="padding:10px 8px;text-align:right">Already Paid</th>
                <th style="padding:10px 8px;text-align:right">Remaining</th>
                <th style="padding:10px 8px;text-align:right">Amount to Pay</th>
                <th style="padding:10px 8px;text-align:center">Mode</th>
              </tr>
            </thead>
            <tbody>
              ${run.map((r, i) => {
                const rem = r.remaining;
                const rowStyle = rem <= 0 ? 'opacity:.55' : '';
                return `<tr style="border-bottom:1px solid var(--border);${rowStyle}" id="payrun-row-${i}">
                  <td style="padding:10px 8px;text-align:center">
                    <input type="checkbox" class="pay-chk" data-idx="${i}" ${rem <= 0 ? 'disabled' : ''} />
                  </td>
                  <td style="padding:10px 8px;font-weight:500">${r.emp_name}</td>
                  <td style="padding:10px 8px;text-align:right">${fmt(r.net_pay)}</td>
                  <td style="padding:10px 8px;text-align:right;color:var(--success)">${r.already_paid > 0 ? fmt(r.already_paid) : '—'}</td>
                  <td style="padding:10px 8px;text-align:right;font-weight:600;color:${rem > 0 ? 'var(--danger)' : 'var(--success)'}">
                    ${rem > 0 ? fmt(rem) : '✓ Paid'}
                  </td>
                  <td style="padding:10px 8px;text-align:right">
                    <input type="number" id="pay-amt-${i}" value="${rem > 0 ? rem : ''}" min="0"
                      style="width:90px;padding:4px 6px;font-size:13px;text-align:right"
                      ${rem <= 0 ? 'disabled' : ''} />
                  </td>
                  <td style="padding:10px 8px;text-align:center">
                    <select id="pay-mode-${i}" style="padding:4px 6px;font-size:12px;width:auto" ${rem <= 0 ? 'disabled' : ''}>
                      <option>UPI</option><option>Cash</option>
                    </select>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      ${payments.length ? `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:12px 14px;background:var(--surface2);font-weight:600;font-size:14px">Payment History — ${this._month}</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead style="background:var(--surface)">
              <tr>
                <th style="padding:10px 8px;text-align:left">Date</th>
                <th style="padding:10px 8px;text-align:left">Employee</th>
                <th style="padding:10px 8px;text-align:right">Amount</th>
                <th style="padding:10px 8px;text-align:center">Mode</th>
                <th style="padding:10px 8px"></th>
              </tr>
            </thead>
            <tbody>
              ${payments.sort((a, b) => a.date_paid > b.date_paid ? -1 : 1).map(p => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:10px 8px">${p.date_paid}</td>
                <td style="padding:10px 8px;font-weight:500">${p.emp_name}</td>
                <td style="padding:10px 8px;text-align:right;font-weight:600">${fmt(p.amount)}</td>
                <td style="padding:10px 8px;text-align:center"><span class="badge badge-primary">${p.mode}</span></td>
                <td style="padding:10px 8px;text-align:center">
                  <button class="btn btn-danger btn-sm" onclick="Views.Payments.remove('${p.payment_id}')">✕</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}`;
  },

  toggleAll(checked) {
    document.querySelectorAll('.pay-chk:not([disabled])').forEach(cb => cb.checked = checked);
  },

  async recordSelected() {
    const date = document.getElementById('pay-date')?.value;
    if (!date) { toast('Select a payment date', 'error'); return; }
    const checked = [...document.querySelectorAll('.pay-chk:checked')];
    if (!checked.length) { toast('Select at least one employee', 'error'); return; }

    const records = [];
    for (const cb of checked) {
      const i = parseInt(cb.dataset.idx);
      const emp = this._run[i];
      const amt = parseFloat(document.getElementById(`pay-amt-${i}`)?.value);
      const mode = document.getElementById(`pay-mode-${i}`)?.value;
      if (!amt || amt <= 0) { toast(`Enter a valid amount for ${emp.emp_name}`, 'error'); return; }
      records.push({
        emp_id: emp.emp_id, emp_name: emp.emp_name,
        month: this._month, date_paid: date, amount: amt, mode: mode || 'UPI'
      });
    }

    try {
      await API.call('saveBulkPayments', { records });
      toast(`${records.length} payment(s) recorded`, 'success');
      this.onMonthChange(this._month);
    } catch(e) { toast(e.message, 'error'); }
  },

  async remove(paymentId) {
    if (!confirm('Delete this payment?')) return;
    try {
      await API.call('deletePayment', { payment_id: paymentId });
      this.onMonthChange(this._month);
      toast('Deleted', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

};

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Shortfall threshold (hours)</label><input type="number" step="0.25" id="s-thresh" value="${State.settings.SHORTFALL_THRESHOLD_HOURS||8.5}" /></div>
          <div class="field"><label>OT minimum hours</label><input type="number" id="s-otmin" value="${State.settings.OT_MIN_HOURS||10}" /></div>
          <div class="field"><label>OT rounding (minutes)</label><input type="number" id="s-otround" value="${State.settings.OT_ROUND_MINUTES||15}" /></div>
          <div class="field"><label>Add lunch hour to Sunday/Holiday OT?</label>
            <select id="s-lunch">
              <option value="true" ${State.settings.ADD_LUNCH_TO_OT==='true'?'selected':''}>Yes</option>
              <option value="false" ${State.settings.ADD_LUNCH_TO_OT!=='true'?'selected':''}>No</option>
            </select></div>
          <div class="field"><label>Lunch duration (hours)</label><input type="number" step="0.5" id="s-lunchhrs" value="${State.settings.LUNCH_DURATION_HOURS||1}" /></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Bonus Pool</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Pool target (₹)</label><input type="number" id="s-bontarget" value="${State.settings.BONUS_POOL_TARGET||24000}" /></div>
          <div class="field"><label>Employee contribution / month (₹)</label><input type="number" id="s-empcon" value="${State.settings.EMPLOYEE_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Company contribution / month (₹)</label><input type="number" id="s-comcon" value="${State.settings.COMPANY_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Min days for bonus eligibility</label><input type="number" id="s-bondays" value="${State.settings.BONUS_ELIGIBILITY_MIN_DAYS||6}" /></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Teams</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Teams appear in employee records and advance reports.</p>
        <div id="teams-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addTeamRow()">+ Add Team</button>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Holidays ${new Date().getFullYear()}</h3>
        <div id="holiday-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addHolidayRow()">+ Add Holiday</button>
      </div>
      <button class="btn btn-primary" onclick="Views.Settings.save()">Save All Settings</button>
    </div>`;
    await this.loadHolidays();
  },

  async loadHolidays() {
    try {
      const r = await API.call('getHolidays', { year: currentYear() });
      State.holidays = r.data || [];
      this.renderHolidays();
    } catch(e) {}
    this.renderTeams();
  },

  renderTeams() {
    const c = document.getElementById('teams-list');
    if (!c) return;
    const teams = getTeams();
    c.innerHTML = teams.map((t, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="team-row-${i}">
        <input type="text" id="team-name-${i}" value="${t}" placeholder="Team name" style="flex:1;max-width:240px" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('team-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addTeamRow() {
    const c = document.getElementById('teams-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'team-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="text" id="team-name-${i}" placeholder="Team name" style="flex:1;max-width:240px" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  renderHolidays() {
    const c = document.getElementById('holiday-list');
    const rows = State.holidays.length ? State.holidays : Array(8).fill({ date: '', name: '' });
    c.innerHTML = rows.map((h, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="hol-row-${i}">
        <input type="date" id="hol-date-${i}" value="${h.date||''}" style="flex:0 0 160px" />
        <input type="text" id="hol-name-${i}" value="${h.name||''}" placeholder="Holiday name" style="flex:1" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('hol-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addHolidayRow() {
    const c = document.getElementById('holiday-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'hol-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="date" id="hol-date-${i}" style="flex:0 0 160px" />
      <input type="text" id="hol-name-${i}" placeholder="Holiday name" style="flex:1" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  async save() {
    const settings = {
      COMPANY_NAME:                document.getElementById('s-company')?.value,
      ADMIN_PIN:                   document.getElementById('s-adminpin')?.value,
      MANAGER_PIN:                 document.getElementById('s-manpin')?.value,
      SHORTFALL_THRESHOLD_HOURS:   document.getElementById('s-thresh')?.value,
      OT_MIN_HOURS:                document.getElementById('s-otmin')?.value,
      OT_ROUND_MINUTES:            document.getElementById('s-otround')?.value,
      ADD_LUNCH_TO_OT:             document.getElementById('s-lunch')?.value,
      LUNCH_DURATION_HOURS:        document.getElementById('s-lunchhrs')?.value,
      BONUS_POOL_TARGET:           document.getElementById('s-bontarget')?.value,
      EMPLOYEE_CONTRIBUTION:       document.getElementById('s-empcon')?.value,
      COMPANY_CONTRIBUTION:        document.getElementById('s-comcon')?.value,
      BONUS_ELIGIBILITY_MIN_DAYS:  document.getElementById('s-bondays')?.value,
    };

    // Collect teams
    const teamNames = [];
    document.querySelectorAll('[id^="team-row-"]').forEach(row => {
      const i = row.id.replace('team-row-', '');
      const name = document.getElementById('team-name-' + i)?.value?.trim();
      if (name) teamNames.push(name);
    });
    if (teamNames.length) settings.TEAMS = teamNames.join(',');

    // Collect holidays
    const holidays = [];
    document.querySelectorAll('[id^="hol-row-"]').forEach(row => {
      const i    = row.id.replace('hol-row-', '');
      const date = document.getElementById('hol-date-' + i)?.value;
      const name = document.getElementById('hol-name-' + i)?.value;
      if (date && name) holidays.push({ date, name });
    });

    try {
      await Promise.all([
        API.call('saveSettings', settings),
        holidays.length ? API.call('saveHolidays', holidays) : Promise.resolve()
      ]);
      const r = await API.call('getSettings', {});
      State.settings = r.data || {};
      toast('Settings saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

const ManagerApp = {
  dateAdvances: [],

  init() {
    show('screen-manager');

    c.innerHTML = `

      <span class="mp-topbar-title">MP&#x2009;SAL</span>
      <span style="font-size:12px;color:var(--muted);font-weight:600;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:99px;margin-left:4px">Manager</span>

      <div class="card" style="margin-bottom:20px">
        <div class="field" style="margin-bottom:16px">
          <label style="font-weight:600">Date</label>
          <input type="date" id="m-date" value="${today}" style="max-width:180px"
            onchange="ManagerApp.loadForDate(this.value)" />
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:14px" id="m-emp-table">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:10px 12px;text-align:left;font-weight:600">ID</th>
                <th style="padding:10px 12px;text-align:left;font-weight:600">Employee</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600">Amount (₹)</th>
              </tr>
            </thead>
            <tbody id="m-emp-body"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="ManagerApp.submit()">Submit</button>
      </div>
      <div id="m-submitted"></div>
    </main>
    </div>`;
    this.loadForDate(today);
  },

  async loadForDate(date) {
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
      this.renderInputTable(date);
      this.renderSubmitted(date);
    } catch(e) { toast(e.message, 'error'); }
  },

  renderInputTable(date) {
    const allEmps = State.employees.filter(e => e.status === 'Active');
    const body = document.getElementById('m-emp-body');
    if (!body) return;
    const teams = getTeams();
    const teamSet = new Set(teams);
    // Group employees: known teams first (in order), then Others
    const grouped = {};
    teams.forEach(t => { grouped[t] = []; });
    grouped['Other'] = [];
    allEmps.forEach(emp => {
      const t = emp.team && teamSet.has(emp.team) ? emp.team : 'Other';
      grouped[t].push(emp);
    });
    const teamOrder = [...teams, 'Other'];
    let rows = '';
    teamOrder.forEach(team => {
      const emps = (grouped[team] || []).sort((a, b) => a.name.localeCompare(b.name));
      if (!emps.length) return;
      rows += `<tr><td colspan="3" style="padding:8px 12px;background:var(--bg-secondary,#f3f4f6);font-weight:700;font-size:13px;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border)">${team}</td></tr>`;
      emps.forEach(emp => {
        const existing = this.dateAdvances.find(a => a.emp_id === emp.emp_id);
        const val = existing ? existing.amount : '';
        rows += `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:10px 12px;color:var(--muted);font-size:13px">${emp.petpooja_id||'—'}</td>
          <td style="padding:10px 12px;font-weight:500">${emp.name}</td>
          <td style="padding:8px 12px;text-align:right">
            <input type="number" id="m-amt-${emp.emp_id}" value="${val}" placeholder="—"
              min="0" style="width:110px;text-align:right;padding:6px 8px" />
          </td>
        </tr>`;
      });
    });
    body.innerHTML = rows;
  },

  renderSubmitted(date) {
    const c = document.getElementById('m-submitted');
    if (!c) return;
    if (!this.dateAdvances.length) { c.innerHTML = ''; return; }

    // Enrich with employee data and group by team
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const statusStyle = s => s === 'Approved' ? 'background:#dcfce7;color:#15803d' : 'background:#fef3c7;color:#92400e';
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);

    let rows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      rows += `<tr style="background:var(--surface2)">
        <td colspan="4" style="padding:8px 10px;font-weight:700;font-size:12px;color:var(--muted)">${team}</td>
      </tr>`;
      rows += group.map(a => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:9px 10px;color:var(--muted);font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 10px;font-weight:500">${a.emp_name}</td>
          <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
          <td style="padding:9px 10px;text-align:center">
            <span style="font-size:11px;padding:2px 7px;border-radius:99px;${statusStyle(a.status)}">${a.status}</span>
          </td>
        </tr>`).join('');
      rows += `<tr style="background:var(--surface2)">
        <td colspan="2" style="padding:8px 10px;font-weight:600;font-size:13px">${team} Total</td>
        <td style="padding:8px 10px;text-align:right;font-weight:700">${fmt(sub)}</td>
        <td></td>
      </tr>`;
    });

    c.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600">Submitted for ${date}</h3>
        <button class="btn btn-secondary btn-sm" onclick="ManagerApp.savePDF()">Save PDF</button>
        <button class="btn btn-primary btn-sm" onclick="ManagerApp.sharePDF()" style="display:flex;align-items:center;gap:5px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16c-.8 0-1.5.3-2 .8l-7.3-4.2c.1-.2.1-.4.1-.6s0-.4-.1-.6L16 7.2c.5.5 1.2.8 2 .8 1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3c0 .2 0 .4.1.6L7.8 9.8C7.3 9.3 6.6 9 5.8 9c-1.7 0-3 1.3-3 3s1.3 3 3 3c.8 0 1.5-.3 2-.8l7.3 4.2c-.1.2-.1.4-.1.6 0 1.6 1.3 2.9 2.9 2.9s2.9-1.3 2.9-2.9-1.2-3-2.8-3z"/></svg>
          Share
        </button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--surface2)">
            <tr>
              <th style="padding:10px;text-align:left;width:50px">ID</th>
              <th style="padding:10px;text-align:left">Employee</th>
              <th style="padding:10px;text-align:right">Amount</th>
              <th style="padding:10px;text-align:center">Status</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr style="background:var(--primary);color:#fff">
              <td colspan="2" style="padding:10px;font-weight:700">Grand Total (${enriched.length})</td>
              <td style="padding:10px;text-align:right;font-weight:700">${fmt(grandTotal)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>`;
  },

  async submit() {
    const date = document.getElementById('m-date')?.value;
    if (!date) { toast('Select a date', 'error'); return; }

    // Fresh fetch before processing so existing advances are always current
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
    } catch(e) { toast(e.message, 'error'); return; }

    const emps = State.employees.filter(e => e.status === 'Active');
    const ops = [];
    let count = 0;
    for (const emp of emps) {
      const val = parseFloat(document.getElementById('m-amt-' + emp.emp_id)?.value) || 0;
      const existing = this.dateAdvances.find(a => a.emp_id === emp.emp_id);
      if (val > 0 && existing) {
        ops.push(API.call('saveAdvance', { advance_id: existing.advance_id, date, amount: val }));
        count++;
      } else if (val > 0) {
        ops.push(API.call('saveAdvance', { emp_id: emp.emp_id, emp_name: emp.name, date, amount: val, created_by: 'Manager' }));
        count++;
      } else if (val === 0 && existing) {
        ops.push(API.call('deleteAdvance', { advance_id: existing.advance_id }));
      }
    }
    if (!count) { toast('Enter at least one amount', 'error'); return; }
    try {
      await Promise.all(ops);
      await this.loadForDate(date);
      toast(`${count} advance${count > 1 ? 's' : ''} submitted`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  _buildPDFElement() {
    const date    = document.getElementById('m-date')?.value || this.dateAdvances[0]?.date;
    const company = State.settings?.COMPANY_NAME || 'Mahitha Prasad';
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);
    let bodyRows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      bodyRows += `<tr><td colspan="4" style="padding:8px 12px;font-weight:700;font-size:12px;background:#e2e8f0;color:#475569">${team}</td></tr>`;
      bodyRows += group.map(a => `
        <tr>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;color:#64748b;font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0">${a.emp_name}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:right;font-weight:600">&#8377;${a.amount.toLocaleString('en-IN')}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:center;font-size:11px;color:${a.status==='Approved'?'#15803d':'#92400e'}">${a.status}</td>
        </tr>`).join('');
      bodyRows += `<tr style="background:#fef9c3"><td colspan="2" style="padding:9px 12px;font-weight:700">${team} Total</td>
        <td style="padding:9px 12px;text-align:right;font-weight:700">&#8377;${sub.toLocaleString('en-IN')}</td><td></td></tr>`;
    });
    const el = document.createElement('div');
    el.innerHTML = `
      <div style="font-family:Arial,sans-serif;padding:32px;color:#1e293b;max-width:640px;margin:0 auto">
        <h1 style="font-size:20px;margin:0 0 4px">${company} &#8212; Advance Report</h1>
        <div style="color:#64748b;font-size:13px;margin-bottom:24px">Date: ${date} &nbsp;&middot;&nbsp; Submitted by: Manager &nbsp;&middot;&nbsp; Generated: ${new Date().toLocaleString('en-IN')}</div>
        <table style="width:100%;border-collapse:collapse">
          <thead style="background:#1e3a5f;color:#fff">
            <tr><th style="padding:10px 12px;text-align:left;font-size:13px">ID</th><th style="padding:10px 12px;text-align:left;font-size:13px">Employee</th><th style="padding:10px 12px;text-align:right;font-size:13px">Amount</th><th style="padding:10px 12px;text-align:center;font-size:13px">Status</th></tr>
          </thead>
          <tbody>
            ${bodyRows}
            <tr style="background:#f97316;color:#fff">
              <td colspan="2" style="padding:10px 12px;font-weight:700">Grand Total &#8212; ${enriched.length} advance${enriched.length>1?'s':''}</td>
              <td style="padding:10px 12px;text-align:right;font-weight:700">&#8377;${grandTotal.toLocaleString('en-IN')}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:32px;font-size:12px;color:#94a3b8">MP-SAL Payroll System</div>
      </div>`;
    return { el, date };
  },

  savePDF() {
    if (!this.dateAdvances.length) return;
    const { el, date } = this._buildPDFElement();
    el.style.cssText = 'position:fixed;left:-10000px;top:0;width:680px;background:#ffffff;color:#1e293b;z-index:-1';
    document.body.appendChild(el);
    html2pdf().set({ margin: 0, filename: `advances-${date}.pdf`, image: { type: 'jpeg', quality: .95 }, html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true }, jsPDF: { unit: 'mm', format: 'a4' } })
      .from(el).save()
      .finally(() => document.body.removeChild(el));
  },

  async sharePDF() {
    if (!this.dateAdvances.length) return;
    if (!navigator.share) { toast('Sharing not supported on this browser — use Save PDF instead', 'error'); return; }
    const { el, date } = this._buildPDFElement();
    el.style.cssText = 'position:fixed;left:-10000px;top:0;width:680px;background:#ffffff;color:#1e293b;z-index:-1';
    document.body.appendChild(el);
    try {
      toast('Generating PDF…');
      const blob = await html2pdf().set({ margin: 0, filename: `advances-${date}.pdf`, image: { type: 'jpeg', quality: .95 }, html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true }, jsPDF: { unit: 'mm', format: 'a4' } })
        .from(el).outputPdf('blob');
      document.body.removeChild(el);
      const file = new File([blob], `advances-${date}.pdf`, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: `Advances ${date}` });
      } else {
        toast('File sharing not supported — saving instead', 'error');
        this.savePDF();
      }
    } catch(e) {
      if (document.body.contains(el)) document.body.removeChild(el);
      if (e.name !== 'AbortError') toast(e.message, 'error');
    }
  }
};

        </div>
        <div style="max-width:760px;margin:0 auto;padding:20px 20px">
          <div class="role-tabs" style="max-width:320px;margin-bottom:20px">
            <button id="emp-tab-payslip"  class="role-tab active" onclick="EmployeeApp.showTab('payslip')">Pay Slip</button>
            <button id="emp-tab-advances" class="role-tab"        onclick="EmployeeApp.showTab('advances')">My Advances</button>
          </div>

          <div id="emp-pane-payslip">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <label style="font-size:13px;font-weight:600;color:var(--muted);margin:0">Pay Slip for</label>
              <input type="month" id="emp-month" value="${this.currentMonth}"
                style="width:auto;padding:6px 10px" onchange="EmployeeApp.load(this.value)" />
            </div>
            <div id="emp-slip"></div>
          </div>

          <div id="emp-pane-advances" class="hidden"></div>
        </div>
      </div>`;
    this.load(this.currentMonth);
  },

  showTab(tab) {
    const payTab = document.getElementById('emp-tab-payslip');
    const advTab = document.getElementById('emp-tab-advances');
    const payPane = document.getElementById('emp-pane-payslip');
    const advPane = document.getElementById('emp-pane-advances');
    if (tab === 'payslip') {
      payTab.classList.add('active'); advTab.classList.remove('active');
      payPane.classList.remove('hidden'); advPane.classList.add('hidden');
    } else {
      advTab.classList.add('active'); payTab.classList.remove('active');
      advPane.classList.remove('hidden'); payPane.classList.add('hidden');
      this.loadAdvances();
    }
  },

  async loadAdvances() {
    const pane = document.getElementById('emp-pane-advances');
    pane.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeeAdvanceHistory', { emp_id: State.empId });
      const periods = r.data || [];
      if (!periods.length) {
        pane.innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:32px">
          Advance details will appear here after your payslip is generated.
        </div>`;
        return;
      }
      pane.innerHTML = periods.map(period => {
        const startLabel = (period.adv_start_date || '').substring(0, 10);
        const endLabel   = (period.adv_end_date   || '').substring(0, 10);
        const periodLabel = startLabel && endLabel ? `${startLabel} to ${endLabel}` : period.month;
        // Use fetched advances if available; fall back to stored total from payroll record
        const displayTotal = period.advances.length ? period.total : (period.total_from_payroll || 0);
        if (!period.advances.length) {
          return `<div class="card" style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <div><div style="font-weight:700;font-size:15px">${period.month}</div>
                <div style="color:var(--muted);font-size:12px">${periodLabel}</div></div>
              <div style="text-align:right">
                ${displayTotal > 0
                  ? `<div style="font-size:11px;color:var(--muted)">Total Deducted</div>
                     <div style="font-weight:700;color:var(--warning);font-size:14px">${fmt(displayTotal)}</div>`
                  : `<div style="font-weight:700;color:var(--success);font-size:14px">No advances</div>`}
              </div>
            </div>
          </div>`;
        }
        return `<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
          <div style="background:var(--surface2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div><div style="font-weight:700;font-size:15px">${period.month}</div>
              <div style="color:var(--muted);font-size:12px">${periodLabel}</div></div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total Deducted</div>
              <div style="font-weight:800;font-size:18px;color:var(--warning)">${fmt(displayTotal)}</div>
            </div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--surface);border-bottom:1px solid var(--border)">
              <th style="padding:8px 14px;text-align:left;font-size:12px;color:var(--muted);font-weight:600">Date</th>
              <th style="padding:8px 14px;text-align:right;font-size:12px;color:var(--muted);font-weight:600">Amount</th>
            </tr></thead>
            <tbody>${period.advances.map(a => `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 14px">${a.date}</td>
              <td style="padding:10px 14px;text-align:right;font-weight:600">${fmt(Number(a.amount))}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`;
      }).join('');
    } catch(e) { pane.innerHTML = `<div class="card" style="color:var(--danger)">${e.message}</div>`; }
  },

  async load(month) {
    this.currentMonth = month;
    const slip = document.getElementById('emp-slip');
    if (!slip) return;
    slip.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeePayslip', { emp_id: State.empId, month });
      const { payroll: p, advances } = r.data || {};
      if (!p) {
        slip.innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:32px">No payroll data found for ${month}.</div>`;
        return;
      }
      const bonus_balance = r.data.bonus_balance || 0;
      this._slip = { p, advances, month, bonus_balance };
      // Use stored total_advances from payroll record (what was actually deducted);
      // fall back to summing fetched advances if present
      const advTotal    = advances.length
        ? advances.reduce((s, a) => s + Number(a.amount), 0)
        : (p.total_advances || 0);
      const grossTotal  = (p.gross_pay || 0) + (p.ot_earnings || 0);
      const bonusCut    = p.bonus_cut || 0;
      const deductions  = (p.shortfall_deduction || 0) + advTotal + bonusCut;
      const net         = grossTotal - deductions;
      // Projected bonus balance after this month (prev balance + 1000 if eligible)
      const companyCont = parseInt(State.settings.COMPANY_CONTRIBUTION || 500);
      const bonusAdd    = p.bonus_eligible ? (bonusCut + companyCont) : 0;
      const newBonusBal = bonus_balance + bonusAdd;

      const periodLabel = p.adv_start_date && p.adv_end_date
        ? `${p.adv_start_date} to ${p.adv_end_date}`
        : '—';

      slip.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px">
            <div>
              <div style="font-size:20px;font-weight:700">${State.empName}</div>
              <div style="color:var(--muted);font-size:13px">Pay Slip &nbsp;·&nbsp; ${month}</div>
            </div>
            <div style="text-align:right;font-size:13px;color:var(--muted)">
              <div>Advance Period</div>
              <div style="font-weight:600;color:var(--text)">${periodLabel}</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Attendance</div>
              ${this._row('Total Days', p.TD)}
              ${this._row('Absent', p.absent_days)}
              ${this._row('Week Off', p.week_off_days)}
            </div>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">OT</div>
              ${this._row('Weekday OT', fmtHrs(p.ot_weekday_min))}
              ${this._row('Sunday OT',  fmtHrs(p.ot_sunday_min))}
              ${this._row('Holiday OT', fmtHrs(p.ot_holiday_min))}
            </div>
          </div>

          <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Earnings</div>
                ${this._row('Gross Pay',   fmt(p.gross_pay || 0))}
                ${this._row('OT Earnings', fmt(p.ot_earnings || 0))}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Earnings</span><span>${fmt(grossTotal)}</span>
                </div>
              </div>
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Deductions</div>
                ${this._row('Shortfall', fmt(p.shortfall_deduction || 0))}
                ${this._row('Advances',  fmt(advTotal))}
                ${bonusCut > 0 ? this._row('Bonus Contribution', fmt(bonusCut)) : ''}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Deductions</span><span>${fmt(deductions)}</span>
                </div>
              </div>
            </div>
          </div>

          ${newBonusBal > 0 ? `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Bonus Pool Balance</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Prev ₹${bonus_balance.toLocaleString('en-IN')} + This month ₹${bonusAdd.toLocaleString('en-IN')}</div>
            </div>
            <div style="font-weight:800;font-size:18px;color:var(--success)">₹${newBonusBal.toLocaleString('en-IN')}</div>
          </div>` : ''}

          <div style="background:var(--primary);color:#fff;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:15px">Net In-Hand</span>
            <span style="font-weight:800;font-size:20px">${fmt(net)}</span>
          </div>

          <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-primary btn-sm" onclick="EmployeeApp.downloadPayslip()">↓ Download Payslip</button>
            ${navigator.share ? `<button class="btn btn-secondary btn-sm" onclick="EmployeeApp.sharePayslip()">📤 Share</button>` : ''}
          </div>
        </div>

        ${advances.length ? `
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px">Advance Details &nbsp;<span style="font-size:12px;font-weight:400;color:var(--muted)">(${periodLabel})</span></div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:8px 10px;text-align:left">Date</th>
                <th style="padding:8px 10px;text-align:right">Amount</th>
              </tr>
            </thead>
            <tbody>
              ${advances.map(a => `<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 10px">${a.date}</td>
                <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
              </tr>`).join('')}
              <tr style="background:var(--surface2)">
                <td style="padding:9px 10px;font-weight:700">Total Advance Deducted</td>
                <td style="padding:9px 10px;text-align:right;font-weight:700">${fmt(advTotal)}</td>
              </tr>
            </tbody>
          </table>
        </div>` : ''}`;
    } catch(e) { toast(e.message, 'error'); }
  },

  _row(label, val) {
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--muted)">${label}</span><span style="font-weight:500">${val ?? '—'}</span>
    </div>`;
  },

  _printHTML(html, title) {
    const win = window.open('', '_blank');
    if (!win) { toast('Allow pop-ups to print/save PDF', 'error'); return; }
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title>
      <style>*{box-sizing:border-box}body{margin:0;font-family:sans-serif;background:#fff;color:#0f172a}
      @media print{body{margin:0}@page{margin:10mm}}</style></head><body>${html}</body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 400);
  },

  async downloadPayslip() {
    if (!this._slip) { toast('No payslip loaded', 'error'); return; }
    const { p, advances, month, bonus_balance } = this._slip;
    const sr = (l, v) => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#64748b">${l}</span><span style="font-weight:500">${v}</span></div>`;
    const advTotal   = advances.length ? advances.reduce((s, a) => s + Number(a.amount), 0) : (p.total_advances || 0);
    const bonusCut   = p.bonus_cut || 0;
    const grossTotal = (p.gross_pay || 0) + (p.ot_earnings || 0);
    const deductions = (p.shortfall_deduction || 0) + advTotal + bonusCut;
    const net        = grossTotal - deductions;
    const companyCont = parseInt(State.settings.COMPANY_CONTRIBUTION || 500);
    const bonusAdd    = p.bonus_eligible ? (bonusCut + companyCont) : 0;
    const newBonusBal = (bonus_balance || 0) + bonusAdd;
    const period     = p.adv_start_date && p.adv_end_date ? `${p.adv_start_date} → ${p.adv_end_date}` : '—';
    const html = `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div><div style="font-size:22px;font-weight:700">${State.empName}</div>
          <div style="color:#64748b;font-size:13px">Pay Slip · ${month}</div></div>
        <div style="text-align:right;font-size:13px"><div style="font-weight:700">Mahitha Prasad</div>
          <div style="color:#64748b">Advance Period</div><div style="font-weight:600">${period}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Attendance</div>
          ${sr('Total Days', p.TD)}${sr('Absent', p.absent_days)}${sr('Week Off', p.week_off_days)}</div>
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Overtime</div>
          ${sr('Weekday OT', fmtHrs(p.ot_weekday_min))}${sr('Sunday OT', fmtHrs(p.ot_sunday_min))}${sr('Holiday OT', fmtHrs(p.ot_holiday_min))}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;border-top:1px solid #e2e8f0;padding-top:16px;margin-bottom:16px">
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Earnings</div>
          ${sr('Gross Pay', fmt(p.gross_pay||0))}${sr('OT Earnings', fmt(p.ot_earnings||0))}
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #e2e8f0;font-weight:700"><span>Total Earnings</span><span>${fmt(grossTotal)}</span></div></div>
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Deductions</div>
          ${sr('Shortfall', fmt(p.shortfall_deduction||0))}${sr('Advances', fmt(advTotal))}${bonusCut > 0 ? sr('Bonus Contribution', fmt(bonusCut)) : ''}
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #e2e8f0;font-weight:700"><span>Total Deductions</span><span>${fmt(deductions)}</span></div></div>
      </div>
      ${newBonusBal > 0 ? `<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase">Bonus Pool Balance</div>
          <div style="font-size:11px;color:#166534;margin-top:2px">Prev ₹${(bonus_balance||0).toLocaleString('en-IN')} + This month ₹${bonusAdd.toLocaleString('en-IN')}</div></div>
        <div style="font-weight:800;font-size:18px;color:#15803d">₹${newBonusBal.toLocaleString('en-IN')}</div>
      </div>` : ''}
      <div style="background:#2563eb;color:#fff;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:15px">Net In-Hand</span><span style="font-weight:800;font-size:22px">${fmt(net)}</span>
      </div>
      ${advances.length ? `<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Advance Details</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#f1f5f9"><th style="padding:8px 10px;text-align:left">Date</th><th style="padding:8px 10px;text-align:right">Amount</th></tr></thead>
          <tbody>${advances.map(a => `<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:8px 10px">${a.date}</td><td style="padding:8px 10px;text-align:right;font-weight:600">${fmt(Number(a.amount))}</td></tr>`).join('')}
          <tr style="background:#f1f5f9"><td style="padding:8px 10px;font-weight:700">Total Deducted</td><td style="padding:8px 10px;text-align:right;font-weight:700">${fmt(advTotal)}</td></tr></tbody>
        </table></div>` : ''}
    </div>`;
    this._printHTML(html, `Payslip – ${State.empName} (${month})`);
  },

  async sharePayslip() {
    this.downloadPayslip();
  }
};

// ---- Boot ----
App.init();

</script>
</body>
</html>
