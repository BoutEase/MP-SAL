<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#00D4D4">
  <title>MP-SAL Payroll</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    /* ── BoutEase Design Tokens ── */
    :root {
      /* Surfaces */
      --bg:        #F5FEFE;
      --surface:   #FFFFFF;
      --surface2:  #EAF9F9;
      --surface3:  #E0F7F7;
      --border:    rgba(0,180,180,0.18);
      --border-2:  rgba(0,180,180,0.32);

      /* Ink */
      --text:   #0F2F2F;
      --muted:  #527070;
      --muted2: #8AA5A5;

      /* Brand */
      --primary:       #00D4D4;
      --primary-dark:  #009E9E;
      --primary-light: #E0FAFA;
      --accent:        #F28C28;
      --accent-light:  #FFF4E6;

      /* Status */
      --success:       #28A745;
      --success-light: #DFF5E4;
      --danger:        #DC3545;
      --danger-light:  #F9DDE0;
      --warning:       #F28C28;
      --warning-light: #FFE9D2;

      /* Type */
      --font-sans:  'Sora', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-serif: 'Lora', Georgia, serif;
      --font-mono:  ui-monospace, 'SF Mono', 'Roboto Mono', monospace;

      /* Shape */
      --radius:    12px;
      --radius-sm: 8px;
      --shadow:    0 1px 0 rgba(0,180,180,.06), 0 2px 6px rgba(0,180,180,.06);
      --shadow-md: 0 4px 18px rgba(0,180,180,.12), 0 1px 3px rgba(15,47,47,.05);
      --shadow-teal:   0 4px 18px rgba(0,212,212,.28);
      --shadow-orange: 0 4px 18px rgba(242,140,40,.22);
    }
    [data-theme="dark"] {
      --bg: #0A1F1F; --surface: #0F2929; --surface2: #143434; --surface3: #1A4040;
      --border: rgba(0,212,212,0.15); --border-2: rgba(0,212,212,0.28);
      --text: #EAF9F9; --muted: #88B5B5; --muted2: #5A8585;
      --primary: #00D4D4; --primary-dark: #00AEAE; --primary-light: #0F3B3B;
      --accent: #F28C28; --accent-light: #2E1F0F;
      --success: #4CAF72; --success-light: #143524;
      --danger: #E06070; --danger-light: #3A1820;
      --warning: #F28C28; --warning-light: #2E1F0F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }
    .screen { min-height: 100vh; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-2);
      background: var(--surface); color: var(--text);
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .btn-primary {
      background: var(--primary); color: var(--text);
      border-color: var(--primary); box-shadow: var(--shadow-teal); font-weight: 700;
    }
    .btn-primary:hover { background: #00EEEE; border-color: #00EEEE; color: var(--text); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface); color: var(--text); border-color: var(--border-2);
    }
    .btn-secondary:hover { background: var(--surface2); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { opacity: .9; }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    /* ── Inputs ── */
    input, select, textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text);
      font-family: var(--font-sans); font-size: 13px;
      outline: none; transition: border .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0,212,212,.12);
    }
    input::placeholder { color: var(--muted2); }
    label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      display: block; margin-bottom: 5px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .field { margin-bottom: 14px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 700; letter-spacing: .02em;
    }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-warning { background: var(--warning-light); color: var(--warning); }
    .badge-danger  { background: var(--danger-light);  color: var(--danger); }
    .badge-primary { background: var(--primary-light); color: var(--primary-dark); }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; font-size: 10.5px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
      padding: 11px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap; position: sticky; top: 0; z-index: 1;
    }
    tbody td {
      padding: 11px 14px; border-bottom: 1px solid var(--border);
      vertical-align: middle; color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #F0FDFD; }

    /* ── Setup Screen ── */
    #screen-setup { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
    .setup-box { width: 100%; max-width: 440px; }
    .setup-box h1 { font-family: var(--font-serif); font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.02em; }
    .setup-box p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* ── Login Screen ── */
    #screen-login { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); min-height: 100vh; }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-mark {
      width: 56px; height: 56px; background: var(--primary); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-style: italic; font-size: 26px;
      color: var(--text); margin-bottom: 14px;
      box-shadow: var(--shadow-teal);
    }
    .login-logo h1 { font-family: var(--font-serif); font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
    .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .role-tabs { display: flex; gap: 3px; padding: 3px; background: var(--surface2); border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
    .role-tab { flex: 1; padding: 8px 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; color: var(--muted); background: transparent; border: none; }
    .role-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .pin-input { font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: 700; height: 54px; }
    .login-footer { margin-top: 18px; text-align: center; }
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 14px; cursor: pointer; font-size: 12px; color: var(--muted);
      font-family: var(--font-sans); font-weight: 500;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border-2); }

    /* ── Sidebar ── */
    .mp-sidebar {
      width: 224px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 18px 12px;
      height: 100vh; overflow-y: auto; position: sticky; top: 0;
    }
    .mp-sidebar::-webkit-scrollbar { display: none; }
    .mp-sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 8px 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .mp-brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--primary); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-style: italic; font-size: 18px; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,212,212,.3); flex-shrink: 0;
    }
    .mp-brand-name { font-family: var(--font-serif); font-weight: 700; font-size: 15px; letter-spacing: -.02em; }
    .mp-brand-sub  { font-size: 10.5px; color: var(--muted); margin-top: 1px; font-weight: 500; }
    .mp-nav-section {
      font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted2); padding: 12px 10px 4px;
    }
    .mp-nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; user-select: none; transition: all .15s;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .mp-nav-item:hover { background: var(--surface2); color: var(--primary-dark); }
    .mp-nav-item.active {
      background: var(--primary-light); color: var(--text); font-weight: 700;
      box-shadow: inset 0 0 0 1px var(--border-2);
    }
    .mp-nav-item svg { opacity: .6; flex-shrink: 0; }
    .mp-nav-item.active svg { opacity: 1; color: var(--primary-dark); }
    .mp-sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 6px; }

    /* ── Topbar ── */
    .mp-topbar {
      height: 56px; padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 20; flex-shrink: 0;
    }
    [data-theme="dark"] .mp-topbar { background: rgba(15,41,41,.92); }
    .mp-topbar-title { font-family: var(--font-serif); font-size: 15px; font-weight: 700; letter-spacing: -.01em; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md); }
    #toast.show { opacity: 1; }

    /* ── Spinner ── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Admin layout ── */
    #screen-admin { display: flex; height: 100vh; overflow: hidden; }
    .mp-admin-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .mp-admin-main { flex: 1; overflow: auto; padding: 24px 28px; }

    /* ── Mobile bottom nav ── */
    .mp-mobile-nav { display: none; }
    @media (max-width: 768px) {
      .mp-sidebar { display: none; }
      .mp-admin-main { padding: 12px 14px 80px; }
      .mp-mobile-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
        background: var(--surface); border-top: 1px solid var(--border);
        padding: 8px 4px env(safe-area-inset-bottom);
      }
      .mp-mobile-nav-item {
        flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 4px 2px; border: none; background: none; cursor: pointer;
        font-size: 10px; font-weight: 600; color: var(--muted2); font-family: var(--font-sans);
      }
      .mp-mobile-nav-item.active { color: var(--primary-dark); }
      .mp-mobile-nav-item svg { opacity: .6; }
      .mp-mobile-nav-item.active svg { opacity: 1; }
      .mp-topbar { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen hidden">
  <div class="setup-box card">
    <h1>Connect to Google Sheets</h1>
    <p>Paste your Google Apps Script Web App URL below. You only need to do this once.</p>
    <div class="field">
      <label>Apps Script Web App URL</label>
      <input type="url" id="setup-url" placeholder="https://script.google.com/macros/s/..." />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="App.setup()">Connect &amp; Initialise Sheets</button>
    <div id="setup-status" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen hidden">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">M</div>
      <h1>MP&#x2009;SAL</h1>
      <p>Mahitha Prasad Payroll</p>
    </div>
    <div class="card">
      <div class="role-tabs">
        <div class="role-tab active" id="tab-manager"  onclick="Auth.selectRole('manager')">Manager</div>
        <div class="role-tab"        id="tab-employee" onclick="Auth.selectRole('employee')">Employee</div>
      </div>
      <div class="field">
        <label id="pin-label">PIN</label>
        <input type="password" class="pin-input" id="pin-input" maxlength="6" placeholder="••••••"
          onkeydown="if(event.key==='Enter') Auth.login()" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="Auth.login()">Login</button>
    </div>
    <div class="login-footer">
      <button class="theme-toggle" onclick="App.toggleTheme()">Toggle theme</button>
      &nbsp;
      <button class="theme-toggle" onclick="App.changeUrl()">Change URL</button>
    </div>
  </div>
</div>

<!-- MANAGER SCREEN (shell only) -->
<div id="screen-manager" class="screen hidden"></div>

<!-- EMPLOYEE SCREEN (shell only) -->
<div id="screen-employee" class="screen hidden"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>

// ============================================================
// MP-SAL Payroll — Frontend App
// ============================================================

// ---- State ----
const State = {
  role: null, pin: null, gasUrl: null,
  employees: [], holidays: [], advances: [], payroll: [],
  payments: [], bonusPool: [], settings: {},
  currentMonth: (function() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  })(),
  advStartDate: '',
  advEndDate: new Date().toISOString().split('T')[0],
  parsedAttendance: null,
  unmatchedAttendance: [],
  attendanceMap: {}   // emp_id → parsed day array
};

function getTeams() {
  return (State.settings.TEAMS || 'Emb,Stitching').split(',').map(t => t.trim()).filter(Boolean);
}

// ---- API ----
const API = {
  async call(action, data) {
    const body = { action, data, pin: State.pin, role: State.role };
    const res = await fetch(State.gasUrl, { method: 'POST', body: JSON.stringify(body) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'API error');
    return json;
  }
};

// ---- Toast ----
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ---- App init ----
const App = {
  init() {
    State.gasUrl = localStorage.getItem('mpsal_url');
    const theme = localStorage.getItem('mpsal_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    if (!State.gasUrl) {
      show('screen-setup');
    } else {
      show('screen-login');
    }
  },
  toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mpsal_theme', next);
  },
  changeUrl() {
    localStorage.removeItem('mpsal_url');
    State.gasUrl = null;
    show('screen-setup');
  },
  async setup() {
    const url = document.getElementById('setup-url').value.trim();
    if (!url.startsWith('https://')) { toast('Enter a valid URL', 'error'); return; }
    const status = document.getElementById('setup-status');
    status.textContent = 'Connecting…';
    State.gasUrl = url;
    State.role = 'admin'; State.pin = '';
    try {
      const r = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'initSheets', data: {} }) });
      const j = await r.json();
      if (!j.success) throw new Error(j.error);
      localStorage.setItem('mpsal_url', url);
      status.textContent = 'Connected! ' + (j.message || '');
      setTimeout(() => { State.role = null; State.pin = null; show('screen-login'); }, 1200);
    } catch(e) {
      status.textContent = 'Error: ' + e.message;
    }
  }
};

// ---- Auth ----
const Auth = {
  selectedRole: 'manager',
  selectRole(role) {
    this.selectedRole = role;
    ['manager','employee'].forEach(r => {
      const btn = document.getElementById('tab-' + r);
      if (btn) btn.classList.toggle('active', r === role);
    });
    const lbl = document.getElementById('pin-label');
    if (lbl) lbl.textContent = role === 'employee' ? 'Login Code' : 'PIN';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  },
  async login() {
    const pin = document.getElementById('pin-input').value.trim();
    if (!pin) { toast('Enter ' + (this.selectedRole === 'employee' ? 'Login Code' : 'PIN'), 'error'); return; }
    State.role = this.selectedRole;
    State.pin  = pin;
    try {
      const r = await API.call('verifyPin', { pin, role: this.selectedRole });
      if (!r.success) { toast(this.selectedRole === 'employee' ? 'Invalid login code' : 'Wrong PIN', 'error'); State.pin = null; return; }
      if (State.role === 'employee') {
        State.empId   = r.emp_id;
        State.empName = r.emp_name;
        EmployeeApp.init();
      } else {
        await loadCoreData();
        ManagerApp.init();
      }
    } catch(e) {
      toast(e.message, 'error');
    }
  },
  logout() {
    State.role = null; State.pin = null; State.empId = null; State.empName = null;
    document.getElementById('pin-input').value = '';
    show('screen-login');
  }
};

async function loadCoreData() {
  const [empRes, settRes] = await Promise.all([
    API.call('getEmployees', {}),
    API.call('getSettings', {})
  ]);
  State.employees = empRes.data || [];
  State.settings = settRes.data || {};
}

// ---- Utility ----
function show(id) {
  ['screen-setup','screen-login','screen-manager','screen-employee'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.classList.toggle('hidden', s !== id);
  });
}

function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
function fmtDate(d) {
  if (!d) return '—';
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p = String(d).substring(0,10).split('-');
  return p.length === 3 ? `${p[2]}-${m[parseInt(p[1],10)-1]}-${p[0]}` : String(d);
}
function fmtHrs(mins) {
  const h = Math.floor(Math.abs(mins) / 60), m = Math.abs(mins) % 60;
  return (mins < 0 ? '-' : '') + h + 'h' + (m ? ' ' + m + 'm' : '');
}
function currentYear() { return State.currentMonth.substring(0, 4); }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}


// ============================================================
// MANAGER APP
// ============================================================
const ManagerApp = {
  dateAdvances: [],

  init() {
    show('screen-manager');
    const c = document.getElementById('screen-manager');
    const today = new Date().toISOString().split('T')[0];
    c.innerHTML = `
    <div style="min-height:100vh;background:var(--bg)">
    <div class="mp-topbar">
      <span class="mp-brand-mark" style="width:28px;height:28px;font-size:15px">M</span>
      <span class="mp-topbar-title">MP&#x2009;SAL</span>
      <span style="font-size:12px;color:var(--muted);font-weight:600;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:99px;margin-left:4px">Manager</span>
      <span style="flex:1"></span>
      <button class="btn btn-secondary btn-sm" onclick="App.toggleTheme()">Theme</button>
      <button class="btn btn-danger btn-sm" onclick="Auth.logout()" style="margin-left:6px">Logout</button>
    </div>
    <main style="padding:24px 28px;max-width:760px;margin:0 auto">
      <h2 style="font-family:var(--font-serif);font-size:20px;font-weight:700;margin-bottom:20px;letter-spacing:-.02em">Advance Entry</h2>
      <div class="card" style="margin-bottom:20px">
        <div class="field" style="margin-bottom:16px">
          <label style="font-weight:600">Date</label>
          <input type="date" id="m-date" value="${today}" style="max-width:180px"
            onchange="ManagerApp.loadForDate(this.value)" />
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:14px" id="m-emp-table">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:10px 12px;text-align:left;font-weight:600">ID</th>
                <th style="padding:10px 12px;text-align:left;font-weight:600">Employee</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600">Amount (₹)</th>
              </tr>
            </thead>
            <tbody id="m-emp-body"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="ManagerApp.submit()">Submit</button>
      </div>
      <div id="m-submitted"></div>
    </main>
    </div>`;
    this.loadForDate(today);
  },

  async loadForDate(date, preserveUserInput = true) {
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
      this.renderInputTable(date, preserveUserInput);
      this.renderSubmitted(date);
    } catch(e) { toast(e.message, 'error'); }
  },

  renderInputTable(date, preserveUserInput = true) {
    // Save whatever the user has typed so a re-render doesn't wipe it
    const userValues = {};
    if (preserveUserInput) {
      document.querySelectorAll('[id^="m-amt-"]').forEach(input => {
        userValues[input.id.replace('m-amt-', '')] = input.value;
      });
    }

    const allEmps = State.employees.filter(e => e.status === 'Active');
    const body = document.getElementById('m-emp-body');
    if (!body) return;
    const teams = getTeams();
    const teamSet = new Set(teams);
    // Group employees: known teams first (in order), then Others
    const grouped = {};
    teams.forEach(t => { grouped[t] = []; });
    grouped['Other'] = [];
    allEmps.forEach(emp => {
      const t = emp.team && teamSet.has(emp.team) ? emp.team : 'Other';
      grouped[t].push(emp);
    });
    const teamOrder = [...teams, 'Other'];
    let rows = '';
    teamOrder.forEach(team => {
      const emps = (grouped[team] || []).sort((a, b) => a.name.localeCompare(b.name));
      if (!emps.length) return;
      rows += `<tr><td colspan="3" style="padding:8px 12px;background:var(--bg-secondary,#f3f4f6);font-weight:700;font-size:13px;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border)">${team}</td></tr>`;
      emps.forEach(emp => {
        const existing = this.dateAdvances.find(a => String(a.emp_id) === String(emp.emp_id));
        const serverVal = existing ? Math.round(existing.amount) : '';
        // Use in-operator so user clearing an input (value="") is preserved too
        const empKey = String(emp.emp_id);
        const val = (empKey in userValues) ? userValues[empKey] : serverVal;
        const isHighlighted = existing || (val !== '' && Number(val) > 0);
        const inputStyle = isHighlighted
          ? 'width:110px;text-align:right;padding:6px 8px;border-color:var(--accent);background:var(--accent-light)'
          : 'width:110px;text-align:right;padding:6px 8px';
        rows += `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:10px 12px;color:var(--muted);font-size:13px">${emp.petpooja_id||'—'}</td>
          <td style="padding:10px 12px;font-weight:500">${emp.name}</td>
          <td style="padding:8px 12px;text-align:right">
            <input type="number" id="m-amt-${emp.emp_id}" value="${val}" placeholder="—"
              min="0" style="${inputStyle}" title="${existing ? 'Existing advance — edit to change' : ''}" />
          </td>
        </tr>`;
      });
    });
    body.innerHTML = rows;
  },

  renderSubmitted(date) {
    const c = document.getElementById('m-submitted');
    if (!c) return;
    if (!this.dateAdvances.length) { c.innerHTML = ''; return; }

    // Enrich with employee data and group by team
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => String(e.emp_id) === String(a.emp_id)) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const statusStyle = s => s === 'Approved' ? 'background:#dcfce7;color:#15803d' : 'background:#fef3c7;color:#92400e';
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);

    let rows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      rows += `<tr style="background:var(--surface2)">
        <td colspan="4" style="padding:8px 10px;font-weight:700;font-size:12px;color:var(--muted)">${team}</td>
      </tr>`;
      rows += group.map(a => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:9px 10px;color:var(--muted);font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 10px;font-weight:500">${a.emp_name}</td>
          <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
          <td style="padding:9px 10px;text-align:center">
            <span style="font-size:11px;padding:2px 7px;border-radius:99px;${statusStyle(a.status)}">${a.status}</span>
          </td>
        </tr>`).join('');
      rows += `<tr style="background:var(--surface2)">
        <td colspan="2" style="padding:8px 10px;font-weight:600;font-size:13px">${team} Total</td>
        <td style="padding:8px 10px;text-align:right;font-weight:700">${fmt(sub)}</td>
        <td></td>
      </tr>`;
    });

    c.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600">Submitted for ${date}</h3>
        <button class="btn btn-secondary btn-sm" onclick="ManagerApp.savePDF()">Save PDF</button>
        <button class="btn btn-primary btn-sm" onclick="ManagerApp.sharePDF()" style="display:flex;align-items:center;gap:5px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16c-.8 0-1.5.3-2 .8l-7.3-4.2c.1-.2.1-.4.1-.6s0-.4-.1-.6L16 7.2c.5.5 1.2.8 2 .8 1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3c0 .2 0 .4.1.6L7.8 9.8C7.3 9.3 6.6 9 5.8 9c-1.7 0-3 1.3-3 3s1.3 3 3 3c.8 0 1.5-.3 2-.8l7.3 4.2c-.1.2-.1.4-.1.6 0 1.6 1.3 2.9 2.9 2.9s2.9-1.3 2.9-2.9-1.2-3-2.8-3z"/></svg>
          Share
        </button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--surface2)">
            <tr>
              <th style="padding:10px;text-align:left;width:50px">ID</th>
              <th style="padding:10px;text-align:left">Employee</th>
              <th style="padding:10px;text-align:right">Amount</th>
              <th style="padding:10px;text-align:center">Status</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr style="background:var(--primary);color:#fff">
              <td colspan="2" style="padding:10px;font-weight:700">Grand Total (${enriched.length})</td>
              <td style="padding:10px;text-align:right;font-weight:700">${fmt(grandTotal)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>`;
  },

  async submit() {
    const date = document.getElementById('m-date')?.value;
    if (!date) { toast('Select a date', 'error'); return; }

    // Fresh fetch before processing so existing advances are always current
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
    } catch(e) { toast(e.message, 'error'); return; }

    const emps = State.employees.filter(e => e.status === 'Active');
    // Build task functions (not Promises) so saves execute one-at-a-time,
    // preventing race conditions in concurrent appendRow / setValues on the sheet.
    const tasks = [];
    let count = 0;
    for (const emp of emps) {
      const val = Math.round(parseFloat(document.getElementById('m-amt-' + emp.emp_id)?.value) || 0);
      const existing = this.dateAdvances.find(a => String(a.emp_id) === String(emp.emp_id));
      if (val > 0 && existing) {
        tasks.push(() => API.call('saveAdvance', { advance_id: existing.advance_id, date, amount: val }));
        count++;
      } else if (val > 0) {
        tasks.push(() => API.call('saveAdvance', { emp_id: emp.emp_id, emp_name: emp.name, date, amount: val, created_by: 'Manager' }));
        count++;
      } else if (val === 0 && existing) {
        tasks.push(() => API.call('deleteAdvance', { advance_id: existing.advance_id }));
      }
    }
    if (!count) { toast('Enter at least one amount', 'error'); return; }
    try {
      for (const task of tasks) { await task(); }
      await this.loadForDate(date, false);  // false = show fresh server values, discard typed inputs
      toast(`${count} advance${count > 1 ? 's' : ''} submitted`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  _buildPDFElement() {
    const date    = document.getElementById('m-date')?.value || this.dateAdvances[0]?.date;
    const company = State.settings?.COMPANY_NAME || 'Mahitha Prasad';
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => String(e.emp_id) === String(a.emp_id)) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);
    let bodyRows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      bodyRows += `<tr><td colspan="4" style="padding:8px 12px;font-weight:700;font-size:12px;background:#e2e8f0;color:#475569">${team}</td></tr>`;
      bodyRows += group.map(a => `
        <tr>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;color:#64748b;font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0">${a.emp_name}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:right;font-weight:600">&#8377;${a.amount.toLocaleString('en-IN')}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:center;font-size:11px;color:${a.status==='Approved'?'#15803d':'#92400e'}">${a.status}</td>
        </tr>`).join('');
      bodyRows += `<tr style="background:#fef9c3"><td colspan="2" style="padding:9px 12px;font-weight:700">${team} Total</td>
        <td style="padding:9px 12px;text-align:right;font-weight:700">&#8377;${sub.toLocaleString('en-IN')}</td><td></td></tr>`;
    });
    const el = document.createElement('div');
    el.innerHTML = `
      <div style="font-family:Arial,sans-serif;padding:32px;color:#1e293b;max-width:640px;margin:0 auto">
        <h1 style="font-size:20px;margin:0 0 4px">${company} &#8212; Advance Report</h1>
        <div style="color:#64748b;font-size:13px;margin-bottom:24px">Date: ${date} &nbsp;&middot;&nbsp; Submitted by: Manager &nbsp;&middot;&nbsp; Generated: ${new Date().toLocaleString('en-IN')}</div>
        <table style="width:100%;border-collapse:collapse">
          <thead style="background:#1e3a5f;color:#fff">
            <tr><th style="padding:10px 12px;text-align:left;font-size:13px">ID</th><th style="padding:10px 12px;text-align:left;font-size:13px">Employee</th><th style="padding:10px 12px;text-align:right;font-size:13px">Amount</th><th style="padding:10px 12px;text-align:center;font-size:13px">Status</th></tr>
          </thead>
          <tbody>
            ${bodyRows}
            <tr style="background:#f97316;color:#fff">
              <td colspan="2" style="padding:10px 12px;font-weight:700">Grand Total &#8212; ${enriched.length} advance${enriched.length>1?'s':''}</td>
              <td style="padding:10px 12px;text-align:right;font-weight:700">&#8377;${grandTotal.toLocaleString('en-IN')}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:32px;font-size:12px;color:#94a3b8">MP-SAL Payroll System</div>
      </div>`;
    return { el, date };
  },

  savePDF() {
    if (!this.dateAdvances.length) return;
    const { el, date } = this._buildPDFElement();
    const company = State.settings?.COMPANY_NAME || 'Mahitha Prasad';
    const w = window.open('', '_blank');
    w.document.write(`<!doctype html><html><head><meta charset="utf-8">
      <title>Advance Report – ${date}</title>
      <style>
        body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#1e293b}
        @media print{@page{size:A4;margin:18mm}}
      </style>
    </head><body>${el.innerHTML}</body></html>`);
    w.document.close();
    w.focus();
    setTimeout(() => { w.print(); }, 400);
  },

  sharePDF() {
    this.savePDF();
  }
};

const EmployeeApp = {
  currentMonth: new Date().toISOString().substring(0, 7),

  init() {
    show('screen-employee');
    const c = document.getElementById('screen-employee');
    c.innerHTML = `
      <div style="min-height:100vh;background:var(--bg)">
        <div class="mp-topbar" style="max-width:760px;margin:0 auto;padding:0 20px">
          <span class="mp-brand-mark" style="width:28px;height:28px;font-size:15px">M</span>
          <span class="mp-topbar-title" style="font-size:14px">MP&#x2009;SAL</span>
          <span style="flex:1"></span>
          <span style="font-size:13px;color:var(--muted);font-weight:500">${State.empName}</span>
          <button class="btn btn-secondary btn-sm" onclick="Auth.logout()" style="margin-left:8px">Logout</button>
        </div>
        <div style="max-width:760px;margin:0 auto;padding:20px 20px">
          <div class="role-tabs" style="max-width:320px;margin-bottom:20px">
            <button id="emp-tab-payslip"  class="role-tab active" onclick="EmployeeApp.showTab('payslip')">Pay Slip</button>
            <button id="emp-tab-advances" class="role-tab"        onclick="EmployeeApp.showTab('advances')">My Advances</button>
          </div>

          <div id="emp-pane-payslip">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
              <label style="font-size:13px;font-weight:600;color:var(--muted);margin:0">Pay Slip for</label>
              <input type="month" id="emp-month" value="${this.currentMonth}"
                style="width:auto;padding:6px 10px" onchange="EmployeeApp.load(this.value)" />
            </div>
            <div id="emp-slip"></div>
          </div>

          <div id="emp-pane-advances" class="hidden"></div>
        </div>
      </div>`;
    this.loadLatest();
  },

  async loadLatest() {
    const slip = document.getElementById('emp-slip');
    if (slip) slip.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeePayslip', { emp_id: State.empId, month: 'latest' });
      const resolvedMonth = (r.data && r.data.month) || this.currentMonth;
      this.currentMonth = resolvedMonth;
      const picker = document.getElementById('emp-month');
      if (picker) picker.value = resolvedMonth;
      this._renderSlip(r.data, resolvedMonth);
    } catch(e) {
      if (slip) slip.innerHTML = `<div class="card" style="color:var(--danger)">${e.message}</div>`;
    }
  },



  showTab(tab) {
    const payTab = document.getElementById('emp-tab-payslip');
    const advTab = document.getElementById('emp-tab-advances');
    const payPane = document.getElementById('emp-pane-payslip');
    const advPane = document.getElementById('emp-pane-advances');
    if (tab === 'payslip') {
      payTab.classList.add('active'); advTab.classList.remove('active');
      payPane.classList.remove('hidden'); advPane.classList.add('hidden');
    } else {
      advTab.classList.add('active'); payTab.classList.remove('active');
      advPane.classList.remove('hidden'); payPane.classList.add('hidden');
      this.loadAdvances();
    }
  },

  async loadAdvances() {
    const pane = document.getElementById('emp-pane-advances');
    pane.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeeAdvanceHistory', { emp_id: State.empId });
      const periods = r.data || [];
      if (!periods.length) {
        pane.innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:32px">
          Advance details will appear here after your payslip is generated.
        </div>`;
        return;
      }
      pane.innerHTML = periods.map(period => {
        const startLabel = fmtDate(period.adv_start_date);
        const endLabel   = fmtDate(period.adv_end_date);
        const periodLabel = period.adv_start_date && period.adv_end_date ? `${startLabel} to ${endLabel}` : period.month;
        // Use fetched advances if available; fall back to stored total from payroll record
        const displayTotal = period.advances.length ? period.total : (period.total_from_payroll || 0);
        if (!period.advances.length) {
          return `<div class="card" style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <div><div style="font-weight:700;font-size:15px">${period.month}</div>
                <div style="color:var(--muted);font-size:12px">${periodLabel}</div></div>
              <div style="text-align:right">
                ${displayTotal > 0
                  ? `<div style="font-size:11px;color:var(--muted)">Total Deducted</div>
                     <div style="font-weight:700;color:var(--warning);font-size:14px">${fmt(displayTotal)}</div>`
                  : `<div style="font-weight:700;color:var(--success);font-size:14px">No advances</div>`}
              </div>
            </div>
          </div>`;
        }
        return `<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
          <div style="background:var(--surface2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div><div style="font-weight:700;font-size:15px">${period.month}</div>
              <div style="color:var(--muted);font-size:12px">${periodLabel}</div></div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total Deducted</div>
              <div style="font-weight:800;font-size:18px;color:var(--warning)">${fmt(displayTotal)}</div>
            </div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--surface);border-bottom:1px solid var(--border)">
              <th style="padding:8px 14px;text-align:left;font-size:12px;color:var(--muted);font-weight:600">Date</th>
              <th style="padding:8px 14px;text-align:right;font-size:12px;color:var(--muted);font-weight:600">Amount</th>
            </tr></thead>
            <tbody>${period.advances.map(a => `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 14px">${fmtDate(a.date)}</td>
              <td style="padding:10px 14px;text-align:right;font-weight:600">${fmt(Number(a.amount))}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`;
      }).join('');
    } catch(e) { pane.innerHTML = `<div class="card" style="color:var(--danger)">${e.message}</div>`; }
  },

  async load(month) {
    this.currentMonth = month;
    const slip = document.getElementById('emp-slip');
    if (!slip) return;
    slip.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeePayslip', { emp_id: State.empId, month });
      this._renderSlip(r.data, month);
    } catch(e) { toast(e.message, 'error'); }
  },

  _renderSlip(data, month) {
    const slip = document.getElementById('emp-slip');
    if (!slip) return;
    const { payroll: p, advances } = data || {};
      if (!p) {
        slip.innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:32px">No payroll data found for ${month}.</div>`;
        return;
      }
      const bonus_balance = (data && data.bonus_balance) || 0;
      this._slip = { p, advances, month, bonus_balance };
      // Use stored total_advances from payroll record (what was actually deducted);
      // fall back to summing fetched advances if present
      const advTotal    = advances.length
        ? advances.reduce((s, a) => s + Number(a.amount), 0)
        : (p.total_advances || 0);
      const grossTotal  = (p.gross_pay || 0) + (p.ot_earnings || 0);
      const bonusCut    = p.bonus_cut || 0;
      const deductions  = (p.shortfall_deduction || 0) + advTotal + bonusCut;
      const net         = grossTotal - deductions;
      // Projected bonus balance after this month (prev balance + 1000 if eligible)
      const companyCont = parseInt(State.settings.COMPANY_CONTRIBUTION || 500);
      const bonusAdd    = p.bonus_eligible ? (bonusCut + companyCont) : 0;
      const newBonusBal = bonus_balance + bonusAdd;

      const periodLabel = p.adv_start_date && p.adv_end_date
        ? `${fmtDate(p.adv_start_date)} to ${fmtDate(p.adv_end_date)}`
        : '—';

      slip.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px">
            <div>
              <div style="font-size:20px;font-weight:700">${State.empName}</div>
              <div style="color:var(--muted);font-size:13px">Pay Slip &nbsp;·&nbsp; ${month}</div>
            </div>
            <div style="text-align:right;font-size:13px;color:var(--muted)">
              <div>Advance Period</div>
              <div style="font-weight:600;color:var(--text)">${periodLabel}</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Attendance</div>
              ${this._row('Total Days', p.TD)}
              ${this._row('Absent', p.absent_days)}
              ${this._row('Week Off', p.week_off_days)}
            </div>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">OT</div>
              ${this._row('Weekday OT', fmtHrs(p.ot_weekday_min))}
              ${this._row('Sunday OT',  fmtHrs(p.ot_sunday_min))}
              ${this._row('Holiday OT', fmtHrs(p.ot_holiday_min))}
            </div>
          </div>

          <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Earnings</div>
                ${this._row('Gross Pay',   fmt(p.gross_pay || 0))}
                ${this._row('OT Earnings', fmt(p.ot_earnings || 0))}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Earnings</span><span>${fmt(grossTotal)}</span>
                </div>
              </div>
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Deductions</div>
                ${this._row('Shortfall', fmt(p.shortfall_deduction || 0))}
                ${this._row('Advances',  fmt(advTotal))}
                ${bonusCut > 0 ? this._row('Bonus Contribution', fmt(bonusCut)) : ''}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Deductions</span><span>${fmt(deductions)}</span>
                </div>
              </div>
            </div>
          </div>

          ${newBonusBal > 0 ? `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Bonus Pool Balance</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Prev ₹${bonus_balance.toLocaleString('en-IN')} + This month ₹${bonusAdd.toLocaleString('en-IN')}</div>
            </div>
            <div style="font-weight:800;font-size:18px;color:var(--success)">₹${newBonusBal.toLocaleString('en-IN')}</div>
          </div>` : ''}

          <div style="background:var(--primary);color:#fff;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:15px">Net In-Hand</span>
            <span style="font-weight:800;font-size:20px">${fmt(net)}</span>
          </div>

          <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-primary btn-sm" onclick="EmployeeApp.downloadPayslip()">&#x2193; Download Payslip</button>
            ${navigator.share ? `<button class="btn btn-secondary btn-sm" onclick="EmployeeApp.sharePayslip()">&#x1F4E4; Share</button>` : ''}
          </div>
        </div>

        ${advances.length ? `
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px">Advance Details &nbsp;<span style="font-size:12px;font-weight:400;color:var(--muted)">(${periodLabel})</span></div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:8px 10px;text-align:left">Date</th>
                <th style="padding:8px 10px;text-align:right">Amount</th>
              </tr>
            </thead>
            <tbody>
              ${advances.map(a => `<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 10px">${fmtDate(a.date)}</td>
                <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
              </tr>`).join('')}
              <tr style="background:var(--surface2)">
                <td style="padding:9px 10px;font-weight:700">Total Advance Deducted</td>
                <td style="padding:9px 10px;text-align:right;font-weight:700">${fmt(advTotal)}</td>
              </tr>
            </tbody>
          </table>
        </div>` : ''}` ;
  },

  _row(label, val) {
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--muted)">${label}</span><span style="font-weight:500">${val ?? '—'}</span>
    </div>`;
  },

  _printHTML(html, title) {
    const win = window.open('', '_blank');
    if (!win) { toast('Allow pop-ups to print/save PDF', 'error'); return; }
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title>
      <style>*{box-sizing:border-box}body{margin:0;font-family:sans-serif;background:#fff;color:#0f172a}
      @media print{body{margin:0}@page{margin:10mm}}</style></head><body>${html}</body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 400);
  },

  async downloadPayslip() {
    if (!this._slip) { toast('No payslip loaded', 'error'); return; }
    const { p, advances, month, bonus_balance } = this._slip;
    const sr = (l, v) => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#64748b">${l}</span><span style="font-weight:500">${v}</span></div>`;
    const advTotal   = advances.length ? advances.reduce((s, a) => s + Number(a.amount), 0) : (p.total_advances || 0);
    const bonusCut   = p.bonus_cut || 0;
    const grossTotal = (p.gross_pay || 0) + (p.ot_earnings || 0);
    const deductions = (p.shortfall_deduction || 0) + advTotal + bonusCut;
    const net        = grossTotal - deductions;
    const companyCont = parseInt(State.settings.COMPANY_CONTRIBUTION || 500);
    const bonusAdd    = p.bonus_eligible ? (bonusCut + companyCont) : 0;
    const newBonusBal = (bonus_balance || 0) + bonusAdd;
    const period     = p.adv_start_date && p.adv_end_date ? `${fmtDate(p.adv_start_date)} → ${fmtDate(p.adv_end_date)}` : '—';
    const html = `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div><div style="font-size:22px;font-weight:700">${State.empName}</div>
          <div style="color:#64748b;font-size:13px">Pay Slip · ${month}</div></div>
        <div style="text-align:right;font-size:13px"><div style="font-weight:700">Mahitha Prasad</div>
          <div style="color:#64748b">Advance Period</div><div style="font-weight:600">${period}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Attendance</div>
          ${sr('Total Days', p.TD)}${sr('Absent', p.absent_days)}${sr('Week Off', p.week_off_days)}</div>
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Overtime</div>
          ${sr('Weekday OT', fmtHrs(p.ot_weekday_min))}${sr('Sunday OT', fmtHrs(p.ot_sunday_min))}${sr('Holiday OT', fmtHrs(p.ot_holiday_min))}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;border-top:1px solid #e2e8f0;padding-top:16px;margin-bottom:16px">
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Earnings</div>
          ${sr('Gross Pay', fmt(p.gross_pay||0))}${sr('OT Earnings', fmt(p.ot_earnings||0))}
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #e2e8f0;font-weight:700"><span>Total Earnings</span><span>${fmt(grossTotal)}</span></div></div>
        <div><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">Deductions</div>
          ${sr('Shortfall', fmt(p.shortfall_deduction||0))}${sr('Advances', fmt(advTotal))}${bonusCut > 0 ? sr('Bonus Contribution', fmt(bonusCut)) : ''}
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #e2e8f0;font-weight:700"><span>Total Deductions</span><span>${fmt(deductions)}</span></div></div>
      </div>
      ${newBonusBal > 0 ? `<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase">Bonus Pool Balance</div>
          <div style="font-size:11px;color:#166534;margin-top:2px">Prev ₹${(bonus_balance||0).toLocaleString('en-IN')} + This month ₹${bonusAdd.toLocaleString('en-IN')}</div></div>
        <div style="font-weight:800;font-size:18px;color:#15803d">₹${newBonusBal.toLocaleString('en-IN')}</div>
      </div>` : ''}
      <div style="background:#2563eb;color:#fff;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:15px">Net In-Hand</span><span style="font-weight:800;font-size:22px">${fmt(net)}</span>
      </div>
      ${advances.length ? `<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Advance Details</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#f1f5f9"><th style="padding:8px 10px;text-align:left">Date</th><th style="padding:8px 10px;text-align:right">Amount</th></tr></thead>
          <tbody>${advances.map(a => `<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:8px 10px">${fmtDate(a.date)}</td><td style="padding:8px 10px;text-align:right;font-weight:600">${fmt(Number(a.amount))}</td></tr>`).join('')}
          <tr style="background:#f1f5f9"><td style="padding:8px 10px;font-weight:700">Total Deducted</td><td style="padding:8px 10px;text-align:right;font-weight:700">${fmt(advTotal)}</td></tr></tbody>
        </table></div>` : ''}
    </div>`;
    this._printHTML(html, `Payslip – ${State.empName} (${month})`);
  },

  async sharePayslip() {
    this.downloadPayslip();
  }
};

// ---- Boot ----
App.init();

</script>
</body>
</html>
