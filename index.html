<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <title>MP-SAL Payroll</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #dbeafe;
      --danger: #dc2626; --danger-light: #fee2e2;
      --success: #16a34a; --success-light: #dcfce7;
      --warning: #d97706; --warning-light: #fef3c7;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.1);
    }
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
      --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
      --primary: #3b82f6; --primary-dark: #2563eb; --primary-light: #1e3a5f;
      --danger: #ef4444; --danger-light: #3b0f0f;
      --success: #22c55e; --success-light: #052e16;
      --warning: #f59e0b; --warning-light: #431407;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
    .hidden { display: none !important; }
    .screen { min-height: 100vh; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .9; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Inputs */
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; outline: none; transition: border .15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    label { font-size: 13px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 4px; }
    .field { margin-bottom: 14px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-warning { background: var(--warning-light); color: var(--warning); }
    .badge-danger  { background: var(--danger-light);  color: var(--danger); }
    .badge-primary { background: var(--primary-light); color: var(--primary); }

    /* ── Setup Screen ── */
    #screen-setup { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .setup-box { width: 100%; max-width: 420px; }
    .setup-box h1 { font-size: 22px; margin-bottom: 4px; }
    .setup-box p  { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Login Screen ── */
    #screen-login { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box { width: 100%; max-width: 360px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-mark { width: 56px; height: 56px; background: var(--primary); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; margin-bottom: 10px; }
    .login-logo h1 { font-size: 20px; font-weight: 700; }
    .login-logo p  { font-size: 13px; color: var(--muted); }
    .role-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .role-tab { flex: 1; padding: 10px; text-align: center; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; background: var(--surface); }
    .role-tab.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .pin-input { font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: 700; }
    .login-footer { margin-top: 16px; text-align: center; }
    .theme-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--muted); }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }

    /* ── Spinner ── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen hidden">
  <div class="setup-box card">
    <h1>Connect to Google Sheets</h1>
    <p>Paste your Google Apps Script Web App URL below. You only need to do this once.</p>
    <div class="field">
      <label>Apps Script Web App URL</label>
      <input type="url" id="setup-url" placeholder="https://script.google.com/macros/s/..." />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="App.setup()">Connect &amp; Initialise Sheets</button>
    <div id="setup-status" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen hidden">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">&#9773;</div>
      <h1>MP-SAL</h1>
      <p>Mahitha Prasad Payroll</p>
    </div>
    <div class="card">
      <div class="role-tabs">
        <div class="role-tab active" id="tab-admin" onclick="Auth.selectRole('admin')">Admin</div>
        <div class="role-tab" id="tab-manager" onclick="Auth.selectRole('manager')">Manager</div>
      </div>
      <div class="field">
        <label>PIN</label>
        <input type="password" class="pin-input" id="pin-input" maxlength="8" placeholder="••••"
          onkeydown="if(event.key==='Enter') Auth.login()" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="Auth.login()">Login</button>
    </div>
    <div class="login-footer">
      <button class="theme-toggle" onclick="App.toggleTheme()">Toggle theme</button>
      &nbsp;
      <button class="theme-toggle" onclick="App.changeUrl()">Change URL</button>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN (shell only — content injected by JS) -->
<div id="screen-admin" class="screen hidden"></div>

<!-- MANAGER SCREEN (shell only) -->
<div id="screen-manager" class="screen hidden"></div>

<!-- TOAST -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
