<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <title>MP-SAL Payroll</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #dbeafe;
      --danger: #dc2626; --danger-light: #fee2e2;
      --success: #16a34a; --success-light: #dcfce7;
      --warning: #d97706; --warning-light: #fef3c7;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.1);
    }
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
      --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
      --primary: #3b82f6; --primary-dark: #2563eb; --primary-light: #1e3a5f;
      --danger: #ef4444; --danger-light: #3b0f0f;
      --success: #22c55e; --success-light: #052e16;
      --warning: #f59e0b; --warning-light: #431407;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
    .hidden { display: none !important; }
    .screen { min-height: 100vh; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .9; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Inputs */
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 14px; outline: none; transition: border .15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    label { font-size: 13px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 4px; }
    .field { margin-bottom: 14px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-warning { background: var(--warning-light); color: var(--warning); }
    .badge-danger  { background: var(--danger-light);  color: var(--danger); }
    .badge-primary { background: var(--primary-light); color: var(--primary); }

    /* ── Setup Screen ── */
    #screen-setup { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .setup-box { width: 100%; max-width: 420px; }
    .setup-box h1 { font-size: 22px; margin-bottom: 4px; }
    .setup-box p  { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Login Screen ── */
    #screen-login { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box { width: 100%; max-width: 360px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-mark { width: 56px; height: 56px; background: var(--primary); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; margin-bottom: 10px; }
    .login-logo h1 { font-size: 20px; font-weight: 700; }
    .login-logo p  { font-size: 13px; color: var(--muted); }
    .role-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .role-tab { flex: 1; padding: 10px; text-align: center; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; background: var(--surface); }
    .role-tab.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .pin-input { font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: 700; }
    .login-footer { margin-top: 16px; text-align: center; }
    .theme-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--muted); }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }

    /* ── Spinner ── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen hidden">
  <div class="setup-box card">
    <h1>Connect to Google Sheets</h1>
    <p>Paste your Google Apps Script Web App URL below. You only need to do this once.</p>
    <div class="field">
      <label>Apps Script Web App URL</label>
      <input type="url" id="setup-url" placeholder="https://script.google.com/macros/s/..." />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="App.setup()">Connect &amp; Initialise Sheets</button>
    <div id="setup-status" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen hidden">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">&#9773;</div>
      <h1>MP-SAL</h1>
      <p>Mahitha Prasad Payroll</p>
    </div>
    <div class="card">
      <div class="role-tabs">
        <div class="role-tab active" id="tab-admin"    onclick="Auth.selectRole('admin')">Admin</div>
        <div class="role-tab"        id="tab-manager"  onclick="Auth.selectRole('manager')">Manager</div>
        <div class="role-tab"        id="tab-employee" onclick="Auth.selectRole('employee')">Employee</div>
      </div>
      <div class="field">
        <label id="pin-label">PIN</label>
        <input type="password" class="pin-input" id="pin-input" maxlength="20" placeholder="••••"
          onkeydown="if(event.key==='Enter') Auth.login()" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="Auth.login()">Login</button>
    </div>
    <div class="login-footer">
      <button class="theme-toggle" onclick="App.toggleTheme()">Toggle theme</button>
      &nbsp;
      <button class="theme-toggle" onclick="App.changeUrl()">Change URL</button>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN (shell only — content injected by JS) -->
<div id="screen-admin" class="screen hidden"></div>

<!-- MANAGER SCREEN (shell only) -->
<div id="screen-manager" class="screen hidden"></div>

<!-- EMPLOYEE SCREEN (shell only) -->
<div id="screen-employee" class="screen hidden"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>

// ============================================================
// MP-SAL Payroll — Frontend App
// ============================================================

// ---- State ----
const State = {
  role: null, pin: null, gasUrl: null,
  employees: [], holidays: [], advances: [], payroll: [],
  payments: [], bonusPool: [], settings: {},
  currentMonth: (function() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  })(),
  advStartDate: '',
  advEndDate: new Date().toISOString().split('T')[0],
  parsedAttendance: null,
  unmatchedAttendance: [],
  attendanceMap: {}   // emp_id → parsed day array
};

function getTeams() {
  return (State.settings.TEAMS || 'Emb,Stitching').split(',').map(t => t.trim()).filter(Boolean);
}

// ---- API ----
const API = {
  async call(action, data) {
    const body = { action, data, pin: State.pin, role: State.role };
    const res = await fetch(State.gasUrl, { method: 'POST', body: JSON.stringify(body) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'API error');
    return json;
  }
};

// ---- Toast ----
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ---- App init ----
const App = {
  init() {
    State.gasUrl = localStorage.getItem('mpsal_url');
    const theme = localStorage.getItem('mpsal_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    if (!State.gasUrl) {
      show('screen-setup');
    } else {
      show('screen-login');
    }
  },
  toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mpsal_theme', next);
  },
  changeUrl() {
    localStorage.removeItem('mpsal_url');
    State.gasUrl = null;
    show('screen-setup');
  },
  async setup() {
    const url = document.getElementById('setup-url').value.trim();
    if (!url.startsWith('https://')) { toast('Enter a valid URL', 'error'); return; }
    const status = document.getElementById('setup-status');
    status.textContent = 'Connecting…';
    State.gasUrl = url;
    State.role = 'admin'; State.pin = '';
    try {
      const r = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'initSheets', data: {} }) });
      const j = await r.json();
      if (!j.success) throw new Error(j.error);
      localStorage.setItem('mpsal_url', url);
      status.textContent = 'Connected! ' + (j.message || '');
      setTimeout(() => { State.role = null; State.pin = null; show('screen-login'); }, 1200);
    } catch(e) {
      status.textContent = 'Error: ' + e.message;
    }
  }
};

// ---- Auth ----
const Auth = {
  selectedRole: 'admin',
  selectRole(role) {
    this.selectedRole = role;
    ['admin','manager','employee'].forEach(r => {
      const btn = document.getElementById('tab-' + r);
      if (btn) btn.classList.toggle('active', r === role);
    });
    const lbl = document.getElementById('pin-label');
    if (lbl) lbl.textContent = role === 'employee' ? 'Login Code' : 'PIN';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  },
  async login() {
    const pin = document.getElementById('pin-input').value.trim();
    if (!pin) { toast('Enter ' + (this.selectedRole === 'employee' ? 'Login Code' : 'PIN'), 'error'); return; }
    State.role = this.selectedRole;
    State.pin  = pin;
    try {
      const r = await API.call('verifyPin', { pin, role: this.selectedRole });
      if (!r.success) { toast(this.selectedRole === 'employee' ? 'Invalid login code' : 'Wrong PIN', 'error'); State.pin = null; return; }
      if (State.role === 'employee') {
        State.empId   = r.emp_id;
        State.empName = r.emp_name;
        EmployeeApp.init();
      } else {
        await loadCoreData();
        if (State.role === 'admin') AdminApp.init();
        else ManagerApp.init();
      }
    } catch(e) {
      toast(e.message, 'error');
    }
  },
  logout() {
    State.role = null; State.pin = null; State.empId = null; State.empName = null;
    document.getElementById('pin-input').value = '';
    show('screen-login');
  }
};

async function loadCoreData() {
  const [empRes, settRes] = await Promise.all([
    API.call('getEmployees', {}),
    API.call('getSettings', {})
  ]);
  State.employees = empRes.data || [];
  State.settings = settRes.data || {};
}

// ---- Utility ----
function show(id) {
  ['screen-setup','screen-login','screen-admin','screen-manager','screen-employee'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.classList.toggle('hidden', s !== id);
  });
}

function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
function fmtHrs(mins) {
  const h = Math.floor(Math.abs(mins) / 60), m = Math.abs(mins) % 60;
  return (mins < 0 ? '-' : '') + h + 'h' + (m ? ' ' + m + 'm' : '');
}
function currentYear() { return State.currentMonth.substring(0, 4); }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

// ============================================================
// PETPOOJA PARSER
// ============================================================
const Parser = {
  parse(fileData) {
    const wb = XLSX.read(fileData, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const employees = [];

    for (let i = 0; i < rows.length; i++) {
      const cell = String(rows[i][0] || '').trim();
      if (!cell.includes('Employee Name:')) continue;

      const nameM  = cell.match(/Employee Name:\s*(.+?)\s+Department:/);
      const deptM  = cell.match(/Department:\s*(.+?)\s+Designation:/);
      const idM    = cell.match(/Employee ID:\s*(\d+)/);
      const fromM  = cell.match(/From:\s*(\d{4}-\d{2}-\d{2})/);

      const emp = {
        name: nameM ? nameM[1].trim() : '',
        department: deptM ? deptM[1].trim() : '',
        petpooja_id: idM ? String(parseInt(idM[1])) : '',
        month: fromM ? fromM[1].substring(0, 7) : '',
        days: []
      };

      // Scan next 15 rows for Day / Status / Total Hrs
      let dayRow = null, statusRow = null, hrsRow = null;
      for (let j = i + 1; j < Math.min(i + 18, rows.length); j++) {
        const lbl = String(rows[j][0] || '').trim();
        if (lbl === 'Day')       dayRow    = rows[j];
        if (lbl === 'Status')    statusRow = rows[j];
        if (lbl === 'Total Hrs') { hrsRow  = rows[j]; break; }
      }

      if (dayRow && statusRow && hrsRow) {
        for (let d = 1; d < dayRow.length; d++) {
          const header  = String(dayRow[d] || '').trim();
          const dm      = header.match(/(\d+)\s*\((\w+)\)/);
          if (!dm) continue;

          const dayNum  = parseInt(dm[1]);
          const dayName = dm[2]; // Sunday, Monday, …
          const status  = String(statusRow[d] || '').trim();
          const hrsStr  = String(hrsRow[d] || '').trim();

          let totalHours = 0;
          if (hrsStr && hrsStr !== '-') {
            const hm = hrsStr.match(/(\d+)h(?:\s*(\d+)m)?/);
            if (hm) totalHours = parseInt(hm[1]) + (parseInt(hm[2] || 0)) / 60;
          }

          const month = emp.month;
          emp.days.push({
            day: dayNum, dayName, status, totalHours,
            date: month + '-' + String(dayNum).padStart(2, '0')
          });
        }
        employees.push(emp);
      }
    }
    return employees;
  }
};

// ============================================================
// SALARY CALCULATOR
// ============================================================
const Calc = {
  run(empAttendance, dbEmployee, advancesForMonth, holidays, settings) {
    const weekly  = dbEmployee.weekly_salary;
    const daily   = weekly / 6;
    const hourly  = daily / 9;

    const shortfallThresh = parseFloat(settings.SHORTFALL_THRESHOLD_HOURS || 8.5);
    const addLunch        = settings.ADD_LUNCH_TO_OT === 'true';
    const lunchHrs        = parseFloat(settings.LUNCH_DURATION_HOURS || 1);
    const otMinHours      = parseFloat(settings.OT_MIN_HOURS || 10);
    const otRound         = parseInt(settings.OT_ROUND_MINUTES || 15);
    const bonusMinDays    = parseInt(settings.BONUS_ELIGIBILITY_MIN_DAYS || 6);
    const empContrib      = parseInt(settings.EMPLOYEE_CONTRIBUTION || 500);

    const holidayDates = new Set(holidays.map(h => h.date));

    let fullDays = 0, halfDays = 0, absentDays = 0, weekOffDays = 0, holidayAbsent = 0;
    let otWeekdayMin = 0, otSundayMin = 0, otHolidayMin = 0, shortfallMin = 0;

    for (const day of empAttendance.days) {
      const isSunday  = day.dayName === 'Sunday';
      const isHoliday = holidayDates.has(day.date);

      if (isSunday) {
        weekOffDays++;
        if (day.totalHours > 0) {
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otSundayMin += Math.floor(rawMin / otRound) * otRound;
        }
      } else if (isHoliday) {
        if (day.status === 'FD') {
          fullDays++;
          // Present on holiday: counts as FD + all hours as holiday OT
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otHolidayMin += Math.floor(rawMin / otRound) * otRound;
        } else if (day.status === 'HD') {
          halfDays++;
          shortfallMin += Math.round((9 - day.totalHours) * 60);
          const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
          otHolidayMin += Math.floor(rawMin / otRound) * otRound;
        } else {
          // Absent on holiday = paid
          holidayAbsent++;
        }
      } else if (day.status === 'FD') {
        fullDays++;
        if (day.totalHours >= otMinHours) {
          const rawOt = day.totalHours - 9;
          const rounded = Math.floor(rawOt * 60 / otRound) * otRound;
          otWeekdayMin += rounded;
        } else if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
          shortfallMin += Math.round((9 - day.totalHours) * 60);
        }
      } else if (day.status === 'HD') {
        halfDays++;
        shortfallMin += Math.round((9 - day.totalHours) * 60);
      } else if (day.status === 'Absent') {
        absentDays++;
      }
    }

    const TD        = fullDays + halfDays + holidayAbsent;
    const gross     = TD * daily;
    const allOtMin  = otWeekdayMin + otSundayMin + otHolidayMin;
    const otEarn    = (allOtMin / 60) * hourly;
    const shortfall = (shortfallMin / 60) * hourly;

    const workDays      = fullDays + halfDays;
    const bonusEligible = workDays >= bonusMinDays;
    const bonusCut      = bonusEligible ? empContrib : 0;

    const totalAdv = advancesForMonth.reduce((s, a) => s + Number(a.amount), 0);
    const net      = gross + otEarn - shortfall - bonusCut - totalAdv;

    return {
      emp_id: dbEmployee.emp_id, month: empAttendance.month,
      full_days: fullDays, half_days: halfDays, absent_days: absentDays,
      week_off_days: weekOffDays, holiday_absent_days: holidayAbsent,
      ot_weekday_min: otWeekdayMin, ot_sunday_min: otSundayMin, ot_holiday_min: otHolidayMin,
      shortfall_min: shortfallMin,
      weekly_salary: weekly, daily_rate: Math.round(daily * 100) / 100,
      hourly_rate: Math.round(hourly * 100) / 100,
      TD, gross_pay: Math.round(gross), ot_earnings: Math.round(otEarn),
      shortfall_deduction: Math.round(shortfall),
      bonus_eligible: bonusEligible, bonus_cut: bonusCut,
      total_advances: totalAdv, net_pay: Math.round(net),
      status: 'draft'
    };
  },

  matchEmployee(parsed, dbEmployees) {
    // Try petpooja_id first, then name
    return dbEmployees.find(e => e.status === 'Active' && String(e.petpooja_id) === String(parsed.petpooja_id))
        || dbEmployees.find(e => e.status === 'Active' && e.petpooja_name?.toLowerCase() === parsed.name.toLowerCase())
        || dbEmployees.find(e => e.status === 'Active' && e.name.toLowerCase() === parsed.name.toLowerCase());
  }
};

// ============================================================
// ADMIN APP
// ============================================================
const AdminApp = {
  activeView: 'payroll',

  init() {
    show('screen-admin');
    document.getElementById('screen-admin').innerHTML = this.renderShell();
    this.switchView('payroll');
    Views.Payroll.load();
  },

  renderShell() {
    return `
    <header style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100">
      <span style="font-weight:700;font-size:16px">MP&#x2009;SAL</span>
      <span style="flex:1"></span>
      <button class="theme-toggle" onclick="App.toggleTheme()" style="border:1px solid var(--border);background:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted)">Theme</button>
      <button class="theme-toggle" onclick="Auth.logout()" style="border:1px solid var(--border);background:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--danger)">Logout</button>
    </header>
    <nav style="display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);padding:0 8px">
      ${['payroll','employees','advances','bonus','payments','settings'].map(v =>
        `<button id="nav-${v}" onclick="AdminApp.switchView('${v}')"
          style="padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;color:var(--muted)"
          >${v.charAt(0).toUpperCase()+v.slice(1)}</button>`
      ).join('')}
    </nav>
    <main style="padding:16px;max-width:1200px;margin:0 auto">
      <div id="view-payroll"   class="view"></div>
      <div id="view-employees" class="view hidden"></div>
      <div id="view-advances"  class="view hidden"></div>
      <div id="view-bonus"     class="view hidden"></div>
      <div id="view-payments"  class="view hidden"></div>
      <div id="view-settings"  class="view hidden"></div>
    </main>`;
  },

  switchView(name) {
    this.activeView = name;
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));

    if (State.advStartDate) return;
    try {

      if (!finalized.length) return;
      const lastEnd = finalized.map(p => p.adv_end_date).sort().pop();

      State.advStartDate = d.toISOString().split('T')[0];

  async onUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const parsed = Parser.parse(new Uint8Array(ev.target.result));
        if (!parsed.length) { toast('No employee data found in file', 'error'); return; }

        const month = parsed[0].month;
        document.getElementById('payroll-month').value = month;
        State.currentMonth = month;

        // Read advance date range from inputs
        State.advStartDate = document.getElementById('adv-start')?.value || '';
        State.advEndDate   = document.getElementById('adv-end')?.value   || '';

        // Load holidays and approved advances in date range
        const advFilter = { status: 'Approved' };
        if (State.advStartDate && State.advEndDate) {
          advFilter.start_date = State.advStartDate;
          advFilter.end_date   = State.advEndDate;
        }
        const [holRes, advRes] = await Promise.all([
          API.call('getHolidays', { year: month.substring(0,4) }),
          API.call('getAdvances', advFilter)
        ]);
        State.holidays = holRes.data || [];
        State.advances = advRes.data || [];

        // Match and calculate
        const matched = [], unmatched = [];
        for (const emp of parsed) {
          const dbEmp = Calc.matchEmployee(emp, State.employees);
          if (dbEmp) {
            const advances = State.advances.filter(a => a.emp_id === dbEmp.emp_id);
            const rec = Calc.run(emp, dbEmp, advances, State.holidays, State.settings);
            matched.push(rec);
            State.attendanceMap[dbEmp.emp_id] = emp.days;
          } else {
            unmatched.push(emp);
          }
        }
        State.payroll = matched;
        State.unmatchedAttendance = unmatched;

        this.renderUnmatched(unmatched);
        this.renderTable(matched);
        toast(`Calculated payroll for ${matched.length} employees`, 'success');
      } catch(err) { toast('Parse error: ' + err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
  },

  _dayCalc(day, hourly, settings, holidayDates) {
    const shortfallThresh = parseFloat(settings.SHORTFALL_THRESHOLD_HOURS || 8.5);
    const otMinHours      = parseFloat(settings.OT_MIN_HOURS || 10);
    const otRound         = parseInt(settings.OT_ROUND_MINUTES || 15);
    const addLunch        = settings.ADD_LUNCH_TO_OT === 'true';
    const lunchHrs        = parseFloat(settings.LUNCH_DURATION_HOURS || 1);
    const isSunday        = day.dayName === 'Sunday';
    const isHoliday       = holidayDates.has(day.date);
    let otMin = 0, shortfallMin = 0, tag = '', tagStyle = '';

    if (isSunday) {
      if (day.totalHours > 0) {
        const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
        otMin = Math.floor(rawMin / otRound) * otRound;
        tag = 'Sun OT'; tagStyle = 'background:#dbeafe;color:#1d4ed8';
      } else { tag = 'Off'; tagStyle = 'color:var(--muted)'; }
    } else if (isHoliday) {
      if (day.status === 'Absent') {
        tag = 'Paid Holiday'; tagStyle = 'background:#dcfce7;color:#15803d';
      } else {
        const rawMin = (day.totalHours - (addLunch ? 0 : lunchHrs)) * 60;
        otMin = Math.floor(rawMin / otRound) * otRound;
        tag = 'Hol OT'; tagStyle = 'background:#fef3c7;color:#92400e';
      }
    } else if (day.status === 'FD') {
      if (day.totalHours >= otMinHours) {
        otMin = Math.floor((day.totalHours - 9) * 60 / otRound) * otRound;
        tag = 'OT'; tagStyle = 'background:#dcfce7;color:#15803d';
      } else if (day.totalHours > 0 && day.totalHours < shortfallThresh) {
        shortfallMin = Math.round((9 - day.totalHours) * 60);
        tag = 'Short'; tagStyle = 'background:#fee2e2;color:#dc2626';
      }
    } else if (day.status === 'HD') {
      shortfallMin = Math.round((9 - day.totalHours) * 60);
      tag = '½ Day'; tagStyle = 'background:#fef3c7;color:#92400e';
    }
    return { otMin, shortfallMin, otEarn: (otMin/60)*hourly, sfDeduct: (shortfallMin/60)*hourly, tag, tagStyle, isSunday, isHoliday };
  },

          ${c.otEarn > 0 ? '<span style="color:var(--success)">+'+fmt(c.otEarn)+'</span>' : ''}
          ${c.sfDeduct > 0 ? '<span style="color:var(--danger)">-'+fmt(c.sfDeduct)+'</span>' : ''}
          ${c.otEarn===0 && c.sfDeduct===0 ? '<span style="color:var(--muted)">—</span>' : ''}
        </td>

    }).join('');

    const calcPanel = (q) => `

          <td style="padding:5px 8px;text-align:right;font-weight:600">${q.TD}</td>

    return `

      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)">
          DAILY ATTENDANCE — ${emp?.name || p.emp_id} &nbsp;|&nbsp; ${p.month}
          &nbsp;|&nbsp; Weekly ₹${p.weekly_salary} &nbsp;|&nbsp; Daily ${fmt(daily)} &nbsp;|&nbsp; Hourly ${fmt(hourly)}
          ${locked ? '&nbsp;<span style="background:var(--success-light);color:var(--success);padding:2px 8px;border-radius:4px;font-size:11px">FINALISED — read only</span>' : ''}
        </div>
        ${noData
          ? `<p style="color:var(--muted);font-size:13px;padding:16px 0">
               No day-by-day data available.<br>
               This employee's salary was calculated without a Petpooja upload (e.g. loaded from draft).<br>
               Re-upload the Petpooja Excel to edit daily attendance.
             </p>`
          : `<div style="overflow-x:auto;max-height:380px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">

                <thead style="position:sticky;top:0;background:var(--surface2);z-index:1">
                  <tr>
                    <th style="padding:7px 8px;text-align:left;font-weight:600">Day</th>
                    <th style="padding:7px 8px;text-align:left;font-weight:600">Status</th>
                    <th style="padding:7px 8px;text-align:left;font-weight:600">Hours</th>
                    <th style="padding:7px 8px;text-align:right;font-weight:600">OT</th>
                    <th style="padding:7px 8px;text-align:right;font-weight:600">Shortfall</th>
                    <th style="padding:7px 8px;text-align:right;font-weight:600">₹</th>
                    <th style="padding:7px 8px;font-weight:600"></th>
                  </tr>
                </thead>
                <tbody>${dayRows}</tbody>
              </table>
            </div>
            ${locked ? '' : `<div style="margin-top:10px;display:flex;gap:8px;align-items:center">
              <button class="btn btn-primary btn-sm" onclick="Views.Payroll.saveAttendanceEdits(${idx})">
                Save &amp; Recalculate
              </button>
              <button class="btn btn-secondary btn-sm" onclick="Views.Payroll.toggleDetail(${idx})">Cancel</button>
              <span style="font-size:12px;color:var(--muted)">Edit status or hours above, then save.</span>
            </div>`}`
        }
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)">SALARY CALCULATION</div>
        <table id="calc-panel-${idx}" style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
          <tbody>${calcPanel(p)}</tbody>
        </table>
        <div style="margin-top:12px">
          <button class="btn btn-secondary btn-sm" onclick="Views.Payroll.toggleDetail(${idx})">Close</button>
        </div>
      </div>
    </div>`;
  },

  // Live-preview a single row's OT/shortfall/amount as user edits it
  previewDayCalc(idx, di) {
    const emp    = State.employees.find(e => e.emp_id === State.payroll[idx]?.emp_id);
    const daily  = (emp?.weekly_salary || 0) / 6;
    const hourly = daily / 9;
    const holidayDates = new Set((State.holidays||[]).map(h => h.date));

    const days = State.attendanceMap[State.payroll[idx]?.emp_id];
    if (!days) return;
    const day = days[di];

    const status = document.getElementById(`ds-${idx}-${di}`)?.value || day.status;
    const h = parseInt(document.getElementById(`dh-${idx}-${di}`)?.value || 0);
    const m = parseInt(document.getElementById(`dm-${idx}-${di}`)?.value || 0);
    const fakeDay = { ...day, status, totalHours: h + m/60 };

    const c = this._dayCalc(fakeDay, hourly, State.settings, holidayDates);
    const otEl  = document.getElementById(`dot-${idx}-${di}`);
    const sfEl  = document.getElementById(`dsf-${idx}-${di}`);
    const amEl  = document.getElementById(`dam-${idx}-${di}`);
    if (otEl) otEl.textContent = c.otMin > 0 ? '+'+c.otMin+'m' : '—';
    if (sfEl) sfEl.textContent = c.shortfallMin > 0 ? '-'+c.shortfallMin+'m' : '—';
    if (amEl) amEl.innerHTML  = c.otEarn > 0 ? `<span style="color:var(--success)">+${fmt(c.otEarn)}</span>`
                               : c.sfDeduct > 0 ? `<span style="color:var(--danger)">-${fmt(c.sfDeduct)}</span>` : '<span style="color:var(--muted)">—</span>';
  },

  saveAttendanceEdits(idx) {
    const p    = State.payroll[idx];
    const emp  = State.employees.find(e => e.emp_id === p.emp_id);
    const days = State.attendanceMap[p.emp_id];
    if (!days) { toast('No attendance data to save', 'error'); return; }

    // Read edited values back into attendanceMap
    days.forEach((day, di) => {
      const statusEl = document.getElementById(`ds-${idx}-${di}`);
      const hEl = document.getElementById(`dh-${idx}-${di}`);
      const mEl = document.getElementById(`dm-${idx}-${di}`);
      if (statusEl) day.status = statusEl.value;
      if (hEl && mEl) day.totalHours = parseInt(hEl.value||0) + parseInt(mEl.value||0)/60;
    });

    // Recalculate
    const advances = State.advances.filter(a => a.emp_id === p.emp_id);
    const fakeAtt  = { days, month: p.month };
    const newRec   = Calc.run(fakeAtt, emp, advances, State.holidays, State.settings);
    newRec.payroll_id    = p.payroll_id;
    newRec.status        = p.status;
    newRec.finalized_date = p.finalized_date;
    newRec.notes         = p.notes;
    State.payroll[idx]   = newRec;

    this.renderTable(State.payroll);
    // Re-open detail panel after re-render
    setTimeout(() => {
      document.getElementById('prow-detail-' + idx)?.classList.remove('hidden');
    }, 50);
    toast('Attendance saved & recalculated', 'success');
  },

  editRow(idx) {
    const editRow = document.getElementById('prow-edit-' + idx);
    const isOpen  = !editRow.classList.contains('hidden');
    // Close all
    document.querySelectorAll('[id^="prow-edit-"]').forEach(r => r.classList.add('hidden'));
    document.querySelectorAll('[id^="prow-detail-"]').forEach(r => r.classList.add('hidden'));
    if (!isOpen) editRow.classList.remove('hidden');
  },

  closeEdit(idx) { document.getElementById('prow-edit-' + idx)?.classList.add('hidden'); },

  applyEdit(idx) {
    const p = State.payroll[idx];
    const g = id => parseFloat(document.getElementById(id)?.value || 0);
    p.full_days           = g(`edit-fd-${idx}`);
    p.half_days           = g(`edit-hd-${idx}`);
    p.holiday_absent_days = g(`edit-hol-${idx}`);
    p.ot_weekday_min      = g(`edit-otw-${idx}`);
    p.ot_sunday_min       = g(`edit-ots-${idx}`);
    p.shortfall_min       = g(`edit-sf-${idx}`);
    p.total_advances      = g(`edit-adv-${idx}`);
    p.bonus_cut           = g(`edit-bon-${idx}`);
    p.notes               = document.getElementById(`edit-note-${idx}`)?.value || '';

    const emp = State.employees.find(e => e.emp_id === p.emp_id);
    if (emp) {
      const daily  = emp.weekly_salary / 6;
      const hourly = daily / 9;
      p.TD              = p.full_days + p.half_days + p.holiday_absent_days;
      p.gross_pay       = Math.round(p.TD * daily);
      p.ot_earnings     = Math.round((p.ot_weekday_min + p.ot_sunday_min + p.ot_holiday_min) / 60 * hourly);
      p.shortfall_deduction = Math.round(p.shortfall_min / 60 * hourly);
      p.net_pay         = p.gross_pay + p.ot_earnings - p.shortfall_deduction - p.bonus_cut - p.total_advances;
    }
    this.renderTable(State.payroll);
    toast('Row updated', 'success');
  },

  async saveDraft() {
    if (!State.payroll.length) { toast('Nothing to save', 'error'); return; }
    try {
      const records = State.payroll.map(p => Object.assign({}, p, {
        adv_start_date: State.advStartDate,
        adv_end_date:   State.advEndDate
      }));
      await API.call('savePayroll', records);
      toast('Draft saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async loadDraft() {
    try {
      const [holRes, payRes] = await Promise.all([
        API.call('getHolidays', { year: currentYear() }),
        API.call('getPayroll', { month: State.currentMonth })
      ]);
      State.holidays = holRes.data || [];
      State.payroll  = payRes.data || [];

      // Restore advance date range from saved records
      const sample = State.payroll.find(p => p.adv_end_date);
      if (sample) {
        State.advStartDate = sample.adv_start_date || '';
        State.advEndDate   = sample.adv_end_date   || '';
        const s = document.getElementById('adv-start');
        const e = document.getElementById('adv-end');
        if (s) s.value = State.advStartDate;
        if (e) e.value = State.advEndDate;
      }

      // Fetch approved advances for that date range
      const advFilter = { status: 'Approved' };
      if (State.advStartDate && State.advEndDate) {
        advFilter.start_date = State.advStartDate;
        advFilter.end_date   = State.advEndDate;
      }
      const advRes = await API.call('getAdvances', advFilter);
      State.advances = advRes.data || [];

      this.renderTable(State.payroll);
      const isFinalized = State.payroll.some(p => p.status === 'finalized');
      const banner = document.getElementById('payroll-finalized-banner');
      if (banner) banner.style.display = isFinalized ? 'flex' : 'none';
      toast(`Loaded ${State.payroll.length} records`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  dismissFinalizedBanner() {
    const banner = document.getElementById('payroll-finalized-banner');
    if (banner) banner.style.display = 'none';
  },

  async finalize() {
    const month = State.currentMonth;
    if (!State.advEndDate) { toast('Set the advance deduction end date before finalising', 'error'); return; }
    if (!confirm(`Finalise payroll for ${month}?\nAdvance period: ${State.advStartDate||'start'} → ${State.advEndDate}\nThis cannot be undone.`)) return;
    try {
      const records = State.payroll.map(p => Object.assign({}, p, {
        adv_start_date: State.advStartDate,
        adv_end_date:   State.advEndDate
      }));
      await API.call('savePayroll', records);
      const r = await API.call('finalizePayroll', { month, adv_end_date: State.advEndDate });
      toast(`Finalised ${r.finalized} records`, 'success');
      // Next payroll's start date = this end date + 1 day
      const d = new Date(State.advEndDate); d.setDate(d.getDate() + 1);
      State.advStartDate = d.toISOString().split('T')[0];
      await this.loadDraft();
    } catch(e) { toast(e.message, 'error'); }
  }
};

          <div class="field" style="margin:0">
            <label>From</label>
            <input type="date" id="hist-from" value="${firstOfMonth}" />
          </div>
          <div class="field" style="margin:0">
            <label>To</label>
            <input type="date" id="hist-to" value="${today}" />
          </div>
          <button class="btn btn-primary btn-sm" onclick="Views.Advances.loadHistory()">Load</button>
        </div>
      </div>
      <div id="hist-results"></div>`;
  },

  async loadHistory() {
    const from = document.getElementById('hist-from')?.value;
    const to   = document.getElementById('hist-to')?.value;
    if (!from || !to) { toast('Select a date range', 'error'); return; }
    const res = document.getElementById('hist-results');
    if (res) res.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getAdvances', { start_date: from, end_date: to });
      const list = (r.data || []).sort((a, b) => a.date > b.date ? 1 : -1);
      if (!list.length) { res.innerHTML = '<p style="color:var(--muted)">No advances in this range.</p>'; return; }

      // Enrich with team
      const enriched = list.map(a => {
        const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
        return Object.assign({}, a, { team: emp.team || 'Other' });
      });

      // Group by date
      const dates = [...new Set(enriched.map(a => a.date))].sort();
      const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);
      const statusStyle = s => s === 'Approved' ? 'color:#15803d;font-weight:600' : 'color:#92400e;font-weight:600';

      let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'
        + '<thead style="background:var(--surface2)"><tr>'
        + '<th style="padding:10px 8px;text-align:left">Date</th>'
        + '<th style="padding:10px 8px;text-align:left">Employee</th>'
        + '<th style="padding:10px 8px;text-align:left">Team</th>'
        + '<th style="padding:10px 8px;text-align:right">Amount</th>'
        + '<th style="padding:10px 8px;text-align:center">Status</th>'
        + '<th style="padding:10px 8px">Submitted by</th>'
        + '</tr></thead><tbody>';

      dates.forEach(date => {
        const group = enriched.filter(a => a.date === date);
        const dateTotal = group.reduce((s, a) => s + a.amount, 0);
        html += `<tr><td colspan="6" style="padding:7px 8px;background:var(--surface2);font-weight:700;font-size:12px;color:var(--muted)">${date} &nbsp;·&nbsp; ${group.length} advance${group.length>1?'s':''} &nbsp;·&nbsp; ${fmt(dateTotal)}</td></tr>`;
        group.forEach(a => {
          html += `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:9px 8px;color:var(--muted);font-size:12px">${a.date}</td>
            <td style="padding:9px 8px;font-weight:500">${a.emp_name}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.team}</td>
            <td style="padding:9px 8px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
            <td style="padding:9px 8px;text-align:center;font-size:12px;${statusStyle(a.status)}">${a.status}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.created_by||'—'}</td>
          </tr>`;
        });
      });

      html += `<tr style="background:var(--surface2)">
        <td colspan="3" style="padding:10px 8px;font-weight:700">Grand Total</td>
        <td style="padding:10px 8px;text-align:right;font-weight:700">${fmt(grandTotal)}</td>
        <td colspan="2"></td>
      </tr>`;
      html += '</tbody></table></div>';
      html += `<p style="font-size:13px;color:var(--muted);margin-top:8px">${enriched.length} advance(s) &nbsp;·&nbsp; ${from} to ${to}</p>`;
      res.innerHTML = html;
    } catch(e) { toast(e.message, 'error'); }
  },

  renderList() {
    const pending  = this.all.filter(a => a.status === 'Pending');
    const approved = this.all.filter(a => a.status === 'Approved');
    const pc = document.getElementById('tab-count-pending');
    const ac = document.getElementById('tab-count-approved');
    if (pc) pc.textContent = pending.length || '';
    if (ac) ac.textContent = approved.length || '';

    const list = (this.activeTab === 'pending' ? pending : approved)
      .sort((a, b) => b.date > a.date ? 1 : -1);
    const c = document.getElementById('adv-list');
    if (!list.length) {
      c.innerHTML = `<p style="color:var(--muted)">No ${this.activeTab} advances.</p>`;
      return;
    }

    const grandTotal = list.reduce((s,a) => s + a.amount, 0);

    if (this.activeTab === 'pending') {
      // Group by date — each date = one submission batch
      const dates = [...new Set(list.map(a => a.date))].sort((a,b) => b > a ? 1 : -1);
      let html = '<div style="display:flex;flex-direction:column;gap:16px">';
      dates.forEach(date => {
        const group = list.filter(a => a.date === date).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
        const dateTotal = group.reduce((s,a) => s + a.amount, 0);
        const submitter = group[0]?.created_by || '—';
        html += `<div class="card" style="padding:0;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);flex-wrap:wrap">
            <div>
              <span style="font-weight:700;font-size:14px">${date}</span>
              <span style="color:var(--muted);font-size:12px;margin-left:8px">by ${submitter}</span>
            </div>
            <span style="flex:1"></span>
            <span style="font-weight:700;font-size:14px">${fmt(dateTotal)}</span>
            <button class="btn btn-primary btn-sm" onclick="Views.Advances.approveAll('${date}')">Approve All</button>
            <button class="btn btn-danger btn-sm"  onclick="Views.Advances.rejectAll('${date}')">Reject All</button>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <tbody>${group.map(a => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 14px;font-weight:500">${a.emp_name}</td>
                <td style="padding:9px 14px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
                <td style="padding:9px 14px;text-align:right">
                  <div style="display:flex;gap:4px;justify-content:flex-end">
                    <button class="btn btn-secondary btn-sm" onclick="Views.Advances.openForm('${a.advance_id}')">Edit</button>
                    <button class="btn btn-danger btn-sm"    onclick="Views.Advances.remove('${a.advance_id}','Reject')">Reject</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      });
      html += '</div>';
      html += `<p style="font-size:13px;color:var(--muted);margin-top:8px">Total pending: <strong>${fmt(grandTotal)}</strong></p>`;
      c.innerHTML = html;
    } else {
      // Approved tab — flat table, grouped by date for readability
      const dates = [...new Set(list.map(a => a.date))].sort((a,b) => b > a ? 1 : -1);
      let rows = '';
      dates.forEach(date => {
        const group = list.filter(a => a.date === date).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
        const dateTotal = group.reduce((s,a) => s + a.amount, 0);
        rows += `<tr><td colspan="4" style="padding:8px 8px;background:var(--surface2);font-weight:700;font-size:12px;color:var(--muted)">${date} — ${fmt(dateTotal)}</td></tr>`;
        rows += group.map(a => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:9px 8px;font-weight:500">${a.emp_name}</td>
            <td style="padding:9px 8px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
            <td style="padding:9px 8px;color:var(--muted)">${a.created_by||'—'}</td>
            <td style="padding:9px 8px;text-align:right">
              <button class="btn btn-danger btn-sm" onclick="Views.Advances.remove('${a.advance_id}','Delete')">Delete</button>
            </td>
          </tr>`).join('');
      });
      c.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead style="background:var(--surface2)">
          <tr>
            <th style="padding:10px 8px;text-align:left">Employee</th>
            <th style="padding:10px 8px;text-align:right">Amount</th>
            <th style="padding:10px 8px">Submitted by</th>
            <th style="padding:10px 8px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p style="font-size:13px;color:var(--muted);margin-top:8px">Total approved: <strong>${fmt(grandTotal)}</strong></p>`;
    }
  },

  openForm(advId) {
    const adv = advId ? this.all.find(a => a.advance_id === advId) : null;
    const today = new Date().toISOString().split('T')[0];
    const c = document.getElementById('adv-form-wrap');
    c.innerHTML = `<div class="card" style="margin-bottom:16px">
      <h3 style="font-size:15px;margin-bottom:14px">${advId ? 'Edit Advance' : 'Add Advance'}</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
        <div class="field"><label>Employee *</label>
          <select id="af-emp" ${advId ? 'disabled' : ''}>
            <option value="">— select —</option>
            ${State.employees.filter(e=>e.status==='Active').map(e =>
              `<option value="${e.emp_id}" ${adv?.emp_id===e.emp_id?'selected':''}>${e.name}</option>`).join('')}
          </select></div>
        <div class="field"><label>Date *</label>
          <input type="date" id="af-date" value="${adv?.date||today}" /></div>
        <div class="field"><label>Amount (₹) *</label>
          <input type="number" id="af-amt" value="${adv?.amount||''}" placeholder="0" /></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="Views.Advances.save('${advId||''}')">Save</button>
        <button class="btn btn-secondary btn-sm" onclick="Views.Advances.closeForm()">Cancel</button>
      </div>
    </div>`;
  },

  closeForm() { document.getElementById('adv-form-wrap').innerHTML = ''; },

  async approve(advId) {
    try {
      await API.call('approveAdvance', { advance_id: advId });
      await this.fetch();
      toast('Advance approved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async approveAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Approve all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      for (const id of ids) await API.call('approveAdvance', { advance_id: id });
      await this.fetch();
      toast(`${ids.length} advance(s) approved`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async rejectAll(date) {
    const ids = this.all.filter(a => a.date === date && a.status.toLowerCase() === 'pending').map(a => a.advance_id);
    if (!ids.length) { toast('No pending advances found for this date', 'error'); return; }
    if (!confirm(`Reject all ${ids.length} advance(s) for ${date}?`)) return;
    try {
      for (const id of ids) await API.call('deleteAdvance', { advance_id: id });
      await this.fetch();
      toast(`${ids.length} advance(s) rejected`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async save(advId) {
    const empId = document.getElementById('af-emp')?.value;
    const amt   = parseFloat(document.getElementById('af-amt')?.value);
    if (!empId || !amt) { toast('Employee and amount required', 'error'); return; }
    const emp = State.employees.find(e => e.emp_id === empId);
    try {
      await API.call('saveAdvance', {
        advance_id: advId || null,
        emp_id: empId, emp_name: emp?.name || empId,
        date:   document.getElementById('af-date')?.value,
        amount: amt,
        created_by: 'Admin'
      });
      this.closeForm(); await this.fetch();
      toast('Advance saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  async remove(advId, action) {
    if (!confirm(`${action} this advance?`)) return;
    try {
      await API.call('deleteAdvance', { advance_id: advId });
      await this.fetch();
      toast(action + 'ed', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

Views.Payments = {
  async load() {

      <h2 style="font-size:18px;font-weight:700">Payments</h2>

      <div class="card" style="flex:1;min-width:140px;text-align:center">

      </div>

        <div style="font-size:12px;color:var(--muted)">Remaining</div>

      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Bonus Pool</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Pool target (₹)</label><input type="number" id="s-bontarget" value="${State.settings.BONUS_POOL_TARGET||24000}" /></div>
          <div class="field"><label>Employee contribution / month (₹)</label><input type="number" id="s-empcon" value="${State.settings.EMPLOYEE_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Company contribution / month (₹)</label><input type="number" id="s-comcon" value="${State.settings.COMPANY_CONTRIBUTION||500}" /></div>
          <div class="field"><label>Min days for bonus eligibility</label><input type="number" id="s-bondays" value="${State.settings.BONUS_ELIGIBILITY_MIN_DAYS||6}" /></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Teams</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Teams appear in employee records and advance reports.</p>
        <div id="teams-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addTeamRow()">+ Add Team</button>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:14px">Holidays ${new Date().getFullYear()}</h3>
        <div id="holiday-list"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="Views.Settings.addHolidayRow()">+ Add Holiday</button>
      </div>
      <button class="btn btn-primary" onclick="Views.Settings.save()">Save All Settings</button>
    </div>`;
    await this.loadHolidays();
  },

  async loadHolidays() {
    try {
      const r = await API.call('getHolidays', { year: currentYear() });
      State.holidays = r.data || [];
      this.renderHolidays();
    } catch(e) {}
    this.renderTeams();
  },

  renderTeams() {
    const c = document.getElementById('teams-list');
    if (!c) return;
    const teams = getTeams();
    c.innerHTML = teams.map((t, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="team-row-${i}">
        <input type="text" id="team-name-${i}" value="${t}" placeholder="Team name" style="flex:1;max-width:240px" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('team-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addTeamRow() {
    const c = document.getElementById('teams-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'team-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="text" id="team-name-${i}" placeholder="Team name" style="flex:1;max-width:240px" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  renderHolidays() {
    const c = document.getElementById('holiday-list');
    const rows = State.holidays.length ? State.holidays : Array(8).fill({ date: '', name: '' });
    c.innerHTML = rows.map((h, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px" id="hol-row-${i}">
        <input type="date" id="hol-date-${i}" value="${h.date||''}" style="flex:0 0 160px" />
        <input type="text" id="hol-name-${i}" value="${h.name||''}" placeholder="Holiday name" style="flex:1" />
        <button class="btn btn-danger btn-sm" onclick="document.getElementById('hol-row-${i}').remove()">✕</button>
      </div>`).join('');
  },

  addHolidayRow() {
    const c = document.getElementById('holiday-list');
    const i = Date.now();
    const div = document.createElement('div');
    div.id = 'hol-row-' + i;
    div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
    div.innerHTML = `<input type="date" id="hol-date-${i}" style="flex:0 0 160px" />
      <input type="text" id="hol-name-${i}" placeholder="Holiday name" style="flex:1" />
      <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(div);
  },

  async save() {
    const settings = {
      COMPANY_NAME:                document.getElementById('s-company')?.value,
      ADMIN_PIN:                   document.getElementById('s-adminpin')?.value,
      MANAGER_PIN:                 document.getElementById('s-manpin')?.value,
      SHORTFALL_THRESHOLD_HOURS:   document.getElementById('s-thresh')?.value,
      OT_MIN_HOURS:                document.getElementById('s-otmin')?.value,
      OT_ROUND_MINUTES:            document.getElementById('s-otround')?.value,
      ADD_LUNCH_TO_OT:             document.getElementById('s-lunch')?.value,
      LUNCH_DURATION_HOURS:        document.getElementById('s-lunchhrs')?.value,
      BONUS_POOL_TARGET:           document.getElementById('s-bontarget')?.value,
      EMPLOYEE_CONTRIBUTION:       document.getElementById('s-empcon')?.value,
      COMPANY_CONTRIBUTION:        document.getElementById('s-comcon')?.value,
      BONUS_ELIGIBILITY_MIN_DAYS:  document.getElementById('s-bondays')?.value,
    };

    // Collect teams
    const teamNames = [];
    document.querySelectorAll('[id^="team-row-"]').forEach(row => {
      const i = row.id.replace('team-row-', '');
      const name = document.getElementById('team-name-' + i)?.value?.trim();
      if (name) teamNames.push(name);
    });
    if (teamNames.length) settings.TEAMS = teamNames.join(',');

    // Collect holidays
    const holidays = [];
    document.querySelectorAll('[id^="hol-row-"]').forEach(row => {
      const i    = row.id.replace('hol-row-', '');
      const date = document.getElementById('hol-date-' + i)?.value;
      const name = document.getElementById('hol-name-' + i)?.value;
      if (date && name) holidays.push({ date, name });
    });

    try {
      await Promise.all([
        API.call('saveSettings', settings),
        holidays.length ? API.call('saveHolidays', holidays) : Promise.resolve()
      ]);
      const r = await API.call('getSettings', {});
      State.settings = r.data || {};
      toast('Settings saved', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
};

const ManagerApp = {
  dateAdvances: [],

  init() {

          <input type="date" id="m-date" value="${today}" style="max-width:180px"
            onchange="ManagerApp.loadForDate(this.value)" />
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:14px" id="m-emp-table">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:10px 12px;text-align:left;font-weight:600">ID</th>
                <th style="padding:10px 12px;text-align:left;font-weight:600">Employee</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600">Amount (₹)</th>
              </tr>
            </thead>
            <tbody id="m-emp-body"></tbody>
          </table>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="ManagerApp.submit()">Submit</button>
      </div>
      <div id="m-submitted"></div>
    </main>`;
    this.loadForDate(today);
  },

  async loadForDate(date) {
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
      this.renderInputTable(date);
      this.renderSubmitted(date);
    } catch(e) { toast(e.message, 'error'); }
  },

  renderInputTable(date) {
    const allEmps = State.employees.filter(e => e.status === 'Active');
    const body = document.getElementById('m-emp-body');
    if (!body) return;
    const teams = getTeams();
    const teamSet = new Set(teams);
    // Group employees: known teams first (in order), then Others
    const grouped = {};
    teams.forEach(t => { grouped[t] = []; });
    grouped['Other'] = [];
    allEmps.forEach(emp => {
      const t = emp.team && teamSet.has(emp.team) ? emp.team : 'Other';
      grouped[t].push(emp);
    });
    const teamOrder = [...teams, 'Other'];
    let rows = '';
    teamOrder.forEach(team => {
      const emps = (grouped[team] || []).sort((a, b) => a.name.localeCompare(b.name));
      if (!emps.length) return;
      rows += `<tr><td colspan="3" style="padding:8px 12px;background:var(--bg-secondary,#f3f4f6);font-weight:700;font-size:13px;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border)">${team}</td></tr>`;
      emps.forEach(emp => {
        const existing = this.dateAdvances.find(a => a.emp_id === emp.emp_id);
        const val = existing ? existing.amount : '';
        rows += `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:10px 12px;color:var(--muted);font-size:13px">${emp.petpooja_id||'—'}</td>
          <td style="padding:10px 12px;font-weight:500">${emp.name}</td>
          <td style="padding:8px 12px;text-align:right">
            <input type="number" id="m-amt-${emp.emp_id}" value="${val}" placeholder="—"
              min="0" style="width:110px;text-align:right;padding:6px 8px" />
          </td>
        </tr>`;
      });
    });
    body.innerHTML = rows;
  },

  renderSubmitted(date) {
    const c = document.getElementById('m-submitted');
    if (!c) return;
    if (!this.dateAdvances.length) { c.innerHTML = ''; return; }

    // Enrich with employee data and group by team
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const statusStyle = s => s === 'Approved' ? 'background:#dcfce7;color:#15803d' : 'background:#fef3c7;color:#92400e';
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);

    let rows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      rows += `<tr style="background:var(--surface2)">
        <td colspan="4" style="padding:8px 10px;font-weight:700;font-size:12px;color:var(--muted)">${team}</td>
      </tr>`;
      rows += group.map(a => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:9px 10px;color:var(--muted);font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 10px;font-weight:500">${a.emp_name}</td>
          <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
          <td style="padding:9px 10px;text-align:center">
            <span style="font-size:11px;padding:2px 7px;border-radius:99px;${statusStyle(a.status)}">${a.status}</span>
          </td>
        </tr>`).join('');
      rows += `<tr style="background:var(--surface2)">
        <td colspan="2" style="padding:8px 10px;font-weight:600;font-size:13px">${team} Total</td>
        <td style="padding:8px 10px;text-align:right;font-weight:700">${fmt(sub)}</td>
        <td></td>
      </tr>`;
    });

    c.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600">Submitted for ${date}</h3>
        <button class="btn btn-secondary btn-sm" onclick="ManagerApp.savePDF()">Save PDF</button>
        <button class="btn btn-primary btn-sm" onclick="ManagerApp.sharePDF()" style="display:flex;align-items:center;gap:5px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16c-.8 0-1.5.3-2 .8l-7.3-4.2c.1-.2.1-.4.1-.6s0-.4-.1-.6L16 7.2c.5.5 1.2.8 2 .8 1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3c0 .2 0 .4.1.6L7.8 9.8C7.3 9.3 6.6 9 5.8 9c-1.7 0-3 1.3-3 3s1.3 3 3 3c.8 0 1.5-.3 2-.8l7.3 4.2c-.1.2-.1.4-.1.6 0 1.6 1.3 2.9 2.9 2.9s2.9-1.3 2.9-2.9-1.2-3-2.8-3z"/></svg>
          Share
        </button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead style="background:var(--surface2)">
            <tr>
              <th style="padding:10px;text-align:left;width:50px">ID</th>
              <th style="padding:10px;text-align:left">Employee</th>
              <th style="padding:10px;text-align:right">Amount</th>
              <th style="padding:10px;text-align:center">Status</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr style="background:var(--primary);color:#fff">
              <td colspan="2" style="padding:10px;font-weight:700">Grand Total (${enriched.length})</td>
              <td style="padding:10px;text-align:right;font-weight:700">${fmt(grandTotal)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>`;
  },

  async submit() {
    const date = document.getElementById('m-date')?.value;
    if (!date) { toast('Select a date', 'error'); return; }

    // Fresh fetch before processing so existing advances are always current
    try {
      const r = await API.call('getAdvances', { start_date: date, end_date: date });
      this.dateAdvances = r.data || [];
    } catch(e) { toast(e.message, 'error'); return; }

    const emps = State.employees.filter(e => e.status === 'Active');
    const ops = [];
    let count = 0;
    for (const emp of emps) {
      const val = parseFloat(document.getElementById('m-amt-' + emp.emp_id)?.value) || 0;
      const existing = this.dateAdvances.find(a => a.emp_id === emp.emp_id);
      if (val > 0 && existing) {
        ops.push(API.call('saveAdvance', { advance_id: existing.advance_id, date, amount: val }));
        count++;
      } else if (val > 0) {
        ops.push(API.call('saveAdvance', { emp_id: emp.emp_id, emp_name: emp.name, date, amount: val, created_by: 'Manager' }));
        count++;
      } else if (val === 0 && existing) {
        ops.push(API.call('deleteAdvance', { advance_id: existing.advance_id }));
      }
    }
    if (!count) { toast('Enter at least one amount', 'error'); return; }
    try {
      await Promise.all(ops);
      await this.loadForDate(date);
      toast(`${count} advance${count > 1 ? 's' : ''} submitted`, 'success');
    } catch(e) { toast(e.message, 'error'); }
  },

  _buildPDFElement() {
    const date    = document.getElementById('m-date')?.value || this.dateAdvances[0]?.date;
    const company = State.settings?.COMPANY_NAME || 'Mahitha Prasad';
    const enriched = this.dateAdvances.map(a => {
      const emp = State.employees.find(e => e.emp_id === a.emp_id) || {};
      return Object.assign({}, a, { petpooja_id: emp.petpooja_id || '—', team: emp.team || 'Other' });
    });
    const teams = [...new Set(enriched.map(a => a.team))].sort();
    const grandTotal = enriched.reduce((s, a) => s + a.amount, 0);
    let bodyRows = '';
    teams.forEach(team => {
      const group = enriched.filter(a => a.team === team).sort((a,b) => a.emp_name.localeCompare(b.emp_name));
      const sub = group.reduce((s, a) => s + a.amount, 0);
      bodyRows += `<tr><td colspan="4" style="padding:8px 12px;font-weight:700;font-size:12px;background:#e2e8f0;color:#475569">${team}</td></tr>`;
      bodyRows += group.map(a => `
        <tr>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;color:#64748b;font-size:12px">${a.petpooja_id}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0">${a.emp_name}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:right;font-weight:600">&#8377;${a.amount.toLocaleString('en-IN')}</td>
          <td style="padding:9px 12px;border-bottom:1px solid #e2e8f0;text-align:center;font-size:11px;color:${a.status==='Approved'?'#15803d':'#92400e'}">${a.status}</td>
        </tr>`).join('');
      bodyRows += `<tr style="background:#fef9c3"><td colspan="2" style="padding:9px 12px;font-weight:700">${team} Total</td>
        <td style="padding:9px 12px;text-align:right;font-weight:700">&#8377;${sub.toLocaleString('en-IN')}</td><td></td></tr>`;
    });
    const el = document.createElement('div');
    el.innerHTML = `
      <div style="font-family:Arial,sans-serif;padding:32px;color:#1e293b;max-width:640px;margin:0 auto">
        <h1 style="font-size:20px;margin:0 0 4px">${company} &#8212; Advance Report</h1>
        <div style="color:#64748b;font-size:13px;margin-bottom:24px">Date: ${date} &nbsp;&middot;&nbsp; Submitted by: Manager &nbsp;&middot;&nbsp; Generated: ${new Date().toLocaleString('en-IN')}</div>
        <table style="width:100%;border-collapse:collapse">
          <thead style="background:#1e3a5f;color:#fff">
            <tr><th style="padding:10px 12px;text-align:left;font-size:13px">ID</th><th style="padding:10px 12px;text-align:left;font-size:13px">Employee</th><th style="padding:10px 12px;text-align:right;font-size:13px">Amount</th><th style="padding:10px 12px;text-align:center;font-size:13px">Status</th></tr>
          </thead>
          <tbody>
            ${bodyRows}
            <tr style="background:#f97316;color:#fff">
              <td colspan="2" style="padding:10px 12px;font-weight:700">Grand Total &#8212; ${enriched.length} advance${enriched.length>1?'s':''}</td>
              <td style="padding:10px 12px;text-align:right;font-weight:700">&#8377;${grandTotal.toLocaleString('en-IN')}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:32px;font-size:12px;color:#94a3b8">MP-SAL Payroll System</div>
      </div>`;
    return { el, date };
  },

  savePDF() {
    if (!this.dateAdvances.length) return;
    const { el, date } = this._buildPDFElement();
    html2pdf().set({ margin: 0, filename: `advances-${date}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(el).save();
  },

  async sharePDF() {
    if (!this.dateAdvances.length) return;
    if (!navigator.share) { toast('Sharing not supported on this browser — use Save PDF instead', 'error'); return; }
    const { el, date } = this._buildPDFElement();
    try {
      toast('Generating PDF…', 'success');
      const blob = await html2pdf().set({ margin: 0, filename: `advances-${date}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(el).outputPdf('blob');
      const file = new File([blob], `advances-${date}.pdf`, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: `Advances ${date}` });
      } else {
        toast('File sharing not supported — saving instead', 'error');
        html2pdf().set({ margin: 0, filename: `advances-${date}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(el).save();
      }
    } catch(e) { if (e.name !== 'AbortError') toast(e.message, 'error'); }
  }
};

const EmployeeApp = {

  init() {
    show('screen-employee');
    const c = document.getElementById('screen-employee');
    c.innerHTML = `
      <div style="max-width:680px;margin:0 auto;padding:20px 16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <div style="font-weight:700;font-size:18px">MP-SAL</div>
          <span style="flex:1"></span>
          <span style="font-size:14px;color:var(--muted)">${State.empName}</span>
          <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">Logout</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <label style="font-weight:600;font-size:14px">Pay Slip for</label>
          <input type="month" id="emp-month" value="${this.currentMonth}"

  async load(month) {
    this.currentMonth = month;
    const slip = document.getElementById('emp-slip');
    if (!slip) return;
    slip.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await API.call('getEmployeePayslip', { emp_id: State.empId, month });
      const { payroll: p, advances } = r.data || {};
      if (!p) {
        slip.innerHTML = `<div class="card" style="text-align:center;color:var(--muted);padding:32px">No payroll data found for ${month}.</div>`;
        return;
      }
      const advTotal    = advances.reduce((s, a) => s + a.amount, 0);
      const grossTotal  = (p.gross_pay || 0) + (p.ot_earnings || 0);
      const deductions  = (p.shortfall_deduction || 0) + advTotal;
      const net         = grossTotal - deductions;

      const periodLabel = p.adv_start_date && p.adv_end_date
        ? `${p.adv_start_date} to ${p.adv_end_date}`
        : '—';

      slip.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px">
            <div>
              <div style="font-size:20px;font-weight:700">${State.empName}</div>
              <div style="color:var(--muted);font-size:13px">Pay Slip &nbsp;·&nbsp; ${month}</div>
            </div>
            <div style="text-align:right;font-size:13px;color:var(--muted)">
              <div>Advance Period</div>
              <div style="font-weight:600;color:var(--text)">${periodLabel}</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Attendance</div>
              ${this._row('Full Days', p.full_days)}
              ${this._row('Half Days', p.half_days)}
              ${this._row('Absent', p.absent_days)}
              ${this._row('Week Off', p.week_off_days)}
            </div>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">OT</div>
              ${this._row('Weekday OT', fmtHrs(p.ot_weekday_min))}
              ${this._row('Sunday OT',  fmtHrs(p.ot_sunday_min))}
              ${this._row('Holiday OT', fmtHrs(p.ot_holiday_min))}
            </div>
          </div>

          <div style="border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Earnings</div>
                ${this._row('Gross Pay',   fmt(p.gross_pay || 0))}
                ${this._row('OT Earnings', fmt(p.ot_earnings || 0))}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Earnings</span><span>${fmt(grossTotal)}</span>
                </div>
              </div>
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Deductions</div>
                ${this._row('Shortfall', fmt(p.shortfall_deduction || 0))}
                ${this._row('Advances',  fmt(advTotal))}
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid var(--border);font-weight:700;margin-top:4px">
                  <span>Total Deductions</span><span>${fmt(deductions)}</span>
                </div>
              </div>
            </div>
          </div>

          <div style="background:var(--primary);color:#fff;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:15px">Net In-Hand</span>
            <span style="font-weight:800;font-size:20px">${fmt(net)}</span>
          </div>
        </div>

        ${advances.length ? `
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px">Advance Details &nbsp;<span style="font-size:12px;font-weight:400;color:var(--muted)">(${periodLabel})</span></div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead style="background:var(--surface2)">
              <tr>
                <th style="padding:8px 10px;text-align:left">Date</th>
                <th style="padding:8px 10px;text-align:right">Amount</th>
              </tr>
            </thead>
            <tbody>
              ${advances.map(a => `<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:9px 10px">${a.date}</td>
                <td style="padding:9px 10px;text-align:right;font-weight:600">${fmt(a.amount)}</td>
              </tr>`).join('')}
              <tr style="background:var(--surface2)">
                <td style="padding:9px 10px;font-weight:700">Total Advance Deducted</td>
                <td style="padding:9px 10px;text-align:right;font-weight:700">${fmt(advTotal)}</td>
              </tr>
            </tbody>
          </table>
        </div>` : ''}`;
    } catch(e) { toast(e.message, 'error'); }
  },

  _row(label, val) {
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--muted)">${label}</span><span style="font-weight:500">${val ?? '—'}</span>
    </div>`;
  }
};

// ---- Boot ----
App.init();

</script>
</body>
</html>
